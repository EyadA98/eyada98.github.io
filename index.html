<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --indigo:#2a1d44; --indigo-2:#443163; --indigo-3:#15103a; --violet:#623f94; --lavender:#8a64c8;
  --lilac:#bba4e4; --lilac-soft:#f3eefc; --peach:#f3b98e; --peach-deep:#dd824b;
  --bg:#f4f1fb; --card:#FFFFFF; --border:#e7e0f5; --text:#2a1d44; --muted:#6a5f86;
  --green:#1E915F; --green-soft:#E3F6ED; --red:#D6554C; --red-soft:#FBEAE8;
  --radius:18px;
  --grad-iri:linear-gradient(120deg,#8a64c8 0%,#a081d6 40%,#f3b98e 100%);
  --grad-iri-rev:linear-gradient(120deg,#c6b3ef 0%,#caa7ec 42%,#f3b98e 100%);
  --glow-lav:0 10px 30px rgba(138,100,200,.34);
  --sh-1:0 1px 2px rgba(42,29,68,.05),0 6px 20px rgba(42,29,68,.07);
  --sh-2:0 6px 14px rgba(42,29,68,.09),0 22px 48px rgba(67,49,99,.16);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;color-scheme:light}
html.dark{color-scheme:dark}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif;min-height:100vh;display:grid;grid-template-columns:clamp(214px,16.5vw,278px) 1fr;font-variant-numeric:tabular-nums}
::selection{background:var(--lilac)}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:rgba(138,100,200,.45);border-radius:9px}::-webkit-scrollbar-track{background:transparent}
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:
  radial-gradient(680px 460px at 8% -10%, rgba(138,100,200,.26), transparent 64%),
  radial-gradient(600px 440px at 92% 6%, rgba(243,185,142,.22), transparent 64%),
  radial-gradient(760px 560px at 50% 114%, rgba(98,63,148,.18), transparent 70%),
  linear-gradient(180deg,#faf8ff,#f3eefc)}
.marc{font-family:'Marcellus',Georgia,serif;font-weight:400;letter-spacing:.012em}

/* ===== Dark theme ===== */
html.dark{
  --bg:#0d0926; --card:#15103a; --text:#ece7fb; --muted:#a99ccb; --border:rgba(255,255,255,.10);
  --green:#7fd1c4; --red:#ff9b92;
  --sh-1:0 2px 10px rgba(0,0,0,.4); --sh-2:0 22px 54px -20px rgba(138,100,200,.6),0 10px 26px rgba(0,0,0,.5);
}
html.dark body::before{background:
  radial-gradient(1200px 600px at 12% -10%,rgba(138,100,200,.22),transparent 55%),
  radial-gradient(1000px 700px at 112% 8%,rgba(243,185,142,.13),transparent 50%),
  linear-gradient(180deg,#0c0820 0%,#120c30 50%,#0c0820 100%)}

/* ===== Sidebar ===== */
aside{background:linear-gradient(168deg,rgba(26,23,63,.93) 0%,rgba(38,34,92,.88) 55%,rgba(50,43,115,.86) 100%);
  backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px) saturate(1.4);
  border-right:1px solid rgba(255,255,255,.08);color:#fff;padding:26px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.logo{display:flex;align-items:center;gap:12px;padding:4px 10px 24px}
.logo-mark{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,var(--lavender),var(--violet));display:grid;place-items:center;box-shadow:0 4px 14px rgba(141,127,208,.45);animation:logoIn .7s var(--ease)}
.logo-mark svg{width:21px;height:21px;color:#fff}
@keyframes logoIn{from{opacity:0;transform:scale(.55) rotate(-10deg)}to{opacity:1;transform:none}}
.logo b{font-size:1.02rem;font-weight:800;display:block;line-height:1.1}
.logo span{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;opacity:.55;font-weight:500}
.nav-label{font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;opacity:.4;padding:14px 12px 6px;font-weight:700}
aside button.nav{display:flex;align-items:center;gap:11px;width:100%;background:none;border:none;color:rgba(255,255,255,.62);padding:10px 12px;border-radius:11px;cursor:pointer;font-size:.91rem;font-family:inherit;font-weight:600;text-align:left;position:relative;transition:all .22s var(--ease)}
aside button.nav svg{width:17px;height:17px;flex:none;opacity:.8}
aside button.nav:hover{color:#fff;background:rgba(255,255,255,.07);transform:translateX(2px)}
aside button.nav.active{color:#fff;background:rgba(138,100,200,.34);box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 6px 18px rgba(138,100,200,.28)}
aside button.nav.active::before{content:"";position:absolute;left:-16px;top:20%;height:60%;width:3.5px;border-radius:3px;background:var(--peach)}
.side-foot{margin-top:auto;padding:14px 12px 4px;font-size:.7rem;opacity:.4;font-weight:500}

/* ===== Content ===== */
.content{min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 34px;position:sticky;top:0;z-index:20;
  background:rgba(13,9,38,.6);backdrop-filter:blur(22px) saturate(1.6);-webkit-backdrop-filter:blur(22px) saturate(1.6);
  border-bottom:1px solid rgba(255,255,255,.08);transition:transform .38s var(--ease)}
html:not(.dark) .topbar{background:rgba(247,245,252,.6);border-bottom:1px solid rgba(255,255,255,.65)}
.tb-left{display:flex;align-items:center;gap:14px;min-width:0}
.topbar h2{font-size:1.22rem;font-weight:800}.topbar .crumb{font-size:.74rem;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.top-actions{display:flex;gap:8px;align-items:center}
main{padding:clamp(14px,2.4vw,32px) clamp(14px,2.8vw,38px) 80px;max-width:1320px}
.tab{display:none}.tab.active{display:block;animation:fadeUp .42s var(--ease)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.92) translateY(10px)}to{opacity:1;transform:none}}
.grid{display:grid;gap:18px}

/* ===== Cards / buttons / inputs ===== */
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:clamp(16px,1.7vw,24px);
  backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 18px 40px rgba(0,0,0,.4);transition:transform .3s var(--ease),box-shadow .3s var(--ease)}
html:not(.dark) .card{background:rgba(255,255,255,.66);border:1px solid rgba(255,255,255,.72);box-shadow:inset 0 1px 0 rgba(255,255,255,.85),0 8px 28px rgba(38,34,92,.08)}
.card.lift:hover{transform:translateY(-4px);box-shadow:0 22px 54px -18px rgba(138,100,200,.5)}
.card h3{font-size:.71rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.11em;margin-bottom:10px}
.btn{background:var(--grad-iri);color:#fff;border:none;padding:9px 17px;border-radius:99px;cursor:pointer;font-size:.87rem;font-weight:700;font-family:inherit;box-shadow:inset 0 1px 0 rgba(255,255,255,.34),var(--glow-lav);transition:transform .22s var(--ease),box-shadow .22s var(--ease),filter .22s}
.btn:hover{transform:translateY(-1.5px) scale(1.02);box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 14px 34px rgba(138,100,200,.45);filter:brightness(1.05)}
.btn:active{transform:scale(.965)}
.btn.soft{background:rgba(255,255,255,.08);color:#d9caf3;border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
html:not(.dark) .btn.soft{background:rgba(255,255,255,.6);color:var(--violet);border:1px solid rgba(255,255,255,.75)}
.btn.soft:hover{filter:none;background:rgba(255,255,255,.15)}
html:not(.dark) .btn.soft:hover{background:rgba(255,255,255,.92)}
.btn.round{width:40px;height:40px;padding:0;display:grid;place-items:center;border-radius:50%}
.btn.round svg{width:18px;height:18px}
.btn.danger{background:transparent;color:var(--red);border:1px solid var(--border);padding:5px 10px;border-radius:9px;box-shadow:none}
.btn.danger:hover{filter:none;transform:none;background:var(--red-soft)}
html.dark .btn.danger:hover{background:rgba(214,85,76,.18)}
input,textarea,select{font-family:inherit}
.fld{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);padding:10px 13px;border-radius:12px;font-size:.93rem;font-weight:500;transition:border .2s,box-shadow .2s}
html:not(.dark) .fld{background:#fff;border:1px solid #d4c6ef}
.fld:focus{outline:none;border-color:var(--lavender);box-shadow:0 0 0 3px rgba(138,100,200,.22)}
.fld::placeholder{color:var(--muted);opacity:.7}
textarea.fld{resize:vertical;min-height:64px;line-height:1.5}
.pill{display:inline-block;padding:3px 11px;border-radius:99px;font-size:.72rem;background:rgba(138,100,200,.2);color:#d4c6ef;font-weight:700}
html:not(.dark) .pill{background:rgba(142,127,208,.16);color:var(--violet)}
.muted{color:var(--muted)} .pos{color:var(--green)} .neg{color:var(--red)}
.section-head{display:flex;justify-content:space-between;align-items:center;margin:2px 0 16px;gap:10px;flex-wrap:wrap}
.section-head h2{font-size:1.1rem;font-weight:800}

/* ===== Hero ===== */
.hero{position:relative;border-radius:24px;padding:30px 34px;color:#fff;overflow:hidden;margin-bottom:18px;
  background:linear-gradient(112deg,var(--indigo-3) 0%,var(--indigo) 42%,var(--violet) 78%,var(--lavender) 110%);
  border:1px solid rgba(255,255,255,.18);box-shadow:inset 0 1px 0 rgba(255,255,255,.24),var(--sh-2)}
.hero::before{content:"";position:absolute;top:-70%;right:-6%;width:430px;height:430px;border-radius:50%;background:radial-gradient(circle,rgba(242,164,140,.30),transparent 68%)}
.hero>*{position:relative;z-index:1}
.hero .eyebrow{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;opacity:.7;font-weight:700}
.hero h1{font-size:clamp(1.6rem,3vw,2.4rem);margin:6px 0 4px;letter-spacing:-.01em}
.hero .sub{opacity:.78;font-weight:500;font-size:.95rem}
.today-strip{display:flex;gap:22px;flex-wrap:wrap;margin-top:18px}
.today-strip .ts{min-width:96px}
.today-strip .ts b{display:block;font-size:1.05rem;font-weight:800}
.today-strip .ts span{font-size:.66rem;opacity:.65;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.prayers{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
.prayers .pr{text-align:center}
.prayers .pr b{display:block;font-size:.92rem;font-weight:800}
.prayers .pr.next b{color:#FFD9CB}
.prayers .pr span{font-size:.62rem;opacity:.6;text-transform:uppercase;letter-spacing:.08em}

/* App launcher cards */
.apps{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.app-card{display:block;text-decoration:none;color:inherit;position:relative;overflow:hidden}
.app-card .ico{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;box-shadow:0 6px 16px rgba(38,34,92,.18);margin-bottom:14px}
.app-card .ico svg{width:24px;height:24px;color:#fff}
.app-card .big{font-family:'Marcellus',serif;font-size:1.7rem;background:var(--grad-iri-rev);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1.15}
.app-card .nm{font-weight:800;font-size:1.05rem;margin-bottom:3px}
.app-card .arrow{position:absolute;top:20px;right:20px;opacity:.5;transition:transform .25s var(--ease),opacity .25s}
.app-card:hover .arrow{opacity:1;transform:translate(3px,-3px)}
.tile-lav{background:linear-gradient(135deg,var(--lavender),var(--violet))}
.tile-peach{background:linear-gradient(135deg,var(--peach),var(--peach-deep))}
.tile-ind{background:linear-gradient(135deg,var(--indigo-2),var(--indigo-3))}
.tile-green{background:linear-gradient(135deg,#3FC98A,#1E915F)}

/* lists (tasks / notes / links) */
.row-item{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--border)}
.row-item:last-child{border-bottom:none}
.chk{width:20px;height:20px;border-radius:7px;border:1.5px solid var(--lavender);flex:none;cursor:pointer;display:grid;place-items:center;transition:background .2s}
.chk.done{background:var(--grad-iri);border-color:transparent}
.chk svg{width:12px;height:12px;color:#fff;opacity:0}.chk.done svg{opacity:1}
.row-item .tt{flex:1;min-width:0}
.row-item .tt .t{font-weight:600;font-size:.93rem}
.row-item.done .tt .t{text-decoration:line-through;opacity:.5}
.row-item .tt .meta{font-size:.74rem;color:var(--muted);margin-top:2px}
.note-card{break-inside:avoid;margin-bottom:14px}
.notes-masonry{columns:3;column-gap:16px}
@media(max-width:1100px){.notes-masonry{columns:2}}
.note-card .nbody{font-size:.9rem;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.note-card .ndate{font-size:.7rem;color:var(--muted);margin-top:10px;display:flex;justify-content:space-between;align-items:center}
.link-group{margin-bottom:8px}
.link-chip{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:inherit;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;padding:9px 13px;margin:0 8px 8px 0;font-weight:600;font-size:.88rem;transition:transform .2s,box-shadow .2s,border-color .2s}
html:not(.dark) .link-chip{background:#fff}
.link-chip:hover{transform:translateY(-2px);border-color:var(--lavender);box-shadow:0 6px 16px rgba(138,100,200,.18)}
.link-chip .dot{width:8px;height:8px;border-radius:3px;background:var(--lavender)}
.empty{text-align:center;padding:30px 20px;color:var(--muted)}
.empty .glyph{font-size:1.7rem;margin-bottom:8px}
.insight{display:flex;gap:12px;align-items:center;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:14px;padding:13px 15px;font-size:.88rem;font-weight:500}
html:not(.dark) .insight{background:rgba(255,255,255,.56)}
.insight .ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:none;background:rgba(138,100,200,.22);color:#bba4e4}

/* ===== Modal / toast / auth ===== */
.overlay{position:fixed;inset:0;background:rgba(13,9,38,.55);backdrop-filter:blur(8px);z-index:90;display:grid;place-items:center;padding:20px;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:rgba(24,18,60,.94);border:1px solid rgba(187,164,228,.24);border-radius:20px;padding:24px;max-width:440px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:pop .35s var(--ease)}
html:not(.dark) .modal{background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.9)}
.modal h4{font-size:1.05rem;font-weight:800;margin-bottom:14px}
.modal .row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;bottom:25px;right:25px;background:rgba(26,23,63,.88);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.12);border-left:3px solid var(--peach);color:#fff;padding:11px 21px;border-radius:99px;font-size:.9rem;font-weight:600;opacity:0;transform:translateY(8px);transition:all .35s var(--ease);pointer-events:none;z-index:99}
.toast.show{opacity:1;transform:none}
@media(max-width:768px){.toast{left:50%;right:auto;bottom:auto;top:calc(env(safe-area-inset-top) + 64px);transform:translate(-50%,-14px);max-width:90vw}.toast.show{transform:translate(-50%,0)}}

#authRoot{position:fixed;inset:0;z-index:95;display:grid;place-items:center;padding:20px;overflow:auto;
  background:linear-gradient(112deg,var(--indigo-3) 0%,var(--indigo) 45%,var(--violet) 85%,var(--lavender) 115%)}
#authRoot::before{content:"";position:absolute;top:-30%;right:-10%;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(242,164,140,.25),transparent 68%)}
.auth-card{position:relative;z-index:1;width:100%;max-width:420px;background:rgba(24,18,60,.92);backdrop-filter:blur(26px) saturate(1.5);border:1px solid rgba(187,164,228,.3);border-radius:26px;padding:38px 34px 28px;box-shadow:0 30px 90px rgba(10,8,30,.55);animation:pop .45s var(--ease);text-align:center;color:#fff}
.auth-logo{width:58px;height:58px;border-radius:17px;background:linear-gradient(135deg,var(--lavender),var(--violet));display:grid;place-items:center;margin:0 auto 16px;box-shadow:0 8px 22px rgba(93,79,168,.4)}
.auth-logo svg{width:30px;height:30px;color:#fff}
.auth-card h2{font-size:1.5rem;letter-spacing:-.01em}
.auth-card .tag{font-size:.86rem;color:#cbb9ec;margin:6px 0 22px}
.auth-card .fld{margin-bottom:11px;text-align:left;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.16);color:#fff}
.auth-card .btn.full{width:100%;padding:13px;font-size:.95rem;border-radius:13px;margin-top:4px}
.auth-tabs{display:flex;background:rgba(255,255,255,.08);border-radius:99px;padding:4px;margin-bottom:18px}
.auth-tabs button{flex:1;border:none;background:none;padding:9px;border-radius:99px;font-family:inherit;font-weight:700;color:#cbb9ec;cursor:pointer;transition:all .25s}
.auth-tabs button.active{background:rgba(255,255,255,.14);color:#fff}
.auth-err{color:#ffb9b0;font-size:.82rem;font-weight:600;min-height:18px;margin:4px 0;text-align:center}
.auth-err.ok{color:#9FF0C8}
.auth-links{display:flex;justify-content:space-between;gap:10px;margin-top:16px;flex-wrap:wrap}
.auth-links button{background:none;border:none;color:#c6b3ef;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer}

/* splash */
#splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:linear-gradient(180deg,#0c0820,#140d33);transition:opacity .6s ease,visibility .6s}
#splash.hide{opacity:0;visibility:hidden}
#splash svg{animation:logoIn .7s var(--ease)}
.splash-bar{width:160px;height:3px;border-radius:3px;background:linear-gradient(90deg,transparent,#8a64c8,#f3b98e,transparent);background-size:200% 100%;animation:splashSlide 1.4s linear infinite}
@keyframes splashSlide{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* bottom mobile nav */
.bottombar{display:none}
@media(max-width:1024px){
  body{grid-template-columns:1fr}
  aside{position:sticky;top:0;z-index:40;height:auto;flex-direction:row;align-items:center;gap:2px;padding:10px 14px;overflow-x:auto}
  .logo{padding:0 12px 0 2px;flex:none}.logo span,.nav-label,.side-foot{display:none}
  aside button.nav{width:auto;flex:none;white-space:nowrap}.aside button.nav.active::before{display:none}
  .topbar{position:static}
  .notes-masonry{columns:2}
}
@media(max-width:768px){
  aside button.nav{display:none}.logo b{font-size:.9rem}
  .topbar{padding:12px 16px}.topbar h2{font-size:1.05rem}
  main{padding-bottom:110px}
  .notes-masonry{columns:1}
  .bottombar{display:flex;position:fixed;left:12px;right:12px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:80;
    background:linear-gradient(180deg,rgba(60,48,110,.34),rgba(18,12,48,.46));backdrop-filter:blur(32px) saturate(1.9) brightness(1.06);-webkit-backdrop-filter:blur(32px) saturate(1.9) brightness(1.06);

<script>
/* ============ Config ============ */
const SUPABASE_URL = "https://vulzuubswllmeypxwznq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1bHp1dWJzd2xsbWV5cHh3em5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTY2MjYsImV4cCI6MjA5Nzg3MjYyNn0.Lmrf-2I-jFaof--__snquTrpa-992y7S1hBhowQtvFY";
const supaReady = /^https:\/\//.test(SUPABASE_URL) && SUPABASE_ANON_KEY.length>20 && !!window.supabase;
const supa = supaReady ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
const KEY = "hub.v1";
const GUEST_FLAG = "hub.guest";
let user = null;

const DEFAULT = {
  profile:{ name:"Eyad Alfi" },
  settings:{ city:"Makkah", financeUrl:"./finance/", travelUrl:"./travel/", lang:"en", currency:"SAR", nextTripDest:"", nextTripDate:"", gcalId:"", showPrayer:true, showWeather:true, showCalendar:true },
  notes:[], tasks:[], goals:[],
  links:[
    {group:"Build", label:"GitHub", url:"https://github.com"},
    {group:"Build", label:"Supabase", url:"https://supabase.com/dashboard"},
    {group:"Daily", label:"Gmail", url:"https://mail.google.com"},
    {group:"Daily", label:"Calendar", url:"https://calendar.google.com"}
  ]
};

/* ============ State ============ */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function storeKey(){ return user ? KEY+":"+user.id : KEY; }
function fill(d){ for(const k of Object.keys(DEFAULT)) if(d[k]===undefined) d[k]=JSON.parse(JSON.stringify(DEFAULT[k])); if(!d.settings) d.settings={}; for(const k of Object.keys(DEFAULT.settings)) if(d.settings[k]===undefined) d.settings[k]=DEFAULT.settings[k]; return d; }
function loadLocal(k){ try{ const s=localStorage.getItem(k); if(s) return fill(JSON.parse(s)); }catch(e){} return null; }
let data = (function(){
  try{
    if(!localStorage.getItem(GUEST_FLAG)){
      for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.indexOf(KEY+":")===0){ const d=loadLocal(k); if(d) return d; } }
    }
    return loadLocal(KEY) || JSON.parse(JSON.stringify(DEFAULT));
  }catch(e){ return JSON.parse(JSON.stringify(DEFAULT)); }
})();
function save(){ try{ data.updatedAt=new Date().toISOString(); localStorage.setItem(storeKey(), JSON.stringify(data)); }catch(e){} scheduleHubSync(); }
let _hubTimer=null;
function scheduleHubSync(){ if(!user||!supa) return; clearTimeout(_hubTimer); _hubTimer=setTimeout(pushHub,1200); }
async function pushHub(){ if(!user||!supa) return; try{ const {error}=await supa.from("hub").upsert({user_id:user.id,data:data,updated_at:new Date().toISOString()},{onConflict:"user_id"}); if(error) throw error; }catch(e){ console.error("Hub sync failed:",(e&&e.message)||e); } }
async function pullHub(){ if(!user||!supa) return; try{ const {data:rows,error}=await supa.from("hub").select("data,updated_at").eq("user_id",user.id).order("updated_at",{ascending:false}).limit(1); if(error) throw error; const rec=rows&&rows[0]&&rows[0].data; if(rec&&(!data.updatedAt||(rec.updatedAt&&rec.updatedAt>data.updatedAt))){ data=fill(rec); try{localStorage.setItem(storeKey(),JSON.stringify(data));}catch(e){} render(); } else { pushHub(); } }catch(e){ console.error("Hub pull failed:",(e&&e.message)||e); } }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t.__h); t.__h=setTimeout(()=>t.classList.remove("show"),2200); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ============ Theme ============ */
const SUN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>';
const MOON='<svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
function updThemeIcon(){ const ic=document.getElementById("themeIcon"); if(ic) ic.innerHTML=document.documentElement.classList.contains("dark")?SUN:MOON; }
function toggleTheme(){ const dark=!document.documentElement.classList.contains("dark"); document.documentElement.classList.toggle("dark",dark); try{localStorage.setItem("hub.theme",dark?"dark":"light");}catch(e){} updThemeIcon(); }
updThemeIcon();

/* ============ Navigation ============ */
const PAGES={home:["Home","Dashboard"],apps:["Apps","Your Apps"],notes:["Workspace","Notes"],tasks:["Workspace","Tasks"],links:["Workspace","Quick Links"],goals:["Workspace","Goals & Habits"]};
function go(name){
  document.querySelectorAll("aside button.nav,.bottombar button").forEach(b=>b.classList.toggle("active",b.dataset.tab===name));
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.id==="tab-"+name));
  const p=PAGES[name]||["",""]; document.getElementById("crumb").textContent=p[0]; document.getElementById("pageTitle").textContent=p[1];
  window.scrollTo({top:0}); render();
}
document.querySelectorAll("aside button.nav,.bottombar button").forEach(b=>b.addEventListener("click",()=>go(b.dataset.tab)));

/* ============ Render ============ */
function avatarText(){ var nm=((data.profile&&data.profile.name)||"").trim(); if(!nm) return "•"; var p=nm.split(/\s+/); return (p[0].charAt(0)+(p[1]?p[1].charAt(0):"")).toUpperCase(); }
function render(){ applyLang();
  try{ renderHome(); }catch(e){ console.error("renderHome",e); }
  try{ renderApps(); }catch(e){ console.error(e); }
  try{ renderNotes(); }catch(e){ console.error(e); }
  try{ renderTasks(); }catch(e){ console.error(e); }
  try{ renderLinks(); }catch(e){ console.error(e); }
  try{ renderGoals(); }catch(e){ console.error(e); }
  var a=document.getElementById("avatarChip"); if(a) a.textContent=avatarText();
}
function applyLang(){ var ar=(data.settings.lang==="ar"); document.documentElement.lang=ar?"ar":"en"; document.documentElement.dir=ar?"rtl":"ltr"; }

function fmtDate(d){ return d.toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"long",year:"numeric"}); }
function hijri(d){ try{ return new Intl.DateTimeFormat("en-u-ca-islamic-umalqura",{day:"numeric",month:"long",year:"numeric"}).format(d)+" AH"; }catch(e){ return ""; } }

function renderHome(){
  const now=new Date(), h=now.getHours();
  const greet=h<5?"Late night":h<12?"Good morning":h<17?"Good afternoon":h<22?"Good evening":"Good night";
  document.getElementById("greetLine").textContent=greet;
  document.getElementById("userName").textContent=(data.profile.name||(user&&user.email?user.email.split("@")[0]:"")||"there");
  document.getElementById("brandName").textContent=data.profile.name?data.profile.name.split(" ")[0]+"'s HQ":"Headquarters";
  document.getElementById("dateLine").innerHTML=esc(fmtDate(now))+(hijri(now)?' &middot; <span style="opacity:.8">'+esc(hijri(now))+'</span>':"");
  // today strip filled by widgets (weather) + counts
  const openTasks=data.tasks.filter(t=>!t.done).length;
  const notes=data.notes.length;
  document.getElementById("todayStrip").innerHTML=
    (data.settings.showWeather!==false?`<div class="ts" id="wxBox"><b>—</b><span>Weather</span></div>`:"")+
    `<div class="ts"><b>${openTasks}</b><span>Open tasks</span></div>`+
    `<div class="ts"><b>${notes}</b><span>Notes</span></div>`+
    `<div class="ts"><b>${(data.goals||[]).length}</b><span>Goals</span></div>`;
  renderAppCards("appCards");
  // today tasks
  const today=new Date().toISOString().slice(0,10);
  const due=data.tasks.filter(t=>!t.done).sort((a,b)=>(a.due||"9999").localeCompare(b.due||"9999")).slice(0,6);
  document.getElementById("todayTasks").innerHTML = due.length? due.map(t=>taskRow(t)).join("")
    : '<div class="empty"><div class="glyph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-6"/></svg></div><p>Nothing due — you are all clear.</p></div>';
  // home links (first few)
  document.getElementById("homeLinks").innerHTML = data.links.length? data.links.slice(0,8).map(linkChip).join("") : '<span class="muted">No links yet.</span>';
  renderInsights();
  if(data.settings.showWeather!==false) loadWeather();
  var pr=document.getElementById("prayersRow"); if(pr) pr.style.display=(data.settings.showPrayer!==false)?"":"none";
  if(data.settings.showPrayer!==false) loadPrayers();
  renderCalWidget();
}

function appDef(){
  return [
    {key:"finance",nm:"Finance Board",tile:"tile-lav",url:data.settings.financeUrl,desc:"Net worth, budget, portfolio & zakat",
      icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M4 10h16L12 3 4 10zM6 10v8M10 10v8M14 10v8M18 10v8"/></svg>'},
    {key:"travel",nm:"Travel Planner",tile:"tile-peach",url:data.settings.travelUrl,desc:"Plan trips, hotels, budgets & itineraries",
      icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 16l20-7-7 13-3-5-5-1z"/></svg>'}
  ];
}
function renderAppCards(id){
  const el=document.getElementById(id); if(!el) return;
  el.innerHTML = appDef().map(a=>{
    const stat = a.key==="finance" ? (financeStat||"") : (a.key==="travel" ? travelStat() : "");
    return `<a class="card lift app-card" href="${esc(a.url||'#')}" ${/^https?:/.test(a.url||'')?'target="_blank" rel="noopener"':''}>
      <span class="arrow"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg></span>
      <div class="ico ${a.tile}">${a.icon}</div>
      <div class="nm">${esc(a.nm)}</div>
      ${stat?`<div class="big">${esc(stat)}</div>`:`<div class="muted" style="font-size:.86rem">${esc(a.desc)}</div>`}
      ${stat?`<div class="muted" style="font-size:.78rem;margin-top:4px">${esc(a.desc)}</div>`:""}
    </a>`;
  }).join("");
}
function renderApps(){ renderAppCards("appCardsFull"); }

function renderInsights(){
  const out=[];
  const today=new Date().toISOString().slice(0,10);
  const overdue=data.tasks.filter(t=>!t.done&&t.due&&t.due<today).length;
  if(overdue) out.push(insight('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:17px;height:17px"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>',`<b>${overdue}</b> task${overdue>1?"s":""} overdue — take a look in Tasks.`));

  document.getElementById("insightStrip").innerHTML = out.join("");

  try{

    var url="https://www.googleapis.com/calendar/v3/calendars/primary/events?singleEvents=true&orderBy=startTime&maxResults=8&timeMin="+tMin.toISOString()+"&timeMax="+tMax.toISOString();
    var j=await fetch(url,{headers:{Authorization:"Bearer "+token}}).then(function(r){return r.json();});

    document.getElementById("calList").innerHTML = items.length ? items.map(function(e){ var when=(e.start&&(e.start.dateTime||e.start.date))||""; var d=when?new Date(when):null; var lbl=d?d.toLocaleString(undefined,{weekday:"short",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):""; return '<div class="row-item"><div class="tt"><div class="t">'+esc(e.summary||"(no title)")+'</div><div class="meta">'+esc(lbl)+'</div></div></div>'; }).join("") : '<span class="muted">No events in the next 7 days.</span>';

let _wxCache={}, _prayCache={};
async function loadWeather(){
  const city=data.settings.city||"Makkah"; const box=document.getElementById("wxBox"); if(!box) return;
  if(_wxCache[city]){ box.innerHTML=_wxCache[city]; return; }
  try{
    const g=await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(city)+"&count=1").then(r=>r.json());
    const loc=g.results&&g.results[0]; if(!loc) return;
    const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&current=temperature_2m,weather_code`).then(r=>r.json());
    const temp=Math.round(w.current.temperature_2m);
    const desc=wxDesc(w.current.weather_code);
    const html=`<b>${temp}°C</b><span>${esc(city)} · ${desc}</span>`;
    _wxCache[city]=html; box.innerHTML=html;
  }catch(e){}
}
function wxDesc(c){ if(c==0)return"Clear"; if(c<3)return"Sunny"; if(c<50)return"Cloudy"; if(c<70)return"Rain"; if(c<80)return"Showers"; return"Storm"; }
async function loadPrayers(){
  const city=data.settings.city||"Makkah"; const row=document.getElementById("prayersRow"); if(!row) return;
  try{
    const j= _prayCache[city] || await fetch("https://api.aladhan.com/v1/timingsByCity?city="+encodeURIComponent(city)+"&country=Saudi%20Arabia&method=4").then(r=>r.json());
    _prayCache[city]=j;
    const t=j.data.timings; const order=[["Fajr",t.Fajr],["Dhuhr",t.Dhuhr],["Asr",t.Asr],["Maghrib",t.Maghrib],["Isha",t.Isha]];
    const now=new Date(), nowM=now.getHours()*60+now.getMinutes();
    let nextIdx=order.findIndex(([n,tm])=>{ const [H,M]=tm.split(":").map(Number); return H*60+M>nowM; }); if(nextIdx<0) nextIdx=0;
    row.innerHTML=order.map(([n,tm],i)=>`<div class="pr ${i===nextIdx?'next':''}"><b>${tm}</b><span>${n}</span></div>`).join("");
  }catch(e){ row.innerHTML=""; }
}

function authUI(mode){

    <div class="auth-err" id="aErr"></div>

function authErr(m,ok){ const e=document.getElementById("aErr"); if(e){ e.textContent=m; e.classList.toggle("ok",!!ok);} }
function closeAuth(){ const r=document.getElementById("authRoot"); r.style.display="none"; r.innerHTML=""; }
function guestMode(){ try{localStorage.setItem(GUEST_FLAG,"1");}catch(e){} closeAuth(); }
async function doSignIn(){
  if(!supaReady) return guestMode();
  const email=document.getElementById("aEmail").value.trim(), pass=document.getElementById("aPass").value;
  if(!email||!pass) return authErr("Enter your email and password.");
  authErr("Signing in…");
  const {error}=await supa.auth.signInWithPassword({email,password:pass});
  if(error) authErr(error.message);
}
async function doSignUp(){
  if(!supaReady) return guestMode();
  const email=document.getElementById("aEmail").value.trim(), pass=document.getElementById("aPass").value;
  if(!email||!pass) return authErr("Enter an email and password.");
  if(pass.length<8) return authErr("Use at least 8 characters.");
  authErr("Creating…");
  const {data:res,error}=await supa.auth.signUp({email,password:pass});
  if(error) return authErr(error.message);
  if(res&&res.session) return; authErr("Check your email to confirm your account.",true);
}
async function doForgot(){
  const email=document.getElementById("aEmail").value.trim(); if(!email) return authErr("Enter your email first.");
  const {error}=await supa.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname});
  authErr(error?error.message:"Reset link sent — check your inbox.",!error);
}
async function signOut(){ closeModal(); if(supa) await supa.auth.signOut(); }

async function initAuth(){
  accountInit();
  if(!supaReady){ if(!localStorage.getItem(GUEST_FLAG)) authUI("in"); return; }
  supa.auth.onAuthStateChange((evt,session)=>{
    const u=session?session.user:null;
    const signedIn=u&&(!user||user.id!==u.id), signedOut=!u&&!!user;
    user=u; accountInit();
    if(signedIn){ closeAuth(); const d=loadLocal(KEY+":"+u.id); if(d){ data=d; } render(); loadFinance(); pullHub(); toast("Welcome back ✓"); }
    if(signedOut){ data=loadLocal(KEY)||JSON.parse(JSON.stringify(DEFAULT)); render(); authUI("in"); }
  });
  const {data:{session}}=await supa.auth.getSession();
  if(session){ user=session.user; accountInit(); const d=loadLocal(KEY+":"+user.id); if(d) data=d; render(); loadFinance(); pullHub(); }
  else if(!localStorage.getItem(GUEST_FLAG)) authUI("in");
}

/* ============ Boot ============ */
render();
initAuth();
(function(){ var s=document.getElementById("splash"); function go(){ setTimeout(()=>s.classList.add("hide"),600); setTimeout(()=>{ if(s.parentNode) s.parentNode.removeChild(s); },1400); } if(document.readyState==="complete") go(); else window.addEventListener("load",go); })();
</script>
