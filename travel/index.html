const PDF_PLANE=`<svg viewBox="0 0 576 512" fill="currentColor"><path d="M482.3 192c34.2 0 93.7 29 93.7 64c0 36-59.5 64-93.7 64l-116.6 0L265.2 495.9c-5.7 10-16.3 16.1-27.8 16.1l-56.2 0c-10.6 0-18.3-10.2-15.4-20.4l49-171.6L112 320 68.8 377.6c-3 4-7.8 6.4-12.8 6.4l-42 0c-7.8 0-14-6.3-14-14c0-1.3 .2-2.6 .5-3.9L32 256 .5 145.9c-.4-1.3-.5-2.6-.5-3.9c0-7.8 6.3-14 14-14l42 0c5 0 9.8 2.4 12.8 6.4L112 192l102.9 0-49-171.6C162.9 10.2 170.6 0 181.2 0l56.2 0c11.5 0 22.1 6.2 27.8 16.1L365.7 192l116.6 0z"/></svg>`;

const pdfEsc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

/* ── trip in, document model out ── */
function pdfModel(trip,cur){
  const named=tripNodes(trip).filter(n=>n.name);
  const persons=Math.max(1,Math.round(num(trip.persons))||1);
  const accom=(trip.hotels||[]).reduce((s,h)=>s+hotelBase(h,trip),0);
  const trans=(trip.transports||[]).reduce((s,t)=>s+transportBase(t,trip),0);
  const sp=(trip.spend||[]).reduce((s,x)=>s+spendBase(x,trip),0);
  const misc=Object.values(trip.tripExpenses||{}).reduce((s,e)=>s+num(e.amount)*pax(e.persons,trip),0);
  const grand=accom+trans+sp+misc;
  const days=tripDays(trip.departDate,trip.returnDate);
  const nmOf=id=>{ const n=(trip.nodes||[]).find(x=>x.id===id); return n?(n.name||'—'):'—'; };
  const M=v=>cur+' '+Math.round(num(v)).toLocaleString('en-US');
  /* Inside a table the currency is stated once, in the column head. Repeating
     it on every row is what made the amounts read as ragged: a right-aligned
     column of "SAR 1,200" / "SAR 940" aligns its edge but not its digits, and
     in a narrow column the prefix pushed long figures into an ellipsis. */
  const N=v=>Math.round(num(v)).toLocaleString('en-US');
  const dash='—';
  const first=named[0], last=named.length>1?named[named.length-1]:named[0];

  return { M, grand, cur,
    name:trip.name||'Untitled trip',
    generated:(function(){const d=new Date();const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getDate()+' '+mo[d.getMonth()]+' '+d.getFullYear();})(),
    status:(trip.status||'draft').replace(/^./,c=>c.toUpperCase()),
    from:{code:(first&&cityCode(first.name))||'–––',city:(first&&first.name)||dash,
          date:prettyDate(trip.departDate)||dash},
    to:{code:(last&&cityCode(last.name))||'–––',city:(last&&last.name)||dash,
        date:prettyDate(trip.returnDate)||dash},
    route:routeNodes(trip),
    stats:[['Days',String(days>0?days:0)],['Cities',String(tripCities(trip))],['Guests',String(persons)],
           ['Transport',trans?M(trans):dash],['Hotels',accom?M(accom):dash],['Activities',sp?M(sp):dash]],
    tables:[
      { title:'Cities',
        cols:[['City',24,'name'],['Nights',9,'qty'],['Hotel',25,''],['Stays',14,'num'],['Transport',14,'num'],['Activities',14,'num']],
        rows:named.map(nd=>{
          const hs=(trip.hotels||[]).filter(h=>h.cityId===nd.id);
          const n=hs.reduce((s,h)=>{const d=daysBetween(h.checkIn,h.checkOut);return s+(d>0?d:0);},0);
          const ac=hs.reduce((s,h)=>s+hotelBase(h,trip),0);
          const tr=(trip.transports||[]).filter(t=>t.cityId===nd.id).reduce((s,t)=>s+transportBase(t,trip),0);
          const spc=(trip.spend||[]).filter(x=>x.cityId===nd.id).reduce((s,x)=>s+spendBase(x,trip),0);
          return [nd.name,String(n),hs[0]?(hs[0].name||dash):dash,N(ac),N(tr),N(spc)]; }) },
      { title:'Transportation',
        cols:[['City',15,'name'],['Type',11,''],['Provider',14,''],['Route',24,''],['Date',13,''],['Pax',7,'qty'],['Cost',16,'num']],
        rows:(trip.transports||[]).map(t=>[nmOf(t.cityId),(TRANSPORT_TYPES[t.type]||{label:t.type}).label,
          t.provider||dash,(t.from||'?')+' → '+(t.to||'?'),prettyDate(t.startDate)||dash,
          String(pax(t.persons,trip)),N(transportBase(t,trip))]) },
      { title:'Accommodation',
        cols:[['Hotel',30,'name'],['City',18,''],['Stay',25,''],['Nights',9,'qty'],['Cost',18,'num']],
        rows:(trip.hotels||[]).map(h=>{ const nd=(trip.nodes||[]).find(x=>x.id===h.cityId);
          const n=daysBetween(h.checkIn,h.checkOut);
          return [h.name||dash,(nd&&nd.name)||dash,(prettyDate(h.checkIn)||dash)+' – '+(prettyDate(h.checkOut)||dash),
            String(n>0?n:0),N(hotelBase(h,trip))]; }) },
      { title:'Activities',
        cols:[['Item',27,'name'],['City',17,''],['Category',17,''],['Date',14,''],['Pax',7,'qty'],['Cost',18,'num']],
        rows:(trip.spend||[]).map(x=>[x.name||dash,nmOf(x.cityId),x.category||dash,prettyDate(x.date)||dash,
          String(Math.max(1,Math.round(num(x.persons))||1)),N(spendBase(x,trip))]) },
      { title:'Global expenses', cols:[['Item',72,'name'],['Cost',28,'num']],
        rows:Object.entries(trip.tripExpenses||{}).filter(([k,e])=>num(e.amount)>0)
          .map(([k,e])=>[k.charAt(0).toUpperCase()+k.slice(1),N(num(e.amount)*pax(e.persons,trip))]) }
    ].filter(t=>t.rows.length)
  };
}

/* ── the fused head: masthead and boarding pass as one printed object ── */
function pdfHead(m){ return `<header class="head">
  <div class="head-top">
    <div class="l">
      <div class="kick">Travel Planner</div>
      <div class="tripname d">${pdfEsc(m.name)}</div>
      <div class="sub">Itinerary &amp; budget · ${pdfEsc(m.generated)} · ${pdfEsc(m.status)}</div>
    </div>
    <div class="head-total">
      <div class="cap capw">Total estimate</div>
      <div class="tv d">${pdfEsc(m.M(m.grand))}</div>
    </div>
  </div>
  <section class="pass">
    <div class="pass-main">
      <div class="route">
        <div class="rend"><div class="rcode d">${pdfEsc(m.from.code)}</div>
          <div class="rcity">${pdfEsc(m.from.city)}</div><div class="rdate">${pdfEsc(m.from.date)}</div></div>
        <div class="rmid"><span class="rline"></span>${PDF_PLANE}<span class="rline"></span></div>
        <div class="rend r"><div class="rcode d">${pdfEsc(m.to.code)}</div>
          <div class="rcity">${pdfEsc(m.to.city)}</div><div class="rdate">${pdfEsc(m.to.date)}</div></div>
      </div>
      <div class="stats">${m.stats.map(([l,v])=>
        `<div class="st"><div class="cap">${pdfEsc(l)}</div>
         <div class="stv d${v==='—'?' nil':''}">${pdfEsc(v)}</div></div>`).join('')}</div>
    </div>
    <div class="rib"></div>
  </section>
</header>`; }

const pdfMeta=m=>`<div class="meta">
  <b>Route</b><i>·</i>${(m.route.length?m.route:['—']).map(pdfEsc).join(' &rarr; ')}<br/>
  <b>Status</b><i>·</i>${pdfEsc(m.status)}<i>·</i><b>Base currency</b><i>·</i>${pdfEsc(m.cur)}</div>`;

/* a section rendered with a chosen slice of its rows, so a long table can
   continue onto the next page without losing its header */
function pdfSection(t,rows,cont,cur){
  const head=t.cols.map(c=>{
    const kind=(c[2]==='num'||c[2]==='qty')?c[2]:'';
    /* the currency rides in the head so the column below it is pure digits */
    const unit=c[2]==='num'?` <span class="unit">${pdfEsc(cur||'')}</span>`:'';
    return `<th class="${kind}" style="width:${c[1]}%">${pdfEsc(c[0])}${unit}</th>`;
  }).join('');
  const body=rows.map(r=>'<tr>'+r.map((cell,i)=>
    `<td class="${t.cols[i][2]||''}${cell==='—'?' dim':''}">${pdfEsc(cell)}</td>`).join('')+'</tr>').join('');
  return `<section class="sect">
    <div class="sect-h"><h2 class="d">${pdfEsc(t.title)}${cont?' <span class="cont">continued</span>':''}</h2>
      <span class="n">${t.rows.length}</span><span class="ln"></span></div>
    <table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></section>`;
}

const pdfTotal=m=>`<section class="total"><div class="rib"></div>
  <div class="total-in"><span class="total-l">Grand total</span>
  <span class="total-v d">${pdfEsc(m.M(m.grand))}</span></div></section>`;

async function exportTripPDF(trip,cur){
  let jsPDF,h2c;
  try{ const r=await Promise.all([loadJsPDF(),loadHtml2Canvas()]); jsPDF=r[0]; h2c=r[1]; }
  catch(e){ try{ window.__tpToast&&window.__tpToast('Could not load the PDF library — check your connection'); }catch(_){} return; }

  trip=migrateTrip(trip);
  const m=pdfModel(trip,cur);

  /* Read the theme at the moment of export, not at load: the sheet is rebuilt
     on every press, so toggling dark and exporting again gives a dark PDF. */
  const dark=document.documentElement.classList.contains('dark');
  const pal=PDF_THEME[dark?'dark':'light'];

  /* the document is built off-screen at true A4 pixel size, then captured */
  let style=document.getElementById('tpdoc-css');
  if(!style){ style=document.createElement('style'); style.id='tpdoc-css'; document.head.appendChild(style); }
  style.textContent=pdfCSS(dark);

  const host=document.createElement('div'); host.className='tpdoc'; document.body.appendChild(host);

  const newPage=first=>{ const pg=document.createElement('div'); pg.className='pg';
    pg.innerHTML=(first?pdfHead(m):'')+'<div class="body"></div>'+
      '<div class="foot"><span>Generated by Travel Planner · stored locally on your device</span><span></span></div>';
    host.appendChild(pg); return pg; };

  let pg=newPage(true), bodyEl=pg.querySelector('.body');
  /* `.body` is a flex child that stretches, so its scrollHeight always equals
     its own height — useless for measuring. The real content height is the
     bottom edge of the last block relative to the top of the body. */
  const room=()=>pg.querySelector('.foot').getBoundingClientRect().top-bodyEl.getBoundingClientRect().top;
  const used=()=>{ const last=bodyEl.lastElementChild; if(!last) return 0;
    return last.getBoundingClientRect().bottom-bodyEl.getBoundingClientRect().top; };
  const fits=()=>used()<=room();
  const push=html=>{ const w=document.createElement('div'); w.innerHTML=html;
    const node=w.firstElementChild; bodyEl.appendChild(node); return node; };
  const breakPage=()=>{ pg=newPage(false); bodyEl=pg.querySelector('.body'); };

  push(pdfMeta(m));

  /* Lay each table out, splitting its rows across pages when it runs long.
     At least one row is always placed per pass, so `remaining` strictly
     shrinks and the loop cannot spin. A section header needs roughly 90px of
     runway to be worth starting, so anything tighter breaks first. */
  const HEADROOM=90;
  for(let ti=0;ti<m.tables.length;ti++){
    const t=m.tables[ti]; let remaining=t.rows.slice(), cont=false;
    while(remaining.length){
      if(bodyEl.childElementCount && used()>room()-HEADROOM) breakPage();
      const node=push(pdfSection(t,remaining,cont,m.cur));
      if(fits()){ remaining=[]; break; }
      const tb=node.querySelector('tbody');
      while(tb.rows.length>1 && !fits()) tb.deleteRow(tb.rows.length-1);
      remaining=remaining.slice(tb.rows.length); cont=true;
      if(remaining.length) breakPage();
    }
  }

  const totalNode=push(pdfTotal(m));
  if(!fits()){ totalNode.remove(); breakPage(); push(pdfTotal(m)); }

  const pages=[].slice.call(host.querySelectorAll('.pg'));
  pages.forEach((p,i)=>{ p.querySelector('.foot').lastElementChild.textContent=
    pages.length>1?('Page '+(i+1)+' of '+pages.length):''; });

  try{
    try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready; }catch(_){}
    const pdf=new jsPDF({unit:'pt',format:'a4'});
    const W=pdf.internal.pageSize.getWidth(), H=pdf.internal.pageSize.getHeight();
    for(let i=0;i<pages.length;i++){
      /* no width/height/windowWidth overrides — html2canvas clones into an
         iframe sized to `windowWidth`, and a scrollbar there shaves the last
         column off. Letting it size from the element keeps it exact. */
      const cv=await h2c(pages[i],{scale:3,backgroundColor:pal.page,useCORS:true});
      if(i) pdf.addPage();
      pdf.addImage(cv.toDataURL('image/jpeg',0.94),'JPEG',0,0,W,H,undefined,'FAST');
    }
    pdf.save((trip.name||'trip').replace(/\s+/g,'-').toLowerCase()+'-itinerary.pdf');
  }catch(e){ try{ window.__tpToast&&window.__tpToast('Could not build the PDF'); }catch(_){} }
  finally{ host.remove(); }
}

/* ============================ TRIPS / HISTORY ============================ */
function tripTotals(t0){ const trip=migrateTrip(t0);
  const accommodation=(trip.hotels||[]).reduce((s,h)=>s+hotelBase(h,trip),0); const transport=(trip.transports||[]).reduce((s,t)=>s+transportBase(t,trip),0); const sp=(trip.spend||[]).reduce((s,x)=>s+spendBase(x,trip),0); const misc=Object.values(trip.tripExpenses||{}).reduce((s,e)=>s+num(e.amount)*pax(e.persons,trip),0);
  return {grand:accommodation+transport+sp+misc,days:tripDays(trip.departDate,trip.returnDate),cities:tripCities(trip)}; }

/* ===== how soon? one number, one bar — the same language as the routine card ===== */
function tripCountdown(t){
  const dep=t.departDate||"", ret=t.returnDate||dep;
  if(!dep) return {num:"\u2014", lab:"set your dates", pct:0, a:"\u2014", b:"\u2014",
    cls:"tp-num-past", barCls:"tp-bar-past"};
  const d0=new Date(dep+"T00:00:00"), d1=new Date((ret||dep)+"T00:00:00");
  const today=new Date(); today.setHours(0,0,0,0);
  const DAY=86400000;
  const fmtD=iso=>{ const x=new Date(iso+"T00:00:00");
    return isNaN(x)?"\u2014":x.toLocaleDateString(undefined,{month:"short",day:"numeric"}); };
  const A=fmtD(dep), B=fmtD(ret||dep);
  if(today<d0){
    const days=Math.ceil((d0-today)/DAY);
    const span=Math.max(1,Math.round((d1-d0)/DAY));
    return {num:days, lab:days===1?"day until departure":"days until departure",
      pct:Math.max(4,Math.min(100, Math.round(100*(1-Math.min(days,90)/90)))),
      a:A,b:B, cls:"tp-num-soon", barCls:"tp-bar-soon"};
  }
  if(today<=d1){
    const inDays=Math.round((today-d0)/DAY);
    const total=Math.max(1,Math.round((d1-d0)/DAY));
    const left=total-inDays;
    return {num:inDays===0?"Today":inDays, lab:inDays===0?"departure day":`days in \u2014 ${left} left`,
      pct:Math.round(100*inDays/total), a:A,b:B, cls:"tp-num-live", barCls:"tp-bar-live"};
  }
  const back=Math.round((today-d1)/DAY);
  return {num:back, lab:back===1?"day since you returned":"days since you returned", pct:100,
    a:A,b:B, cls:"tp-num-past", barCls:"tp-bar-past"};
}

/* Cloud sync, rebuilt in the Settings language: same card, same padding, same

   column stops looking like a card borrowed from another screen. A status
   strip states plainly which of the three situations you are in. */
/* The project configuration is gone: there is nothing to connect, because the
   Hub, Finance and Travel are one workspace on one Supabase project. What is
   left is the only thing that was ever a decision — who is signed in. */
function CloudCard({cloud}){
  const {session,status,signOut}=cloud;

  /* The sync status belongs in the strip, not as a line appended under the
     buttons: it is a change of state, not a new piece of content. Idle means
     the last sync finished, so the strip settles on "Synced". */
  const failed=/^Sync error/i.test(status||'');
  const state = session
    ? { cls: failed?'half':'on',
        label: failed? 'Sync failed' : (/^Syncing/i.test(status||'') ? 'Syncing…' : 'Synced'),
        detail: session.user.email }
    : { cls:'off', label:'Not signed in', detail:'Stored on this device' };

  return (<section className="s-card s-panel">
    <h3>Workspace sync</h3>
    <div className="note">Trips stay in step across your devices, and across the Hub and Finance —
      one account for all three. Receipt images stay on the device that added them.</div>

    <div className={'s-state '+state.cls}>
      <i/><b>{state.label}</b><span>{state.detail}</span>
    </div>

    {session
      ? (<React.Fragment>
          <div className="s-acts"><Btn variant="ghost" onClick={signOut}>Sign out</Btn></div>
          {failed&&<div className="s-msg">{status}</div>}
        </React.Fragment>)
      : <div className="s-msg">Signing in anywhere in the workspace signs you in here.</div>}
  </section>); }

  const rememberSec=(sec)=>{ if(currentId&&['plan','budget','map','timeline'].includes(sec)){ lastSecRef.current={...lastSecRef.current,[currentId]:sec}; try{localStorage.setItem('tp_lastsec_v1',JSON.stringify(lastSecRef.current));}catch(e){} } };
  const goSection=(sec)=>{ setView(sec); rememberSec(sec); };
  const switchTrip=(id)=>{ setCurrentId(id); prevCur.current=(trips[id]&&trips[id].baseCurrency)||'SAR'; const sec=(lastSecRef.current&&lastSecRef.current[id])||'plan'; setView(sec); setSwOpen(false); setSwq(''); setSwHi(0); };
  const togglePin=(id,e)=>{ if(e)e.stopPropagation(); setPinned(p=>({...p,[id]:!p[id]})); };
  const saveTrip=()=>{ setTrips(ts=>{ const t=ts[currentId]; if(!t)return ts; return {...ts,[currentId]:{...t,status:t.status==='draft'?'active':t.status,updatedAt:Date.now()}}; }); showToast('Trip saved'); setView('trips'); };
  const [confirmDel,setConfirmDel]=useState(null);
  const doDelete=(id)=>{
    const snapshot=trips[id];
    /* a tombstone that KEEPS the payload — a delete must be undoable, and the cloud must not
       destroy the trip's contents the moment you tap the button */
    setTrips(ts=>{ if(!ts[id])return ts; return {...ts,[id]:{...ts[id],__deleted:true,updatedAt:Date.now()}}; });
    if(currentId===id)setCurrentId(null);
    setUndo({id, trip:snapshot});
    setToast(null);
    setTimeout(()=>setUndo(u=>(u&&u.id===id)?null:u), 8000);
  };
  const undoDelete=()=>{
    if(!undo)return;
    const {id,trip}=undo;
    setTrips(ts=>({...ts,[id]:{...trip,__deleted:false,updatedAt:Date.now()}}));
    setUndo(null); showToast('Trip restored');
  };
  const action=(kind,id,val)=>{ if(kind==='delete'){ setConfirmDel(id); return; }
    if(kind==='duplicate'){ const src=trips[id]; if(!src||src.__deleted)return; const copy={...JSON.parse(JSON.stringify(src)),id:uid(),name:(src.name||'Trip')+' (copy)',status:'draft',createdAt:Date.now(),updatedAt:Date.now()}; setTrips(ts=>({...ts,[copy.id]:copy})); showToast('Duplicated'); return; }
    setTrips(ts=>{ const t=ts[id]; if(!t)return ts; const status=kind==='status'?val:kind==='complete'?'completed':kind==='archive'?'archived':kind==='activate'?'active':t.status; return {...ts,[id]:{...t,status,updatedAt:Date.now()}}; });
    /* Under an active filter the card leaves the list the moment its status changes.
       That is right, but silent - so say where it went. */
    if(kind==='status'){ const lb=(STATUS_META[val]||{}).label||val; showToast('Moved to '+lb); } };

  function changeCurrency(next){ const from=prevCur.current||cur; if(from===next||!currentTrip)return;
    const cv=v=>v===''||v==null?v:String(+convertAmount(num(v),from,next).toFixed(2));
    setTrip(t=>({...t,baseCurrency:next,
      transports:t.transports.map(x=>({...x,cost:cv(x.cost)})),
      hotels:t.hotels.map(h=>({...h,perNight:cv(h.perNight),taxes:cv(h.taxes)})),
      cityBudgets:Object.fromEntries(Object.entries(t.cityBudgets).map(([k,b])=>[k,Object.fromEntries(Object.entries(b||{}).map(([x,v])=>[x,cv(v)]))])),
      tripExpenses:Object.fromEntries(Object.entries(t.tripExpenses).map(([k,e])=>[k,{...e,amount:cv(e.amount)}])),
    })); prevCur.current=next; }

  const needsTrip=['plan','map','budget','timeline'].includes(view)&&!currentTrip;
  /* ── sidebar switcher: build grouped, searchable trip list ── */
  const _sbAll=Object.keys(trips).filter(id=>trips[id]&&!trips[id].__deleted).map(id=>({id,t:migrateTrip(trips[id])}));
  const _sbQ=swq.trim().toLowerCase();
  const _sbUpd=(a,b)=>(b.t.updatedAt||0)-(a.t.updatedAt||0);
  const _sbMatch=x=>!_sbQ||((x.t.name||'').toLowerCase().includes(_sbQ)||routeNodes(x.t).join(' ').toLowerCase().includes(_sbQ));
  const _sbF=_sbAll.filter(_sbMatch);
  const _sbPinned=_sbF.filter(x=>pinned[x.id]).sort(_sbUpd);
  const _sbRest=_sbF.filter(x=>!pinned[x.id]).sort(_sbUpd);
  const sbOrder=[..._sbPinned,..._sbRest];
  const sbIdx=new Map(); sbOrder.forEach((x,i)=>sbIdx.set(x.id,i));
  const sbKey=(e)=>{ if(e.key==='ArrowDown'){e.preventDefault();setSwHi(h=>Math.min(sbOrder.length-1,h+1));} else if(e.key==='ArrowUp'){e.preventDefault();setSwHi(h=>Math.max(0,h-1));} else if(e.key==='Enter'){e.preventDefault();const s=sbOrder[swHi]||sbOrder[0];if(s)switchTrip(s.id);} };
  const sbHash=(s)=>{let h=0;for(let i=0;i<(s||'x').length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;};
  /* covers stay strictly on-brand: lavender · lilac · peach · teal · iridescent */
  const SB_COVERS=['linear-gradient(135deg,#8a64c8,#623f94)','linear-gradient(135deg,#a081d6,#7a58bd)','linear-gradient(135deg,#f3b98e,#e08f5e)','linear-gradient(135deg,#7fd1c4,#4fa99b)','linear-gradient(135deg,#bba4e4,#8a64c8)','linear-gradient(135deg,#8a64c8,#f3b98e)'];
  const sbCover=(t)=>({background:SB_COVERS[sbHash(t.name||'x')%SB_COVERS.length]});
  const sbInit=(t)=>((t.name||'?').trim()[0]||'?').toUpperCase();
  const sbStatus=(t)=>(STATUS_META[t.status]||STATUS_META.draft).c;
  const sbChecks=currentTrip?tripChecks(currentTrip).length:0;
  const sbSearchIcon=<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>;
  const sbRow=(x)=>{ const i=sbIdx.get(x.id); return (
    <button key={x.id} onClick={()=>switchTrip(x.id)} onMouseEnter={()=>setSwHi(i)}
      className={`sb-row${x.id===currentId?' current':''}${i===swHi?' hi':''}`}>
      <span className="sb-row-name">{x.t.name||'Untitled trip'}</span>
      <span className="sb-row-sub">{trip_dates(x.t)}</span>
    </button>); };
  const NAV=[{id:'trips',label:'Trips',I:Ic.bag},{id:'map',label:'Map',I:Ic.map},{id:'budget',label:'Budget',I:Ic.chart},{id:'timeline',label:'Timeline',I:Ic.compass},{id:'settings',label:'Settings',I:Ic.gear}];
  const TOPNAV=[{id:'trips',label:'Trips'},...(currentTrip?[{id:'plan',label:'Plan'}]:[]),{id:'map',label:'Map'},{id:'budget',label:'Budget'},{id:'timeline',label:'Timeline'},{id:'settings',label:'Settings'}];
  /* The bottom bar used to be suppressed on Plan. Below 1024 the sidebar is
     hidden, so that left the Plan tab with no navigation at all on an iPad
     or a phone — you could reach Plan and not leave it. Nothing in Plan is
     fixed to the bottom, so there was no collision to avoid. It now always
     renders and the CSS hides it above 1024, where the sidebar takes over. */
  const showBottomNav=true;

  return (
    <Theme.Provider value={{dark}}>
      <div className={`tv-shell ${dark?'app-bg-dark text-lavender-50':'app-bg-light text-lavender-950'} font-sans transition-colors`} >
<aside className="tv-aside sb">
<button onClick={()=>setView('trips')} title="All trips" className="tv-logo sb-logo"><Logo logo={logo}/></button>

{/* current-trip card → opens the switcher */}
<button ref={swBtnRef} className={`sb-trip${swOpen?' open':''}`} onClick={()=>setSwOpen(o=>!o)} title="Switch trip (⌘K)">
  <span className="sb-trip-top">
    <span className="sb-trip-kick">{currentTrip?'Current trip':'No trip selected'}</span>
    <span className="sb-trip-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 9l4 4 4-4"/></svg></span>
  </span>
  <span className="sb-trip-name">{currentTrip?(currentTrip.name||'Untitled trip'):'Select a trip'}</span>
</button>

{/* trip sections */}
<div className="sb-navlabel">{currentTrip?'This trip':'Sections'}</div>
{[['plan','Plan'],['budget','Budget'],['map','Map'],['timeline','Timeline']].map(([id,label])=>(
  <button key={id} disabled={!currentTrip} onClick={()=>goSection(id)} className={`tv-nav sb-sec${view===id?' active':''}`}>
    <NavIcon id={id}/>{label}
  </button>))}

<div className="sb-spring"/>
<div className="sb-foot">
  <button onClick={()=>setView('trips')} className={`tv-nav sb-sec${view==='trips'?' active':''}`}><NavIcon id="trips"/>All trips</button>
  <button onClick={()=>setView('settings')} className={`tv-nav sb-sec${view==='settings'?' active':''}`}><NavIcon id="settings"/>Settings</button>
</div>

{/* switcher panel — portalled to <body> so position:fixed resolves against the
    viewport, not the aside (whose backdrop-filter would otherwise trap it) */}
{swOpen&&swPos&&(<Portal>
  <div className="sb-scrim" onClick={closeSwitcher}/>
  <div className="sb-switch" style={{left:swPos.left,top:swPos.top,width:swPos.width}} role="dialog" aria-label="Switch trip">
    {namePrompt===null&&_sbAll.length>5&&<div className="sb-search">{sbSearchIcon}
      <input autoFocus value={swq} onChange={e=>{setSwq(e.target.value);setSwHi(0);}} onKeyDown={sbKey} placeholder="Search trips…"/>
      {swq&&<button className="sb-clear" onClick={()=>{setSwq('');setSwHi(0);}}><Ic.close/></button>}</div>}
    <div className="sb-list">
      {sbOrder.length===0&&<div className="sb-empty">{_sbAll.length===0?'No trips yet':'No matches'}</div>}
      {_sbPinned.length>0&&<div className="sb-glabel">Pinned</div>}
      {_sbPinned.map(sbRow)}
      {_sbPinned.length>0&&_sbRest.length>0&&<div className="sb-div"/>}
      {_sbRest.map(sbRow)}
    </div>
    {namePrompt!==null?(
      <div className="sb-name">
        <input autoFocus value={namePrompt} onChange={e=>setNamePrompt(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter')createTrip(); else if(e.key==='Escape')setNamePrompt(null); }}
          placeholder="Name your trip…"/>
        <button className="sb-name-go" onClick={createTrip} title="Create trip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5 9-11"/></svg></button>
      </div>
    ):(
      <button className="sb-new" onClick={()=>setNamePrompt('')}><Ic.plus/>New trip</button>
    )}
  </div>
</Portal>)}
</aside>
<div className="tv-col">
        <header>
          <div className="tv-topbar">
<div className="tv-tbleft"><div>
<div className="tv-crumb">{view==='plan'?'Trips':view==='trips'?'Travel':view==='settings'?'Workspace':'Trip'}</div>
<h2 className="tv-title">{TOPNAV.find(t=>t.id===view)?(TOPNAV.find(t=>t.id===view).label):'Trips'}</h2>
</div></div>
            <div className="flex items-center gap-2">
              <a href="../" title="Back to your workspace" className="tv-ws rounded-full h-10 flex items-center gap-1.5 font-bold text-sm shadow-glow" style={{textDecoration:'none',background:'linear-gradient(120deg,#8a64c8 0%,#a081d6 40%,#f3b98e 100%)',color:'#fff'}}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" style={{width:15,height:15}}><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg><span className="tv-wslabel">Workspace</span></a>
              <button onClick={()=>setDark(!dark)} aria-label="Toggle theme" title="Toggle theme" className="tp-soft tp-round flex items-center justify-center">{dark? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:18,height:18}}><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg> : <svg viewBox="0 0 24 24" fill="currentColor" style={{width:18,height:18}}><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>}</button>
              {cloud.session ? <AvMenu cloud={cloud} onSettings={()=>setView('settings')}/> : <button onClick={()=>setAuthOpen(true)} className="tp-soft rounded-full h-10 px-4 flex items-center text-sm font-semibold">Sign in</button>}
            </div>
          </div>
        </header>

        <main className="tv-main" style={{paddingTop:20}}><div key={view} className="view-anim">
          {needsTrip? <Card className="p-10 text-center"><div className="font-display text-2xl iridescent-text mb-2">Pick a trip first</div><p className="text-sm text-lavender-300/70 mb-4">Open or create a trip to view its {view}.</p><div className="flex justify-center gap-2"><Btn onClick={()=>setView('trips')}>Go to Trips</Btn><Btn variant="soft" onClick={newTrip}><Ic.plus className="w-3.5 h-3.5"/>New trip</Btn></div></Card> :
            view==='trips'? <div className="space-y-4"><CloudBanner cloud={cloud} onOpen={()=>setAuthOpen(true)}/><TripsView trips={trips} onNew={newTrip} onEdit={editTrip} onAction={action}/></div> :
            view==='plan'&&currentTrip? <PlanView trip={currentTrip} setTrip={setTrip} cur={cur} onSave={saveTrip}/> :
            view==='map'&&currentTrip? <MapView trip={currentTrip} cur={cur}/> :
            view==='budget'&&currentTrip? <BudgetView trip={currentTrip} cur={cur}/> :
            view==='timeline'&&currentTrip? <TimelineView trip={currentTrip} cur={cur}/> :
            view==='settings'? <SettingsView dark={dark} setDark={setDark} logo={logo} setLogo={setLogo} cloud={cloud} onResetAll={()=>setConfirmReset(true)}/> : null}
        </div></main>

        {showBottomNav&&<nav className="fixed left-3 right-3 z-40 rounded-[28px] tp-bottombar" style={{bottom:'calc(10px + env(safe-area-inset-bottom))'}}>
          <div className="flex gap-1 px-[7px] py-[7px]">{NAV.map(t=>{ const on=view===t.id; return (<button key={t.id} onClick={()=>setView(t.id)} style={on?{background:'linear-gradient(140deg,#f3b98e 0%,#ec9d6a 45%,#dd824b 100%)',boxShadow:'0 6px 18px rgba(221,130,75,.5),inset 0 1px 0 rgba(255,255,255,.35)'}:undefined} className={`flex-1 flex flex-col items-center gap-1 px-2 py-2 rounded-[18px] text-[11px] font-bold tracking-wide transition ${on?'text-white':'text-white/55 hover:text-white/80'}`}><NavIcon id={t.id} className={`w-[19px] h-[19px] transition`}/>{t.label}</button>); })}</div>
        </nav>}

        {confirmReset&&<div role="dialog" aria-modal="true" className="fixed inset-0 z-[80] bg-black/70 modal-bg flex items-center justify-center p-4" onClick={()=>setConfirmReset(false)}>
          <div className="w-full max-w-sm rounded-2xl border border-peach-500/30 bg-indigo2-950 p-5 text-center" onClick={e=>e.stopPropagation()}>
            <div className="font-display text-xl mb-1">Delete every trip?</div>
            <p className="text-sm text-lavender-300/70 mb-4">All {Object.values(trips).filter(t=>t&&!t.__deleted).length} trips will be removed from this device and the cloud. This cannot be undone from here.</p>
            <div className="flex justify-center gap-2">
              <button onClick={()=>setConfirmReset(false)} className="text-sm px-4 py-2 rounded-xl border border-white/12 text-lavender-100 hover:bg-white/5">Keep my trips</button>
              <button onClick={()=>{ setConfirmReset(false);
                  setTrips(ts=>{ const n={}; for(const k in ts){ n[k]={...ts[k],__deleted:true,updatedAt:Date.now()}; } return n; });
                  setCurrentId(null); showToast('All trips deleted');
                }} className="text-sm px-4 py-2 rounded-xl bg-peach-500/20 border border-peach-500/40 text-peach-300 hover:bg-peach-500/30">Delete everything</button>
            </div>
          </div>
        </div>}
        {confirmDel&&<div role="dialog" aria-modal="true" className="tv-overlay" onClick={()=>setConfirmDel(null)}>
          <div className="tv-modal" onClick={e=>e.stopPropagation()}>
            <h3>Delete this trip?</h3>
            <p>{(trips[confirmDel]&&trips[confirmDel].name)||'This trip'} will be removed. You can undo for a few seconds.</p>
            <div className="tv-mactions">
              <button onClick={()=>setConfirmDel(null)} className="tv-chip">Cancel</button>
              <button onClick={()=>{ const id=confirmDel; setConfirmDel(null); doDelete(id); }} className="tv-chip" style={{color:'#ff9b92',borderColor:'rgba(255,155,146,.4)'}}>Delete</button>
            </div>
          </div>
        </div>}
        {undo&&<div role="status" aria-live="polite" className="tv-toast">
          <span>Trip deleted</span>
          <button onClick={undoDelete}>Undo</button>
        </div>}
        {toast&&<div role="status" aria-live="polite" className="tv-toast">{toast}</div>}
        {cloud.checked&&((authOpen&&!cloud.session)||(cloud.ready&&!cloud.session))&&<AuthModal cloud={cloud} onClose={()=>{ if(cloud.session) setAuthOpen(false); }} onSettings={()=>{setAuthOpen(false);setView('settings');}}/>}
      </div>
      </div>
    </Theme.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
/* another tab (same browser) wrote trips: reload them rather than let the last save win */
window.addEventListener("storage",function(e){
  if(e.key==="tp_trips_v1" || e.key==="tp_current_v1"){ try{ location.reload(); }catch(_){}
  }
});
</script>
</body>
</html>
