  const updH=(id,patch)=>setTrip(t=>({...t,hotels:(t.hotels||[]).map(x=>x.id===id?{...x,...patch}:x)}));
  const rmH=(id)=>setTrip(t=>({...t,hotels:(t.hotels||[]).filter(x=>x.id!==id)}));
  const addSp=(cityId)=>setTrip(t=>{ const wd=win[cityId]||{}; return {...t,spend:[...(t.spend||[]),{id:uid(),cityId,name:'',category:'Activity',desc:'',location:'',date:wd.arrive||t.departDate||'',time:'',persons:t.persons||'',perPerson:'',currency:t.baseCurrency||'SAR',ref:'',notes:'',attachments:[]}]}; });
  const updSp=(id,patch)=>setTrip(t=>({...t,spend:(t.spend||[]).map(x=>x.id===id?{...x,...patch}:x)}));
  const rmSp=(id)=>setTrip(t=>({...t,spend:(t.spend||[]).filter(x=>x.id!==id)}));
  const updTE=(k,patch)=>setTrip(t=>({...t,tripExpenses:{...t.tripExpenses,[k]:{...(t.tripExpenses[k]||{amount:'',attachments:[]}),...patch}}}));
  const TE=[['visa','Visa fees'],['insurance','Travel insurance'],['sim','eSIM / SIM'],['transfers','Airport transfers'],['luggage','Luggage fees'],['emergency','Emergency buffer']];
  const startNode=nodes.find(n=>n.anchor==='start')||nodes[0]; const endNode=nodes.find(n=>n.anchor==='end')||nodes[nodes.length-1];
  const nodeLabel=(n,i)=>n.anchor==='start'?'Start':n.anchor==='end'?'Return':'Stop '+i;
  const named=nodes.filter(n=>n.name);
    const cardBg='tv-group';
  const itemBg='pv-item';
  const dwin=(id)=>win[id]||{};

  /* ── The redesign in one idea: transports, hotels and spend are all keyed by
     cityId, so they belong to the city — not to three separate steps that each
     rebuild the same city list. Move / Sleep / Do are tabs inside a city.   */
  const railRef=useRef(null);
  const [openCity,setOpenCity]=useState(null);
  const [tabOf,setTabOf]=useState({});
  /* Marcellus draws an em dash as a long rule — it reads as a divider, not
     "nothing here". The placeholder alone drops back to Jakarta. */
  const D=<span className="tv-dash">—</span>;
  const TABKINDS=[['move','Move','plane'],['sleep','Sleep','hotel'],['do','Do','ticket']];
  const itemsOf=(id,k)=> k==='move' ? (trip.transports||[]).filter(x=>x.cityId===id)
                       : k==='sleep'? (trip.hotels||[]).filter(x=>x.cityId===id)
                       :              (trip.spend||[]).filter(x=>x.cityId===id);
  const kindTotal=(id,k)=>itemsOf(id,k).reduce((a,x)=>a+(k==='move'?transportBase(x,trip):k==='sleep'?hotelBase(x,trip):spendBase(x,trip)),0);
  const ADDLBL={move:'Add transport',sleep:'Add stay',do:'Add activity'};
  const NOLBL={move:'Nothing booked to get here yet.',sleep:'No stay booked here yet.',do:'Nothing planned here yet.'};
  const addOf={move:addTr,sleep:addH,do:addSp};
  /* hotel nights booked vs the length of the stay window — two different
     numbers that used to be shown as two bare "Nn" badges side by side */
  const coverage=(n)=>{
    const w=win[n.id]||{}; const a=n.arrive||w.arrive, d=n.depart||w.depart;
    const winN=(a&&d)?Math.max(0,daysBetween(a,d)):0;
    const htl=(trip.hotels||[]).filter(h=>h.cityId===n.id&&h.checkIn&&h.checkOut)
      .reduce((s,h)=>{const x=daysBetween(h.checkIn,h.checkOut);return s+(x>0?x:0);},0);
    return {winN,htl};
  };
  /* the line must span dot-centre to dot-centre; CSS cannot know where those are */
  const measureRail=()=>{ const r=railRef.current; if(!r)return;
    const dots=r.querySelectorAll('.tv-dot'); if(dots.length<2){ r.style.setProperty('--line-h','0px'); return; }
    const rb=r.getBoundingClientRect();
    const a=dots[0].getBoundingClientRect(), b=dots[dots.length-1].getBoundingClientRect();
    const top=a.top-rb.top+a.height/2;
    r.style.setProperty('--line-top',top+'px');
    r.style.setProperty('--line-h',(b.top-rb.top+b.height/2-top)+'px'); };
  useEffect(()=>{ measureRail(); const id=requestAnimationFrame(measureRail);
    if(document.fonts&&document.fonts.ready) document.fonts.ready.then(measureRail);
    window.addEventListener('resize',measureRail);
    let ro; if(window.ResizeObserver&&railRef.current){ ro=new ResizeObserver(measureRail); ro.observe(railRef.current); }
    return ()=>{ cancelAnimationFrame(id); window.removeEventListener('resize',measureRail); if(ro)ro.disconnect(); }; }, [nodes.length, openCity, trip.departDate, trip.returnDate])

  const covBadge=(n)=>{
    const {winN,htl}=coverage(n);
    if(!winN) return <span className="tv-slot"/>;
    if(!htl) return <span className="tv-badge2 warn" title={winN+' nights here with no stay booked'}><Ic.warn className="w-3 h-3"/>No stay</span>;
    const d=htl-winN;
    if(d===0) return <span className="tv-badge2 ok" title={htl+' hotel nights cover the '+winN+'-night stay'}><Ic.check className="w-3 h-3"/>Covered</span>;
    const k=Math.abs(d);
    return <span className="tv-badge2 warn" title={htl+' hotel nights against a '+winN+'-night stay'}><Ic.warn className="w-3 h-3"/>{k+' '+(d>0?'over':'short')}</span>;
  };

  return (
    <div className="tv-plan">

      {/* ── trip bar: the facts that are always true ── */}
      <div className="tv-tripbar" hidden>
        <div className="tv-band">
          <div className="tv-lead">
            <span className="tv-tripname">{trip.name||'Untitled trip'}</span>
            <div className="tv-facts">
              <span className="tv-fact"><span className="tv-cap2">Dates</span><b>{trip.departDate?prettyDate(trip.departDate)+' \u2192 '+(trip.returnDate?prettyDate(trip.returnDate):'\u2014'):'\u2014'}</b></span>
              <span className="tv-factdiv"/>
              <span className="tv-fact"><span className="tv-cap2">Length</span><b>{c.days>0?c.days+' days · '+c.nights+' nights':'\u2014'}</b></span>
              <span className="tv-factdiv"/>
              <span className="tv-fact"><span className="tv-cap2">Travellers</span><b>{c.persons}</b></span>
            </div>
          </div>
          <div className="tv-bandright">
            <div className="tv-fact tv-total"><span className="tv-cap2">Grand total</span><span className="tv-fig tv-fig-total">{fmt(c.grand,cur)}</span></div>
            <div className="tv-acts">
              <Btn variant="ghost" onClick={()=>exportTripPDF(trip,cur)} title="Export PDF"><Ic.pdf className="w-3.5 h-3.5"/>PDF</Btn>
              <Btn onClick={onSave} className="px-5"><Ic.save className="w-3.5 h-3.5"/>Save</Btn>
            </div>
          </div>
        </div>
      </div>

      {/* ── checks: speaks only when it has something to say ── */}
      {(checks.length>0)?(<Card className={`tv-checks slide-up ${errs?'err':'warn'}`}>
        <span className="tv-checks-ico">{errs?<Ic.stop className="w-4 h-4"/>:<Ic.warn className="w-4 h-4"/>}</span>
        <div><span className="tv-cap2">Date checks · {errs?`${errs} issue${errs>1?'s':''}`:`${warns} to review`}</span>
        <ul>{checks.map((w,i)=>(<li key={i}><span className={w.level==='error'?'text-peach-400':w.level==='warn'?'text-peach-300':'text-lavender-200/80'}>{w.msg}</span></li>))}</ul></div>
      </Card>):((trip.departDate&&trip.returnDate&&(trip.hotels||[]).length>0)?(
        <Card className="tv-checks good slide-up"><span className="tv-checks-ico"><Ic.check className="w-4 h-4"/></span>
        <div><span className="tv-cap2">Date checks</span><ul><li>Dates line up across every leg and stay.</li></ul></div></Card>):null)}

      {/* ── 1 · setup ── */}
      <Collapse step="1" kicker="Trip backbone" title="Start & return">
        <div className="bb">
          <div className="bb-main">
            <div className="bb-hdr"><Input className="bb-name" placeholder="e.g. Europe Summer" value={trip.name} onChange={e=>setT({name:e.target.value})}/></div>
            <div className="bb-rt">
              <div className="bb-end">
                <div className="bb-code">{(startNode&&cityCode(startNode.name))||'•••'}</div>
                <div className="bb-city">{startNode&&<CityAutocomplete value={startNode.name} onChange={v=>setNode(startNode.id,{name:v})} placeholder="Jeddah"/>}</div>
                <div className="bb-date"><DateField value={trip.departDate} onChange={d=>setT({departDate:d})} placeholder="Departure"/></div>
              </div>
              <div className="bb-mid"><span className="bb-line"/><span className="bb-plane"><Ic.planeR/></span><span className="bb-line"/></div>
              <div className="bb-end bb-r">
                <div className="bb-code">{(endNode&&cityCode(endNode.name))||'•••'}</div>
                <div className="bb-city">{endNode&&<CityAutocomplete value={endNode.name} onChange={v=>setNode(endNode.id,{name:v})} placeholder="Jeddah"/>}</div>
                <div className="bb-date"><DateField value={trip.returnDate} onChange={d=>setT({returnDate:d})} min={trip.departDate} placeholder="Return"/></div>
              </div>
            </div>
            {c.days<0&&<div className="bb-err">Return must be after departure</div>}
            <div className="bb-sum">
              <div className="tv-cap2 bb-sumcap">Trip summary</div>
              <div className="bb-stats">
                <div className="bb-i"><span className="bb-l">Days</span><span className="bb-v">{c.days>0?c.days:D}</span></div>
                <div className="bb-i"><span className="bb-l">Cities</span><span className="bb-v">{tripCities(trip)}</span></div>
                <div className="bb-i"><span className="bb-l">Guests</span>
                  <span className="bb-stp">
                    <button type="button" onClick={()=>setT({persons:Math.max(1,(Math.round(num(trip.persons))||1)-1)})} aria-label="One fewer traveller"><Ic.minus className="w-3 h-3"/></button>
                    <b className="bb-v">{c.persons}</b>
                    <button type="button" onClick={()=>setT({persons:(Math.round(num(trip.persons))||1)+1})} aria-label="One more traveller"><Ic.plus className="w-3 h-3"/></button>
                  </span></div>
                <div className="bb-i"><span className="bb-l">Transport</span><span className={'bb-v'+(c.transportTotal?' is-money':' is-empty')}>{c.transportTotal?fmt(c.transportTotal,cur):D}</span></div>
                <div className="bb-i"><span className="bb-l">Hotels</span><span className={'bb-v'+(c.accommodationTotal?' is-money':' is-empty')}>{c.accommodationTotal?fmt(c.accommodationTotal,cur):D}</span></div>
                <div className="bb-i"><span className="bb-l">Activities</span><span className={'bb-v'+(c.spendTotal?' is-money':' is-empty')}>{c.spendTotal?fmt(c.spendTotal,cur):D}</span></div>
              </div>
            </div>
          </div>
          <div className="bb-rib"/>
          <div className="bb-fare">
            <span className="bb-farecap">Total estimate</span>
            <span className="bb-faretot">{fmt(c.grand,cur)}</span>
          </div>
        </div>
        <div className="tv-setup" hidden>
          <Field label="Default travellers" hint="per-item default">
              <div className="tv-stepper">
                <button type="button" onClick={()=>setT({persons:Math.max(1,(Math.round(num(trip.persons))||1)-1)})} className="tv-step-btn" aria-label="One fewer traveller"><Ic.minus className="w-4 h-4"/></button>
                <Input className="no-spin text-center" type="number" min="1" value={trip.persons||1} onChange={e=>setT({persons:Math.max(1,Math.round(num(e.target.value))||1)})}/>
                <button type="button" onClick={()=>setT({persons:(Math.round(num(trip.persons))||1)+1})} className="tv-step-btn" aria-label="One more traveller"><Ic.plus className="w-4 h-4"/></button>
              </div></Field>
        </div>
        <div className="tv-sumhead" hidden><span className="tv-kicker">Trip summary</span><span className="tv-sumnote">· auto-calculated</span></div>
        <div className="tv-tiles" hidden>
          {[[Ic.cal,'Trip days',c.days>0?c.days:D,'teal'],[Ic.pin,'Cities',tripCities(trip),'lav'],[Ic.people,'Travellers',c.persons,'lilac'],
            [Ic.plane,'Transport',c.transportTotal?fmt(c.transportTotal,cur):D,'lav'],[Ic.hotel,'Hotels',c.accommodationTotal?fmt(c.accommodationTotal,cur):D,'lilac'],
            [Ic.ticket,'Activities / spend',c.spendTotal?fmt(c.spendTotal,cur):D,'peach'],[Ic.money,'Total est. cost',fmt(c.grand,cur),'hero']].map((b,i)=>{
            const hero=b[3]==='hero'; const I=b[0];
            return (<div key={i} className={'tv-tile'+(hero?' tv-tile-wide':'')} data-c={hero?'peach':b[3]}>
              <div className="tv-tile-cap"><I className="w-3.5 h-3.5 shrink-0"/><span className="truncate">{b[1]}</span></div>
              <div className={hero?'tv-fig':'tv-tile-v'}>{b[2]}</div></div>);})}
        </div>
      </Collapse>

      {/* ── 2 · itinerary: every city owns its transport, stays and spend ── */}
      <Collapse step="2" kicker="Itinerary" title="Where you go" right={<Btn onClick={addStop}><Ic.plus className="w-3.5 h-3.5"/>Add stop</Btn>}>
        <div className="tv-hint">Drag <Ic.drag className="w-3.5 h-3.5 inline align-text-bottom"/> to reorder · cities can repeat · dates auto-fill from your trip dates</div>
        <div className="pv-rail" ref={railRef}>
        {nodes.map((n,i)=>{ const nd=n; const info=infoById[n.id]; const prev=nodes[i-1];
          const suggest=prev&&prev.name?POPULAR_NEXT[cityKey(prev.name)]:null; const movable=!n.anchor;
          const open=openCity===n.id; const tab=tabOf[n.id]||'move'; const wd=win[n.id]||{};
          const list=itemsOf(n.id,tab); const tot=info?info.total:0;
          return (<div key={n.id}>
            <div onDragOver={e=>{if(!movable)return;e.preventDefault();if(overIdx!==i)setOverIdx(i);}} onDrop={()=>{ if(dragIdx!=null&&dragIdx!==i)reorder(dragIdx,i); setDragIdx(null);setOverIdx(null); }}
              className={`tv-city${open?' open':''}${n.anchor?' anchor':''}${overIdx===i&&dragIdx!=null&&dragIdx!==i?' drop':''}${dragIdx===i?' dragging':''}`}>
              <span className="tv-dot"/>
              <div className={"pass-row"+(i===0?" is-origin":"")}>
                <div className="pass-stub">
                  {movable
                    ? <span draggable onDragStart={e=>{setDragIdx(i);e.dataTransfer.effectAllowed='move';}} onDragEnd={()=>{setDragIdx(null);setOverIdx(null);}} title="Drag to reorder" className="pass-grip"><Ic.drag className="w-4 h-4"/></span>
                    : <span className="pass-icn0">{i===0?<Ic.takeoff className="w-4 h-4"/>:<Ic.landing className="w-4 h-4"/>}</span>}
                  <div className="pass-stubtext">
                    <span className="tv-cap2">{i===0?'Departure':(i===nodes.length-1?'Return':'Stop')}</span>
                    <div className="pass-code">{cityCode(n.name)||'\u2022\u2022\u2022'}</div>
                    <div className="pass-cityin"><CityAutocomplete value={n.name} onChange={v=>setNode(n.id,{name:v})} placeholder="City" suggestNext={suggest}/></div>
                  </div>
                </div>
                <div className="pass-body">
                  <div className="pass-leg">
                    <span className="pass-when">{n.name?<RangeField start={n.arrive||wd.arrive} end={n.depart||wd.depart} onStart={d=>setNode(n.id,{arrive:d})} onEnd={d=>setNode(n.id,{depart:d})} min={trip.departDate} max={trip.returnDate} labels={['Arrive','Depart']}/>:null}</span>
                    {/* The origin never accrues nights — you leave from home, you do not stay
                        there — so its badge always read "same day", which says nothing and
                        sits oddly under a single Depart date. Dropped on that row only; a
                        middle stop reading "same day" is real information (you passed
                        through without staying), so it is kept everywhere else. */}
                    <span className="pass-dur">{i===0?'':(coverage(n).winN>0?<><b>{coverage(n).winN}</b> nights</>:'same day')}</span>
                  </div>
                  <div className="pass-slot pass-stamp-slot">{covBadge(n)}</div>
                  <div className="pass-slot pass-fare-slot">{tot>0?<div className="pass-fare"><span className="tv-cap2">Budget</span><span className="pass-amt">{fmt(tot,cur)}</span></div>:null}</div>
                  <div className="pass-actions">
                    {movable
                      ? <button onClick={()=>removeNode(n.id)} className="pass-ico danger" title="Remove stop"><Ic.close className="w-4 h-4"/></button>
                      : <span className="pass-ico" style={{visibility:'hidden'}}/>}
                    <button type="button" className="pass-ico" onClick={()=>setOpenCity(open?null:n.id)} aria-label={open?'Collapse':'Expand'} aria-expanded={open}>
                      <Ic.down className="w-4 h-4" style={{transform:open?'rotate(180deg)':'none',transition:'transform .22s var(--ease)'}}/></button>
                  </div>
                </div>
              </div>
              {open&&<div className="tv-citybody">
                <div className="tv-tabs">{TABKINDS.map(([k,lbl,ic])=>{ const I=Ic[ic];
                  return (<button key={k} type="button" className={'tv-tab'+(k===tab?' on':'')} onClick={()=>setTabOf(o=>({...o,[n.id]:k}))}>
                    <I className="w-3.5 h-3.5"/>{lbl}<span className="tv-tab-n">{itemsOf(n.id,k).length}</span></button>);})}</div>
                {list.length===0
                  ? <Empty text={NOLBL[tab]}/>
                  : <div className="space-y-4">{tab==='move'?list.map((tr,ix)=>(<div key={tr.id} className={itemBg}>
                <div className="flex items-center gap-2 mb-2 text-sm font-semibold text-lavender-100">{(TRANSPORT_TYPES[tr.type]||{label:'Transport'}).label}<span className="text-[11px] font-normal text-lavender-300/50 ml-auto">#{ix+1}</span></div>
                <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
                  <Field label="Type"><FancySelect value={tr.type} options={Object.entries(TRANSPORT_TYPES).map(([k,v])=>({value:k,label:v.label}))} onChange={v=>{const p={type:v}; if(v==='car'){ if(!tr.startDate)p.startDate=wd.arrive||trip.departDate||''; if(!tr.endDate)p.endDate=wd.depart||trip.returnDate||''; } updTr(tr.id,p);}}/></Field>
                  <div className="lg:col-span-3"><Field label="Provider / company"><Input value={tr.provider} placeholder="e.g. Emirates, Hertz" onChange={e=>updTr(tr.id,{provider:e.target.value})}/></Field></div>
                  {/* A leg's From and To are city fields, so they get the same prediction the
                      stop rail uses. When empty they offer this trip's own route first —
                      a leg almost always runs between two cities already in the plan, and
                      picking from the list keeps the spelling matching the stop, which is
                      what cityCoord and cityCode need to resolve a place. */}
                  <Field label="From"><CityAutocomplete value={tr.from} onChange={v=>updTr(tr.id,{from:v,fromCityId:legCityId(trip,v)})} placeholder="From" suggestNext={routeNodes(trip)}/></Field>
                  <Field label="To"><CityAutocomplete value={tr.to} onChange={v=>updTr(tr.id,{to:v,toCityId:legCityId(trip,v)})} placeholder="To" suggestNext={routeNodes(trip)}/></Field>
                  {tr.type==='car'? <div className="sm:col-span-2 lg:col-span-2"><Field label="Rental period"><RangeField start={tr.startDate} end={tr.endDate} onStart={d=>updTr(tr.id,{startDate:d})} onEnd={d=>updTr(tr.id,{endDate:d})} min={trip.departDate} max={trip.returnDate} labels={['Pick-up','Drop-off']}/></Field></div> : <><Field label="Date"><DateField value={tr.startDate} onChange={d=>updTr(tr.id,{startDate:d})} min={trip.departDate} max={trip.returnDate}/></Field><Field label="End date" hint="opt"><DateField value={tr.endDate} onChange={d=>updTr(tr.id,{endDate:d})} min={tr.startDate||trip.departDate} max={trip.returnDate}/></Field></>}
                  <Field label="Start time" hint="opt"><TimeField value={tr.startTime} onChange={v=>updTr(tr.id,{startTime:v})}/></Field>
                  <Field label="End time" hint="opt"><TimeField value={tr.endTime} onChange={v=>updTr(tr.id,{endTime:v})}/></Field>
                  {tr.type==='car'? (()=>{ const ud=usageDays(tr); return (
                  <div className="sm:col-span-2 lg:col-span-2"><Field label="Cost / day" hint={ud+' day'+(ud>1?'s':'')+' · total '+fmt(num(tr.perDay)*ud,itemCur(tr,trip))}><div className="flex gap-2"><Input className="no-spin" type="number" min="0" value={tr.perDay} placeholder="0" onChange={e=>updTr(tr.id,{perDay:e.target.value})}/><CurSel value={tr.currency} onChange={v=>updTr(tr.id,{currency:v})}/></div></Field></div>
                  ); })() : <div className="sm:col-span-2 lg:col-span-2"><Field label="Cost / person" hint={'× '+pax(tr.persons,trip)+' pax · total '+fmt(num(tr.cost)*pax(tr.persons,trip),itemCur(tr,trip))}><div className="flex gap-2"><Input className="no-spin" type="number" min="0" value={tr.cost} placeholder="0" onChange={e=>updTr(tr.id,{cost:e.target.value})}/><CurSel value={tr.currency} onChange={v=>updTr(tr.id,{currency:v})}/></div></Field></div>}
                  <Field label="Passengers"><Input className="no-spin" type="number" min="1" value={tr.persons||''} placeholder={String(trip.persons||1)} onChange={e=>updTr(tr.id,{persons:e.target.value})}/></Field>
                  <Field label="Booking ref" hint="opt"><Input value={tr.ref} placeholder="ABC123" onChange={e=>updTr(tr.id,{ref:e.target.value})}/></Field>
                  <div className="sm:col-span-2 lg:col-span-2"><Field label="Notes" hint="opt"><Input value={tr.notes} placeholder="Seat, terminal…" onChange={e=>updTr(tr.id,{notes:e.target.value})}/></Field></div>
                </div>
                <AttachmentStrip attachments={tr.attachments} onChange={a=>updTr(tr.id,{attachments:a})}/>
                <div className="flex items-center justify-between mt-2 pt-2 border-t border-white/8">
                  <div className="flex items-center gap-1"><button onClick={()=>moveTr(tr.id,-1)} className="tv-move" aria-label="Move up"><Ic.up className="w-3.5 h-3.5"/></button><button onClick={()=>moveTr(tr.id,1)} className="tv-move" aria-label="Move down"><Ic.down className="w-3.5 h-3.5"/></button></div>
                  <div className="flex items-center gap-4"><span className="text-base font-extrabold iridescent-text">{fmt(transportBase(tr,trip),cur)}</span><button onClick={()=>rmTr(tr.id)} className="text-peach-400 hover:text-peach-300"><Ic.close className="w-4 h-4"/></button></div>
                </div>
              </div>)):tab==='sleep'?list.map(h=>{ const n=daysBetween(h.checkIn,h.checkOut); const rooms=Math.max(1,num(h.rooms)||1);
                    return (<div key={h.id} className={itemBg}>
                  <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <Field label="Hotel name"><Input value={h.name} placeholder="The Savoy" onChange={e=>updH(h.id,{name:e.target.value})}/></Field>
                    <div className="lg:col-span-2"><Field label="Google Maps link / address"><Input value={h.mapLink} placeholder="Paste Maps link or address" onChange={e=>updH(h.id,{mapLink:e.target.value})}/></Field></div>
                    <Field label="Cost / night"><div className="flex gap-2"><Input className="no-spin" type="number" min="0" value={h.perNight} placeholder="0" onChange={e=>updH(h.id,{perNight:e.target.value})}/><CurSel value={h.currency} onChange={v=>updH(h.id,{currency:v})}/></div></Field>
                    <div className="sm:col-span-2"><Field label="Stay dates" error={h.checkIn&&h.checkOut&&n<0?'Check-out before check-in':null}><RangeField start={h.checkIn} end={h.checkOut} onStart={d=>updH(h.id,{checkIn:d})} onEnd={d=>updH(h.id,{checkOut:d})} min={trip.departDate} max={trip.returnDate} labels={['Check-in','Check-out']}/></Field></div>

                  <div className="flex items-center justify-between mt-2 pt-2 border-t border-white/8"><span className="text-xs text-lavender-300/80">{n>0?n:0} nights × {fmt(num(h.perNight),itemCur(h,trip))}{rooms>1?` × ${rooms}`:''}</span>
                    <div className="flex items-center gap-4"><span className="text-base font-extrabold iridescent-text">{fmt(hotelBase(h,trip),cur)}</span><button onClick={()=>rmH(h.id)} className="text-peach-400 hover:text-peach-300"><Ic.close className="w-4 h-4"/></button></div></div>
                </div>); }):list.map(s=>(<div key={s.id} className={itemBg}>

                  <Field label="Category"><FancySelect value={s.category} options={[...new Set([...SPEND_CATS,...(s.category&&!SPEND_CATS.includes(s.category)?[s.category]:[])])].map(c=>({value:c,label:c}))} placeholder="Activity" onChange={v=>updSp(s.id,{category:v})}/></Field>
                  <Field label="Date"><DateField value={s.date} onChange={d=>updSp(s.id,{date:d})} min={dwin(nd.id).arrive||trip.departDate} max={dwin(nd.id).depart||trip.returnDate}/></Field>
                  <Field label="Time" hint="opt"><TimeField value={s.time} onChange={v=>updSp(s.id,{time:v})}/></Field>
                  <Field label="Persons"><Input className="no-spin" type="number" min="1" value={s.persons||''} placeholder={String(trip.persons||1)} onChange={e=>updSp(s.id,{persons:e.target.value})}/></Field>
                  <div className="sm:col-span-2 lg:col-span-2"><Field label="Price / person"><div className="flex gap-2"><Input className="no-spin" type="number" min="0" value={s.perPerson} placeholder="0" onChange={e=>updSp(s.id,{perPerson:e.target.value})}/><CurSel value={s.currency} onChange={v=>updSp(s.id,{currency:v})}/></div></Field></div>
                  <div className="sm:col-span-2 lg:col-span-2"><Field label="Location" hint="opt"><Input value={s.location} placeholder="Address / area" onChange={e=>updSp(s.id,{location:e.target.value})}/></Field></div>
                  <div className="sm:col-span-2 lg:col-span-2"><Field label="Booking ref" hint="opt"><Input value={s.ref} placeholder="Ref" onChange={e=>updSp(s.id,{ref:e.target.value})}/></Field></div>
                  <div className="sm:col-span-2 lg:col-span-4"><Field label="Notes / description" hint="opt"><Input value={s.desc} placeholder="Details…" onChange={e=>updSp(s.id,{desc:e.target.value})}/></Field></div>
                </div>
                <AttachmentStrip attachments={s.attachments} onChange={a=>updSp(s.id,{attachments:a})}/>
                <div className="flex items-center justify-between mt-2 pt-2 border-t border-white/8"><span className="text-xs text-lavender-300/80">{Math.max(1,Math.round(num(s.persons))||1)} × {fmt(num(s.perPerson),itemCur(s,trip))}</span>
                  <div className="flex items-center gap-4"><span className="text-base font-extrabold iridescent-text">{fmt(spendBase(s,trip),cur)}</span><button onClick={()=>rmSp(s.id)} className="text-peach-400 hover:text-peach-300"><Ic.close className="w-4 h-4"/></button></div></div>
              </div>))}</div>}
                <div className="tv-tabfoot">

                  <span className="tv-sum2">{fmt(kindTotal(n.id,tab),cur)}</span>

            {i<nodes.length-1&&<div className="tv-ins"><button onClick={()=>insertAt(i+1)} title="Insert a stop here"><Ic.plus className="w-3 h-3"/></button></div>}
          </div>); })}
        </div>
      </Collapse>

      {/* ── 3 · trip-wide ── */}
      <Collapse step="3" kicker="Outside the cities" title="Trip-wide costs" defaultOpen={false} right={<span className="tv-sum2">{fmt(c.miscTotal,cur)}</span>}>
        <div className="tv-wide">{TE.map(([k,lbl])=>{ const e=trip.tripExpenses[k]||{amount:'',attachments:[]};
          const lineTotal=num(e.amount)*pax(e.persons,trip);
          return (<div key={k} className="tv-wideitem tw-card">
            <span className="tw-l">{lbl}</span>
            <span className={`tw-fig${lineTotal>0?'':' is-zero'}`}>{fmt(lineTotal,cur)}</span>
            <div className="tw-foot">
              <span className="tw-chip"><em className="tw-cap">each</em><Input className="no-spin tw-in" type="number" min="0" value={e.amount} placeholder="0" onChange={ev=>updTE(k,{amount:ev.target.value})}/><em className="tw-cap">{cur}</em></span>
              <span className="tw-chip"><em className="tw-cap">×</em><Input className="no-spin tw-per" type="number" min="1" value={e.persons||''} placeholder={String(trip.persons||1)} onChange={ev=>updTE(k,{persons:ev.target.value})}/><em className="tw-cap">pax</em></span>
              <span className="tw-att"><AttachmentStrip compact attachments={e.attachments} onChange={a=>updTE(k,{attachments:a})}/></span>
            </div>
          </div>); })}</div>
      </Collapse>

      {/* actions live at the foot of the plan, after the last card */}
      <div className="bb-foot">
        <Btn variant="ghost" onClick={()=>exportTripPDF(trip,cur)} title="Export PDF"><Ic.pdf className="w-3.5 h-3.5"/>PDF</Btn>
        <Btn onClick={onSave} className="px-6"><Ic.save className="w-3.5 h-3.5"/>Save trip</Btn>
      </div>
    </div>); }


function HeatMap({cityInfo,cur}){ const data=cityInfo.filter(ci=>ci.total>0); if(data.length===0)return <Empty text="Add city budgets to see the spending heat map."/>;
  const max=Math.max(...data.map(d=>d.total));
  return (<div className="space-y-2">{data.map((ci)=>{ const pct=max?ci.total/max:0; return (
    <div key={ci.city.id} className="flex items-center gap-3"><div className="w-24 truncate text-sm text-lavender-200/90">{ci.city.name||'—'}</div>
      <div className="flex-1 h-7 rounded-lg overflow-hidden bg-white/5"><div className="h-full rounded-lg flex items-center justify-end pr-2" style={{width:`${Math.max(8,pct*100)}%`,background:`linear-gradient(90deg, rgba(138,100,200,.5), ${pct>0.66?'#f3b98e':pct>0.33?'#bba4e4':'#8a64c8'})`}}><span className="text-[11px] font-semibold text-white">{fmt(ci.total,cur)}</span></div></div>
    </div>); })}</div>); }
function Insight({label,value}){ return (<div className="flex justify-between items-center py-2 border-b border-white/8 last:border-0"><span className="text-xs text-lavender-300/70">{label}</span><span className="text-sm font-semibold text-lavender-100 text-right">{value}</span></div>); }

function buildTimeline(trip,cur){ const nodes=trip.nodes||[];
  const ev=[]; let seq=0; const push=(o)=>ev.push({seq:seq++,...o});
  push({date:trip.departDate,I:Ic.takeoff,title:trip.name||'Trip begins',sub:'Departure'+(nodes[0]&&nodes[0].name?' · '+nodes[0].name:''),tag:'Start'});
  const trOf=id=>(trip.transports||[]).filter(t=>t.cityId===id).sort((a,b)=>((a.startDate||'')+(a.startTime||'')).localeCompare((b.startDate||'')+(b.startTime||'')));
  const hOf=id=>(trip.hotels||[]).filter(h=>h.cityId===id).sort((a,b)=>(a.checkIn||'').localeCompare(b.checkIn||''));
  const spOf=id=>(trip.spend||[]).filter(s=>s.cityId===id&&s.date).sort((a,b)=>((a.date||'')+(a.time||'')).localeCompare((b.date||'')+(b.time||'')));
  nodes.forEach(n=>{ trOf(n.id).forEach(t=>{ const tm=t.startTime?' · '+t.startTime:''; const rt=(t.from&&t.to)?(t.from+' → '+t.to):(n.name||''); push({date:t.startDate,I:((TRANSPORT_TYPES[t.type]||{}).I||Ic.compass),title:(TRANSPORT_TYPES[t.type]||{label:'Transport'}).label+(rt?' · '+rt:''),sub:(t.provider?t.provider+' · ':'')+(n.name||'')+tm+(num(t.cost)?' · '+fmt(transportBase(t,trip),cur):''),tag:'Travel'}); });
    hOf(n.id).forEach(h=>{ const nn=daysBetween(h.checkIn,h.checkOut); if(h.checkIn) push({date:h.checkIn,I:Ic.hotel,title:'Check in · '+(h.name||'Hotel'),sub:(n.name||'')+' · '+(nn>0?nn:0)+' nights · '+fmt(hotelBase(h,trip),cur),tag:'Stay'}); if(h.checkOut) push({date:h.checkOut,I:Ic.bag,title:'Check out · '+(h.name||'Hotel'),sub:n.name||'',tag:'Stay'}); });
    spOf(n.id).forEach(s=>{ push({date:s.date,I:Ic.ticket,title:(s.name||'Activity'),sub:(s.category||'')+(s.time?' · '+s.time:'')+(spendNative(s)?' · '+fmt(spendBase(s,trip),cur):''),tag:'Plan'}); }); });
  push({date:trip.returnDate,I:Ic.landing,title:'Trip ends',sub:'Return'+(nodes.length&&nodes[nodes.length-1].name?' · '+nodes[nodes.length-1].name:''),tag:'End'});
  return ev; }

function TimelineList({trip,cur,compact}){ const {dark}=useContext(Theme); const ev=buildTimeline(trip,cur);
  if(ev.length===0) return <Empty text="Your timeline appears as you add dates."/>;
  return (<div className="relative pl-6"><div className="tl-line absolute left-[7px] top-2 bottom-2 w-px bg-gradient-to-b from-lavender-400/60 via-lavender-400/30 to-peach-400/50"></div>
    {ev.map((e,i)=>(<div key={i} className="relative mb-4 tl-item" style={{animationDelay:(i*0.08)+'s'}}><div className="absolute -left-[22px] top-1 w-4 h-4 rounded-full iridescent shadow-glow"></div>
      <div className="text-[11px] uppercase tracking-wide text-lavender-300/70 font-semibold">{compact?prettyDate(e.date):prettyDateFull(e.date)} · {e.tag}</div>
      <div className={`mt-0.5 text-sm font-semibold ${dark?'text-lavender-50':'text-lavender-950'}`}>{e.I&&<e.I className="w-4 h-4 inline mr-1.5 -mt-0.5 text-lavender-400"/>}{e.title}</div>
      {e.sub&&<div className="text-xs text-lavender-300/70">{e.sub}</div>}</div>))}</div>); }

/* ============================ BUDGET VIEW ============================
   A console of equal-height widgets. Each panel answers one question:
     ring        what the money is made of
     by city     which city costs most in absolute terms
     per night   which city is expensive once length of stay is removed
     make-up     what each city's money is made of
     transport   what moving around costs
     top items   which single line items dominate
     curve       when the money gets committed (daily / cumulative)
   Charts are hand-built SVG/CSS — no chart library. */

/* Distinct hues, not shades. The old ramp opened with three lavenders a few
   percent apart, so a legend was the only way to tell slices apart. These
   six are separable at a glance and still read as the brand: the two house
   colours lead, then one step around the wheel each time. */
const B_SWATCH=[
  '#8a64c8',  /* lavender - brand */
  '#f3b98e',  /* peach    - brand */
  '#4fbfb0',  /* teal             */
  '#6f7bd8',  /* indigo           */
  '#d2688f',  /* rose             */
  '#c9a227'   /* gold             */
];

function BPanel({title,note,seg,wide,children}){
  return (<section className={`b-card b-panel${wide?' wide':''}`}>
    <div className="b-head"><div className="t"><h3>{title}</h3><div className="note">{note}</div></div>{seg}</div>
    <div className="b-body">{children}</div>
  </section>); }

function BEmpty({title,text}){ return <div className="b-empty"><b>{title}</b>{text}</div>; }

function BBars({rows,cur,warm,wideL}){
  const max=Math.max(...rows.map(r=>r.value),0);
  return (<div className="b-bars">{rows.map((r,i)=>(
    <div key={i} className={`b-bar${warm?' warm':''}${wideL?' wideL':''}`}>
      <span className="lbl">{r.label}</span>
      <span className="t"><i style={{width:(max?r.value/max*100:0)+'%'}}/></span>
      <span className="d b-fig v">{fmt(r.value,cur)}</span>
    </div>))}</div>); }

function BRing({data,total,cur,size=150,stroke=17}){
  const R=size/2-stroke/2, C=2*Math.PI*R; let acc=0;
  const arcs=(data.length&&total>0)?data.map((d,i)=>{ const f=d.value/total, off=-acc*C; acc+=f;
      return <circle key={i} cx={size/2} cy={size/2} r={R} fill="none" stroke={B_SWATCH[i%B_SWATCH.length]}
        strokeWidth={stroke} strokeDasharray={`${f*C} ${C}`} strokeDashoffset={off}/>; })
    :[<circle key="e" cx={size/2} cy={size/2} r={R} fill="none" stroke="var(--b-figdim)" strokeWidth={stroke}/>];
  return (<div className="b-ring" style={{width:size,height:size}}>
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{arcs}</svg>
    <div className="mid"><span className="b-cap">Total</span><span className="d b-fig v">{fmt(total,cur)}</span></div>
  </div>); }

function BudgetView({trip,cur}){ const {dark}=useContext(Theme); const c=useComputed(trip);
  const [curve,setCurve]=useState('daily');
  const mostExp=[...c.cityInfo].sort((a,b)=>b.total-a.total)[0];
  const topCat=[...c.categoryBreakdown].sort((a,b)=>b.value-a.value)[0];
  const forecast=useMemo(()=>{ if(c.days<=0)return {labels:[],values:[]}; const start=trip.departDate; const arr=new Array(c.days).fill(0);
    c.cityInfo.forEach(ci=>{ const s=ci.arrive||start; const idx=Math.max(0,daysBetween(start,s)); const span=Math.max(1,ci.nights||1); const per=ci.total/span; for(let k=0;k<span&&idx+k<c.days;k++){arr[idx+k]+=per;} });
    (trip.transports||[]).forEach(t=>{ if(t.startDate){const idx=daysBetween(start,t.startDate); if(idx>=0&&idx<c.days)arr[idx]+=transportBase(t,trip);} });
    return {labels:arr.map((_,i)=>prettyDate(addDays(start,i))),values:arr.map(v=>Math.round(v))}; },[JSON.stringify(trip)]);

  /* the five largest single costs, whatever kind of record they came from */
  const topItems=useMemo(()=>{
    const out=[];
    (trip.hotels||[]).forEach(h=>out.push({label:h.name||'Hotel',value:hotelBase(h,trip)}));
    (trip.transports||[]).forEach(t=>out.push({label:(t.provider||((t.from||'?')+' → '+(t.to||'?'))),value:transportBase(t,trip)}));
    (trip.spend||[]).forEach(s=>out.push({label:s.name||s.category||'Activity',value:spendBase(s,trip)}));
    return out.filter(x=>x.value>0).sort((a,b)=>b.value-a.value).slice(0,5);
  },[JSON.stringify(trip)]);

  const cities=c.cityInfo.filter(x=>x.total>0);
  const perNight=c.cityInfo.filter(x=>x.total>0&&x.nights>0)
    .map(x=>({label:x.city.name||'—',value:Math.round(x.total/x.nights)})).sort((a,b)=>b.value-a.value);
  /* a transport type with no cost yet is noise, not data — drop it so the
     panel falls through to its empty state instead of drawing a bar of zero */
  const transportRows=Object.entries(c.transportByType).map(([k,v])=>({label:k,value:Math.round(v)}))
    .filter(x=>x.value>0).sort((a,b)=>b.value-a.value);
  const live=forecast.values.some(v=>v>0);
  const MAKEUP=['Accommodation','Transport','Activities'];

  if(c.grand===0&&tripNodes(trip).filter(n=>n.name).length===0) return <Empty text="Build a trip first — budget analytics will populate here."/>;

  return (<div className="tvb">
    <div className="b-tiles">
      <div className="b-card b-tile lead">
        <div style={{flex:1}}><div className="b-cap b-capw">Total trip cost</div>
          <div className="d b-fig v">{fmt(c.grand,cur)}</div></div>
        <div className="b-rib b-ribbon"/>
      </div>
      <div className="b-card b-tile"><div className="b-cap">Per day</div>
        <div className="d b-fig v">{fmt(c.avgDaily,cur)}</div></div>
      <div className="b-card b-tile"><div className="b-cap">Per person</div>
        <div className="d b-fig v">{fmt(c.grand/Math.max(1,c.persons),cur)}</div></div>
    </div>

    <div className="b-stats">
      {[['Days',c.days>0?c.days:0],['Cities',tripCities(trip)],
        ['Hotels',(trip.hotels||[]).length],['Flights',c.flights],['Trains',c.trains],['Guests',c.persons]]
       .map(([l,v])=>(<div key={l} className="b-card b-tile"><div className="b-cap">{l}</div>
         <div className={`d b-fig v${v===0?' b-nil':''}`}>{v}</div></div>))}
    </div>

    <div className="b-grid">
      <BPanel title="By category" note="What the money is made of.">
        {c.categoryBreakdown.length?(<div className="b-ringwrap">
          <BRing data={c.categoryBreakdown} total={c.grand} cur={cur}/>
          <div className="b-legend">{c.categoryBreakdown.map((d,i)=>(
            <div key={d.label} className="b-lg">
              <span className="dot" style={{background:B_SWATCH[i%B_SWATCH.length]}}/>
              <span className="n">{d.label}</span>
              <span className="d b-fig">{c.grand?((d.value/c.grand)*100).toFixed(1):0}%</span>
            </div>))}</div>
        </div>):<BEmpty title="Nothing logged yet" text="The ring fills in as you add hotels, transport or activities."/>}
      </BPanel>

      <BPanel title="By city" note="Total spend, ranked.">
        {cities.length?<BBars rows={cities.map(x=>({label:x.city.name||'—',value:Math.round(x.total)}))} cur={cur}/>
          :<BEmpty title="No city costs yet" text="Assign a cost to a city and it ranks here."/>}
      </BPanel>

      <BPanel title="Cost per night" note="Which city is expensive once length of stay is taken out.">
        {perNight.length?<BBars rows={perNight} cur={cur} warm/>
          :<BEmpty title="Not enough to compare" text="Cities need both a cost and nights booked before they can be ranked fairly."/>}
      </BPanel>

      <BPanel title="What each city is made of" note="The same categories, city by city.">
        {cities.length?(<React.Fragment>
          <div className="b-stacks">{cities.map(x=>(
            <div key={x.city.id} className="b-stackrow">
              <div className="top"><span className="nm">{x.city.name||'—'}</span>
                <span className="d b-fig" style={{fontSize:'.92rem'}}>{fmt(x.total,cur)}</span></div>
              <div className="b-stack">{[x.accom,x.transSum,x.spendSum].map((p,i)=>(
                <i key={i} style={{width:(x.total?p/x.total*100:0)+'%',background:B_SWATCH[i%B_SWATCH.length]}}/>))}</div>
            </div>))}</div>
          <div className="b-keys">{MAKEUP.map((n,i)=>(
            <span key={n}><i style={{background:B_SWATCH[i%B_SWATCH.length]}}/>{n}</span>))}</div>
        </React.Fragment>):<BEmpty title="No city costs yet" text="Once cities carry costs you can see how each one splits."/>}
      </BPanel>

      <BPanel title="Transport" note="What moving around costs.">
        {transportRows.length?<BBars rows={transportRows} cur={cur}/>
          :<BEmpty title="No transport logged" text="Flights, trains and transfers break down here."/>}
      </BPanel>

      <BPanel title="Biggest line items" note="The five costs doing the most damage.">
        {topItems.length?<BBars rows={topItems} cur={cur} wideL/>
          :<BEmpty title="Nothing logged yet" text="Your largest single costs will be listed here."/>}
      </BPanel>

      <BPanel wide title="When the money goes" note="Daily spend, or the running total across the trip."
        seg={<div className="b-seg">
          <button onClick={()=>setCurve('daily')} aria-pressed={curve==='daily'}>Daily</button>
          <button onClick={()=>setCurve('cumulative')} aria-pressed={curve==='cumulative'}>Cumulative</button>
        </div>}>
        {!live?<BEmpty title="No dated spending yet" text="Give items dates and the trip gets a spending curve."/>
        :curve==='daily'?(()=>{ const max=Math.max(...forecast.values,1);
          return (<React.Fragment>
            <div className="b-spark">{forecast.values.map((v,i)=>(
              <i key={i} style={{height:Math.max(2,v/max*100)+'%'}}/>))}</div>
            <div className="b-axis"><span>Day 1</span><span>Peak {fmt(max,cur)}</span><span>Day {c.days}</span></div>
          </React.Fragment>); })()
        :(()=>{ let run=0; const cum=forecast.values.map(v=>run+=v); const max=run||1; const n=cum.length;
          const pts=cum.map((v,i)=>`${(n>1?i/(n-1)*100:0).toFixed(2)},${(100-v/max*100).toFixed(2)}`).join(' ');
          return (<React.Fragment>
            <svg className="b-area" viewBox="0 0 100 100" preserveAspectRatio="none">
              {[25,50,75].map(y=>(<line key={y} x1="0" y1={y} x2="100" y2={y} stroke="var(--b-grid)"
                strokeWidth=".5" vectorEffect="non-scaling-stroke"/>))}
              <polygon points={`0,100 ${pts} 100,100`} fill="rgba(138,100,200,.16)"/>
              <polyline points={pts} fill="none" stroke="#8a64c8" strokeWidth="2"
                vectorEffect="non-scaling-stroke" strokeLinejoin="round"/>
            </svg>
            <div className="b-axis"><span>Day 1</span><span>Committed {fmt(run,cur)}</span><span>Day {c.days}</span></div>
          </React.Fragment>); })()}
      </BPanel>
    </div>
  </div>); }

/* ============================ TIMELINE & MAP VIEWS ============================ */
/* The Timeline tab is the journey spine — the object the Map tab used to
   carry. One widget, one grain. */
function TimelineView({trip,cur}){
  const {stops,legs}=useJourney(trip);
  const [focusIdx,setFocusIdx]=useState(-1);
  return (<div className="tvm">
    <section className="m-card m-panel">
      <h3>Journey</h3>
      <JourneySpine stops={stops} legs={legs} focusIdx={focusIdx} legIdx={-1}
        onFocus={setFocusIdx}/>
    </section>
  </div>);
}
/* ============================ MAP VIEW ============================
   A real globe with the journey drawn as great-circle arcs that play in
   order, a spine timeline whose patterned rail is the road, and destination
   plates. Geometry is computed, not drawn: haversine for distance, spherical
   interpolation for the arcs, with longitudes unrolled so a Pacific crossing
   does not streak back across a flat map. */

const M_TILES={
  dark :{base:'https://services.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}',
         ref :'https://services.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Reference/MapServer/tile/{z}/{y}/{x}',
         line:'#bba4e4', halo:'rgba(138,100,200,.32)', ground:'#f3b98e'},
  light:{base:'https://services.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}',
         ref :'https://services.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Reference/MapServer/tile/{z}/{y}/{x}',
         line:'#6d47b8', halo:'rgba(138,100,200,.22)', ground:'#b0632a'}
};
const M_ATTR='Tiles &copy; <a href="https://www.esri.com">Esri</a>';
const M_TEX={
  dark :{globe:'https://unpkg.com/three-globe/example/img/earth-night.jpg',
         done:'#bba4e4', active:'#f3b98e', todo:'rgba(187,164,228,.25)', ground:'#f3b98e', atmos:'#8a64c8'},
  light:{globe:'https://unpkg.com/three-globe/example/img/earth-day.jpg',
         done:'#5b3f96', active:'#b0632a', todo:'rgba(91,63,150,.22)', ground:'#b0632a', atmos:'#a081d6'}
};
const M_BUMP='https://unpkg.com/three-globe/example/img/earth-topology.png';

function loadScriptOnce(src,test){
  if(test()) return Promise.resolve();
  return new Promise((res,rej)=>{ const s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
}
function loadCssOnce(href,id){
  if(document.getElementById(id)) return;
  const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href=href;
  document.head.appendChild(l);
}
const loadLeaflet=()=>{ loadCssOnce('https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css','tvm-leaflet-css');
  return loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js',()=>window.L&&window.L.map); };
const loadGlobe=()=>loadScriptOnce('https://cdn.jsdelivr.net/npm/globe.gl@2.32.0/dist/globe.gl.min.js',()=>window.Globe);

/* ── geometry ── */
const M_R=6371, mrad=d=>d*Math.PI/180, mdeg=r=>r*180/Math.PI;
function mHaversine(a,b){
  const dLat=mrad(b.lat-a.lat), dLon=mrad(b.lon-a.lon);
  const s=Math.sin(dLat/2)**2+Math.cos(mrad(a.lat))*Math.cos(mrad(b.lat))*Math.sin(dLon/2)**2;
  return 2*M_R*Math.asin(Math.sqrt(s));
}
function mGcPoint(a,b,f){
  const p1=mrad(a.lat),l1=mrad(a.lon),p2=mrad(b.lat),l2=mrad(b.lon);
  const d=2*Math.asin(Math.sqrt(Math.sin((p2-p1)/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin((l2-l1)/2)**2));
  if(!d) return {lat:a.lat,lon:a.lon};
  const A=Math.sin((1-f)*d)/Math.sin(d), B=Math.sin(f*d)/Math.sin(d);
  const x=A*Math.cos(p1)*Math.cos(l1)+B*Math.cos(p2)*Math.cos(l2);
  const y=A*Math.cos(p1)*Math.sin(l1)+B*Math.cos(p2)*Math.sin(l2);
  const z=A*Math.sin(p1)+B*Math.sin(p2);
  return {lat:mdeg(Math.atan2(z,Math.sqrt(x*x+y*y))), lon:mdeg(Math.atan2(y,x))};
}
function mGreatCircle(a,b,n){ n=n||72; const out=[];
  for(let i=0;i<=n;i++){ const p=mGcPoint(a,b,i/n); out.push([p.lat,p.lon]); } return out; }
function mUnroll(pts){ const out=[pts[0].slice()];
  for(let i=1;i<pts.length;i++){ let lon=pts[i][1]; const prev=out[i-1][1];
    while(lon-prev>180) lon-=360; while(lon-prev<-180) lon+=360;
    out.push([pts[i][0],lon]); }
  return out; }
const mKM=v=>Math.round(v).toLocaleString('en-US')+' km';
const M_GROUND={train:1,bus:1,car:1,taxi:1,driver:1};
const mTime=(km,ground)=>{ const h=ground?(km/120+0.4):(km/860+0.66), H=Math.floor(h);
  return H+'h '+String(Math.round((h-H)*60)).padStart(2,'0')+'m'; };

const M_ICONS={
  play:'<svg viewBox="0 0 384 512" fill="currentColor"><path d="M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80L0 432c0 17.4 9.4 33.4 24.5 41.9s33.7 8.1 48.5-.9L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z"/></svg>',
  pause:'<svg viewBox="0 0 320 512" fill="currentColor"><path d="M48 64C21.5 64 0 85.5 0 112L0 400c0 26.5 21.5 48 48 48l32 0c26.5 0 48-21.5 48-48l0-288c0-26.5-21.5-48-48-48L48 64zm192 0c-26.5 0-48 21.5-48 48l0 288c0 26.5 21.5 48 48 48l32 0c26.5 0 48-21.5 48-48l0-288c0-26.5-21.5-48-48-48l-32 0z"/></svg>',
  plane:'<svg viewBox="0 0 576 512" fill="currentColor"><path d="M482.3 192c34.2 0 93.7 29 93.7 64c0 36-59.5 64-93.7 64l-116.6 0L265.2 495.9c-5.7 10-16.3 16.1-27.8 16.1l-56.2 0c-10.6 0-18.3-10.2-15.4-20.4l49-171.6L112 320 68.8 377.6c-3 4-7.8 6.4-12.8 6.4l-42 0c-7.8 0-14-6.3-14-14c0-1.3 .2-2.6 .5-3.9L32 256 .5 145.9c-.4-1.3-.5-2.6-.5-3.9c0-7.8 6.3-14 14-14l42 0c5 0 9.8 2.4 12.8 6.4L112 192l102.9 0-49-171.6C162.9 10.2 170.6 0 181.2 0l56.2 0c11.5 0 22.1 6.2 27.8 16.1L365.7 192l116.6 0z"/></svg>',
  train:'<svg viewBox="0 0 448 512" fill="currentColor"><path d="M96 0C43 0 0 43 0 96L0 352c0 48 35.2 87.7 81.1 94.9l-46 46C28.1 499.9 33 512 43 512l39.7 0c8.5 0 16.6-3.4 22.6-9.4L160 448l128 0 54.6 54.6c6 6 14.1 9.4 22.6 9.4l39.7 0c10 0 14.9-12.1 7.9-19.1l-46-46c46-7.1 81.1-46.9 81.1-94.9l0-256c0-53-43-96-96-96L96 0zM64 128c0-17.7 14.3-32 32-32l112 0 0 96L64 192l0-64zm176-32l112 0c17.7 0 32 14.3 32 32l0 64-144 0 0-96zM64 352a32 32 0 1 1 64 0 32 32 0 1 1 -64 0zm288-32a32 32 0 1 1 0 64 32 32 0 1 1 0-64z"/></svg>'
};

/* ── the journey, shared by the Map and Timeline tabs ────────────────────
   One derivation of stops and legs so both tabs agree on distances, modes
   and ordering. Stops without known coordinates are skipped rather than
   guessed at. */
function useJourney(trip){
  const c=useComputed(trip);
  const stops=useMemo(()=>c.cityInfo.filter(ci=>ci.city.name&&ci.coord).map(ci=>({
    id:ci.city.id, name:ci.city.name, code:cityCode(ci.city.name),
    lat:ci.coord.lat, lon:ci.coord.lon,
    nights:ci.nights, spend:ci.total, arrive:ci.arrive, depart:ci.depart,
    hotel:(ci.hotels[0]&&ci.hotels[0].name)||null,
    inType:(ci.inbound&&ci.inbound.type)||'flight'
  })),[JSON.stringify(trip)]);
  const legs=useMemo(()=>{ const out=[]; let acc=0;
    for(let i=0;i<stops.length-1;i++){
      const a=stops[i], b=stops[i+1], km=mHaversine(a,b), ground=!!M_GROUND[b.inType];
      out.push({i,a,b,km,ground,time:mTime(km,ground),from:acc}); acc+=km;
    }
    out.total=acc||1; return out; },[stops]);
  return {stops,legs};
}

/* the patterned rail is the road: numbered nodes on it, stops alternating
   either side, leg facts sitting on the rail between them */
function JourneySpine({stops,legs,focusIdx,legIdx,onFocus,onLeg}){
  if(!stops.length) return <Empty text="Add cities with known locations and the journey will draw itself."/>;
  return (<div className="spine">
    <div className="m-rib spine-rail"/>
    {stops.map((st,i)=>{
      const left=i%2===0, l=legs[i];
      const stop=(<div className="sp-stop" onClick={()=>onFocus&&onFocus(i)}>
        <span className="code">{st.code}</span>
        <b>{st.name}</b>
        <span>{(st.arrive?prettyDate(st.arrive):'—')+' – '+(st.depart?prettyDate(st.depart):'—')}
          {' · '}{st.nights?st.nights+' nights':'in transit'}</span>
      </div>);
      const legTxt=l&&(<span className="txt" onClick={()=>onLeg&&onLeg(l)}>
        <span className="ic" dangerouslySetInnerHTML={{__html:l.ground?M_ICONS.train:M_ICONS.plane}}/>
        <b>{mKM(l.km)}</b><span className="sep">·</span>{l.time}</span>);
      return (<React.Fragment key={st.id}>
        <div className={'sp-item'+(focusIdx===i?' on':'')}>
          <div className="sp-side l">{left?stop:null}</div>
          <div className="sp-node"><span className="n">{i+1}</span></div>
          <div className="sp-side">{left?null:stop}</div>
        </div>
        {l&&(<div className={'sp-leg'+(legIdx===l.i?' on':'')}>
          <div className="sp-side l">{left?null:legTxt}</div>
          <div className="sp-node"/>
          <div className="sp-side">{left?legTxt:null}</div>
        </div>)}
      </React.Fragment>);
    })}
  </div>);
}

function MapView({trip,cur}){
  const {dark}=useContext(Theme); const c=useComputed(trip);
  const [view,setView]=useState('globe');
  const [focusIdx,setFocusIdx]=useState(-1);
  const [legIdx,setLegIdx]=useState(0);

  const globeRef=useRef(null), globeObj=useRef(null);
  const mapRef=useRef(null), mapObj=useRef(null), mapTiles=useRef(null), mapLayers=useRef([]);
  const travelledRef=useRef(0), legRef=useRef(-1), rafRef=useRef(0);

  const {stops,legs}=useJourney(trip);

  const theme=dark?'dark':'light';

  /* ── playback: distance along the route is the clock, so leg 1 finishes
       before leg 2 starts and each leg takes time in proportion to its length */
  useEffect(()=>{
    if(!legs.length) return;
    const speed=legs.total/17000; let last=0;
    const tick=ts=>{
      const dt=last?ts-last:0; last=ts;
      travelledRef.current+=dt*speed;
      if(travelledRef.current>=legs.total) travelledRef.current=0;
      const km=travelledRef.current;
      let li=legs.length-1;
      for(let i=0;i<legs.length;i++) if(km<legs[i].from+legs[i].km){ li=i; break; }
      const l=legs[li], f=Math.max(0,Math.min(1,(km-l.from)/l.km));
      const p=mGcPoint(l.a,l.b,f);
      if(globeObj.current){
        globeObj.current.pointsData([{lat:p.lat,lng:p.lon}]);
        if(li!==legRef.current) globeObj.current.arcsData(arcData(li));
      }
      if(li!==legRef.current){ legRef.current=li; setLegIdx(li); }
      rafRef.current=requestAnimationFrame(tick);
    };
    rafRef.current=requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(rafRef.current);
  },[legs]);

  function arcData(activeAt){
    const t=M_TEX[theme], km=travelledRef.current;
    return legs.map(l=>{
      const state=km>=l.from+l.km?'done':(km>l.from?'active':'todo');
      return {startLat:l.a.lat,startLng:l.a.lon,endLat:l.b.lat,endLng:l.b.lon,
        state, ground:l.ground, idx:l.i,
        color: state==='todo'?t.todo : state==='active'?t.active : (l.ground?t.ground:t.done),
        label:`${l.a.name} → ${l.b.name} · ${mKM(l.km)} · ${l.time}`};
    });
  }
  function globeMarks(){
    const a=stops.map((s,i)=>({...s,kind:'stop',i}));
    const b=legs.map(l=>{ const m=mGcPoint(l.a,l.b,0.5);
      return {kind:'leg',i:l.i,lat:m.lat,lon:m.lon,ground:l.ground}; });
    return a.concat(b);
  }

  /* ── globe ── */
  useEffect(()=>{
    if(view!=='globe'||!stops.length) return;
    let dead=false;
    loadGlobe().then(()=>{
      if(dead||!globeRef.current) return;
      const t=M_TEX[theme];
      if(!globeObj.current){
        globeObj.current=window.Globe()(globeRef.current)
          .backgroundColor('rgba(0,0,0,0)')
          .showAtmosphere(true).atmosphereAltitude(0.17)
          .arcColor(d=>d.color)
          .arcStroke(d=>d.state==='active'?0.75:(d.state==='done'?0.45:0.28))
          .arcAltitude(d=>d.ground?0.015:null)
          .arcDashLength(d=>d.state==='active'?0.32:1)
          .arcDashGap(d=>d.state==='active'?0.5:0)
          .arcDashAnimateTime(d=>d.state==='active'?1600:0)
          .arcLabel(d=>d.label)
          .pointColor(()=>M_TEX[theme].active).pointAltitude(0.012).pointRadius(0.42)
          .htmlLat(d=>d.lat).htmlLng(d=>d.lon)
          .htmlAltitude(d=>d.kind==='leg'?(d.ground?0.03:0.13):0.02)
          .htmlElement(d=>{
            const w=document.createElement('div');
            if(d.kind==='leg'){
              w.className='tvm-glleg'; w.dataset.gl=d.i;
              w.innerHTML=`<div class="n">${d.i+1}</div>`;
              w.onclick=()=>{ travelledRef.current=legs[d.i].from+legs[d.i].km*0.02;
                legRef.current=-1; };
            } else {
              w.className='tvm-gl'; w.dataset.gi=d.i;
              w.innerHTML=`<div class="dot"></div><div class="nm">${(d.name||'').replace(/[&<>]/g,'')}</div>`;
              w.onclick=()=>focusStop(d.i);
            }
            return w;
          });
        globeObj.current.controls().enableDamping=true;
        globeObj.current.controls().autoRotate=false;
        globeObj.current.pointOfView({lat:30,lng:25,altitude:2.2},0);
      }
      globeObj.current.globeImageUrl(t.globe).bumpImageUrl(M_BUMP).atmosphereColor(t.atmos)
        .arcsData(arcData()).htmlElementsData(globeMarks());
      const el=globeRef.current;
      globeObj.current.width(el.clientWidth).height(el.clientHeight);
    }).catch(()=>{});
    return ()=>{ dead=true; };
  },[view,stops,legs,theme]);

  useEffect(()=>{
    const onResize=()=>{ if(globeObj.current&&globeRef.current)
      globeObj.current.width(globeRef.current.clientWidth).height(globeRef.current.clientHeight); };
    window.addEventListener('resize',onResize); return ()=>window.removeEventListener('resize',onResize);
  },[]);

  /* ── flat map ── */
  useEffect(()=>{
    if(view!=='flat'||!stops.length) return;
    let dead=false;
    loadLeaflet().then(()=>{
      if(dead||!mapRef.current) return;
      const L=window.L, t=M_TILES[theme];
      if(!mapObj.current){
        mapObj.current=L.map(mapRef.current,{zoomControl:true,worldCopyJump:true,minZoom:2}).setView([30,25],3);
      }
      if(mapTiles.current) mapObj.current.removeLayer(mapTiles.current);
      mapTiles.current=L.layerGroup([
        L.tileLayer(t.base,{attribution:M_ATTR,maxZoom:16}),
        L.tileLayer(t.ref ,{maxZoom:16,pane:'shadowPane'})
      ]).addTo(mapObj.current);
      mapLayers.current.forEach(l=>mapObj.current.removeLayer(l)); mapLayers.current=[];
      const bounds=[];
      legs.forEach(l=>{
        const pts=mUnroll(l.ground?[[l.a.lat,l.a.lon],[l.b.lat,l.b.lon]]:mGreatCircle(l.a,l.b,72));
        mapLayers.current.push(L.polyline(pts,{color:t.halo,weight:9,lineCap:'round'}).addTo(mapObj.current));
        mapLayers.current.push(L.polyline(pts,{color:l.ground?t.ground:t.line,weight:2.4,opacity:.95,
          dashArray:l.ground?'1 7':null,lineCap:'round'}).addTo(mapObj.current));
        pts.forEach(p=>bounds.push(p));
        const mid=mGcPoint(l.a,l.b,0.5);
        mapLayers.current.push(L.marker([mid.lat,mid.lon],{icon:L.divIcon({className:'tvm-legpin',
          iconSize:[22,22],iconAnchor:[11,11],html:`<div class="n">${l.i+1}</div>`})}).addTo(mapObj.current));
      });
      stops.forEach((s,i)=>{
        const term=i===0||i===stops.length-1;
        const m=L.marker([s.lat,s.lon],{icon:L.divIcon({className:'tvm-pin',iconSize:[30,30],iconAnchor:[15,15],
          html:`<div class="p${term?' term':''}">${i+1}</div>`})}).addTo(mapObj.current);
        m.on('click',()=>focusStop(i)); mapLayers.current.push(m); bounds.push([s.lat,s.lon]);
      });
      setTimeout(()=>{ mapObj.current.invalidateSize();
        if(bounds.length) mapObj.current.fitBounds(bounds,{padding:[46,46],maxZoom:9}); },40);
    }).catch(()=>{});
    return ()=>{ dead=true; };
  },[view,stops,legs,theme]);

  /* zoom on a globe is camera altitude — smaller is closer. Clamped so the
     camera can neither enter the surface nor drift off into space. */
  function zoomBy(f){
    if(!globeObj.current) return;
    const p=globeObj.current.pointOfView();
    globeObj.current.pointOfView({lat:p.lat,lng:p.lng,
      altitude:Math.max(0.32,Math.min(4,p.altitude*f))},320);
  }

  function focusStop(i){
    setFocusIdx(i); const s=stops[i]; if(!s) return;
    if(view==='globe'&&globeObj.current){
      globeObj.current.pointOfView({lat:s.lat,lng:s.lon,altitude:1.05},1100); }
    else if(mapObj.current) mapObj.current.flyTo([s.lat,s.lon],6,{duration:.9});
  }
  if(!stops.length) return <Empty text="Add cities with known locations and the route map will draw itself."/>;

  const first=stops[0], last=stops[stops.length-1];
  const nights=stops.reduce((t,s)=>t+s.nights,0);

  return (<div className="tvm">
    {/* summary ticket */}
    <section className="m-card tk">
      <div className="tk-left">
        <div className="tk-route">
          <div className="tk-end">
            <div className="tk-code">{first.code}</div>
            <div className="tk-city">{first.name}</div>
            <div className="tk-date">{prettyDate(trip.departDate)||first.arrive||'—'}</div>
          </div>
          <div className="tk-path"><span className="tk-line"/><Ic.planeR/><span className="tk-line"/></div>
          <div className="tk-end r">
            <div className="tk-code">{last.code}</div>
            <div className="tk-city">{last.name}</div>
            <div className="tk-date">{prettyDate(trip.returnDate)||last.depart||'—'}</div>
          </div>
        </div>
      </div>
      <div className="m-rib tk-rail"/>
      <div className="tk-grid">
        <div className="tk-g"><div className="m-cap">Distance</div><div className="v">{mKM(legs.total)}</div></div>
        <div className="tk-g"><div className="m-cap">Legs</div><div className="v">{legs.length}</div></div>
        <div className="tk-g"><div className="m-cap">Nights</div><div className="v">{nights||'—'}</div></div>
        <div className="tk-g"><div className="m-cap">Stops</div><div className="v">{stops.length}</div></div>
      </div>
    </section>

    {/* stage */}
    <section className="m-card stage">
      <div className="stagehead">
        <div className="t"><h2>The journey</h2>
          <div className="note">{stops.map(s=>s.name).join('  →  ')}</div></div>
        <div className="m-seg">
          <button onClick={()=>setView('globe')} aria-pressed={view==='globe'}>Globe</button>
          <button onClick={()=>setView('flat')} aria-pressed={view==='flat'}>Flat map</button>
        </div>
      </div>
      <div className="view globe" hidden={view!=='globe'}>
        <div ref={globeRef} className="globe-canvas"/>
        <div className="gzoom">
          <button onClick={()=>zoomBy(0.72)} aria-label="Zoom in" title="Zoom in">+</button>
          <button onClick={()=>zoomBy(1/0.72)} aria-label="Zoom out" title="Zoom out">−</button>
        </div>
      </div>
      <div ref={mapRef} className="view flat" hidden={view!=='flat'}/>
    </section>

    {/* destinations */}
    <section className="m-card m-panel">
      <h3>Destinations</h3>
      <div className="dests">
        {stops.map((st,i)=>{ const inLeg=legs[i-1];
          const perNight=st.nights&&st.spend?fmt(Math.round(st.spend/st.nights),cur):'—';
          return (<section key={st.id} className={'m-card dest'+(focusIdx===i?' on':'')}
              onClick={()=>focusStop(i)}>
            <div className="m-rib dest-band"/>
            <div className="dest-head">
              <span className="t"><h4>{st.name}</h4>
                <span className="sub">Stop {i+1} of {stops.length}</span></span>
              <span className="dest-code">{st.code}</span>
            </div>
            <div className="dest-stats">
              <div><div className="m-cap">Nights</div>
                <div className={'v'+(st.nights?'':' soft')}>{st.nights||'—'}</div></div>
              <div><div className="m-cap">Spend</div>
                <div className={'v'+(st.spend?'':' soft')}>{st.spend?fmt(st.spend,cur):'—'}</div></div>
              <div><div className="m-cap">Per night</div>
                <div className={'v'+(perNight==='—'?' soft':'')}>{perNight}</div></div>
            </div>
            <div className="dest-rows">
              <div className="dest-row"><span>Dates</span>
                <b>{(st.arrive?prettyDate(st.arrive):'—')+' – '+(st.depart?prettyDate(st.depart):'—')}</b></div>
              <div className="dest-row"><span>Staying at</span>
                <b className={st.hotel?'':'soft'}>{st.hotel||'Not booked'}</b></div>
              <div className="dest-row"><span>Arrive by</span>
                <b className={inLeg?'':'soft'}>{inLeg?`Leg ${inLeg.i+1} · ${inLeg.ground?'Ground':'Flight'}`:'Trip start'}</b></div>
              <div className="dest-row"><span>From previous</span>
                <b className={inLeg?'':'soft'}>{inLeg?mKM(inLeg.km):'—'}</b></div>
            </div>
          </section>);
        })}
      </div>
    </section>
  </div>);
}

/* ── the exported document ─────────────────────────────────────────────────
   The PDF is laid out in real HTML/CSS off-screen and then captured, rather
   than drawn with vector commands. That means the export uses the same
   Marcellus / Plus Jakarta Sans webfonts and the same interlocking-ring
   ribbon as the app, and the layout lives in CSS instead of in hand-tuned
   coordinates.

   Design A4 "Fused": the boarding pass is set inside the tinted head block so
   the two read as a single printed head, with the total beside the trip name
   rather than in a side panel. ── */

async function loadHtml2Canvas(){ if(window.html2canvas) return window.html2canvas;
  await new Promise((res,rej)=>{ const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=res; s.onerror=rej; document.head.appendChild(s); });
  return window.html2canvas; }

/* ── ROW AND FIGURE ALIGNMENT ──────────────────────────────────────────────
   Three rules keep the columns true:
   · every cell shares one line-height and one vertical alignment, so a row
     with a descender does not sit a hair lower than its neighbours;
   · headers hang from a common baseline (vertical-align:bottom) instead of
     floating at the top of a taller cell;
   · anything countable — money, nights, guests — is right-aligned and set in
     tabular figures, so the digits stack in a true column. Money carries its
     currency in the header rather than on every value, which is what used to
     make the amounts read as ragged.                                        */
.tpdoc th{font-size:8.6px;font-weight:800;letter-spacing:.11em;text-transform:uppercase;color:${c.code};

  vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tpdoc tr:last-child td{border-bottom:0}
/* html2canvas clips a fraction tighter than the browser does, which shears
   the last glyph off right-aligned cells. Overflow clips at the padding
   box, so a few px of padding inside gives the glyph room to survive. */
.tpdoc th.num,.tpdoc td.num,
.tpdoc th.qty,.tpdoc td.qty{text-align:right;padding-right:3px}
