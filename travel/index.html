  let rem=Math.max(0,total-known); const baseN=unknown?Math.floor(rem/unknown):0; let extra=unknown?rem-baseN*unknown:0; let cursor=dep;
  stops.forEach((n,i)=>{ const arrive=n.arrive||cursor; let depart=n.depart; if(!depart){ let nights=kn[n.id]; if(!nights||nights<=0){ nights=baseN+(extra>0?1:0); if(extra>0)extra--; } const isLast=(i===stops.length-1)&&!endN; depart=isLast?(ret||addDays(arrive,nights)):addDays(arrive,nights); } out[n.id]={arrive,depart}; cursor=depart; });
  return out; }

const IDB={ db:null,
  open(){ return new Promise((res,rej)=>{ if(this.db)return res(this.db); const r=indexedDB.open('tp_files',1);
    r.onupgradeneeded=e=>{ e.target.result.createObjectStore('files',{keyPath:'id'}); };
    r.onsuccess=e=>{ this.db=e.target.result; res(this.db); }; r.onerror=e=>rej(e); }); },
  async put(id,blob,meta){ const db=await this.open(); return new Promise((res,rej)=>{ const tx=db.transaction('files','readwrite'); tx.objectStore('files').put({id,blob,...meta}); tx.oncomplete=()=>res(); tx.onerror=e=>rej(e); }); },
  async get(id){ const db=await this.open(); return new Promise((res,rej)=>{ const tx=db.transaction('files','readonly'); const rq=tx.objectStore('files').get(id); rq.onsuccess=()=>res(rq.result); rq.onerror=e=>rej(e); }); },
  async del(id){ const db=await this.open(); return new Promise((res)=>{ const tx=db.transaction('files','readwrite'); tx.objectStore('files').delete(id); tx.oncomplete=()=>res(); }); },
};
function usePersist(key,initial){
  const [v,setV]=useState(()=>{ try{const s=localStorage.getItem(key);return s?JSON.parse(s):initial;}catch{return initial;} });
  useEffect(()=>{ try{localStorage.setItem(key,JSON.stringify(v));}catch(e){} },[key,v]);
  return [v,setV];
}

function hotelCost(h){ const n=daysBetween(h.checkIn,h.checkOut); const r=Math.max(1,num(h.rooms)||1); return (n>0?n:0)*num(h.perNight)*r+num(h.taxes); }
function useComputed(trip){
  return useMemo(()=>{
    const {departDate,returnDate,tripExpenses={}}=trip; const hotels=trip.hotels||[]; const transports=trip.transports||[]; const spend=trip.spend||[];
    const nodes=tripNodes(trip); const defaultPax=pax(null,trip); const days=daysBetween(departDate,returnDate); const nights=days>0?days:0; const win=cityWindows(trip);
    const accommodationTotal=hotels.reduce((s,h)=>s+hotelBase(h,trip),0);
    const transportTotal=transports.reduce((s,t)=>s+transportBase(t,trip),0);
    const spendTotal=spend.reduce((s,x)=>s+spendBase(x,trip),0);
    const miscTotal=Object.values(tripExpenses).reduce((s,e)=>s+num(e.amount)*pax(e.persons,trip),0);
    const grand=accommodationTotal+transportTotal+spendTotal+miscTotal;
    const cityInfo=nodes.map((node,idx)=>{
      const ch=hotels.filter(h=>h.cityId===node.id); const ctr=transports.filter(t=>t.cityId===node.id); const csp=spend.filter(s=>s.cityId===node.id);
      const accom=ch.reduce((s,h)=>s+hotelBase(h,trip),0); const trans=ctr.reduce((s,t)=>s+transportBase(t,trip),0); const sp=csp.reduce((s,x)=>s+spendBase(x,trip),0);
      const cn=ch.reduce((s,h)=>{const n=daysBetween(h.checkIn,h.checkOut);return s+(n>0?n:0);},0);
      const wnd=win[node.id]||{arrive:'',depart:''};
      const arrive=(ch.map(h=>h.checkIn).filter(Boolean).sort()[0])||wnd.arrive||''; const depart=(ch.map(h=>h.checkOut).filter(Boolean).sort().slice(-1)[0])||wnd.depart||'';
      const nightsC=cn||(arrive&&depart?Math.max(0,daysBetween(arrive,depart)):0);
      return {city:{id:node.id,name:node.name},anchor:node.anchor,idx,hotels:ch,transports:ctr,spend:csp,nights:nightsC,accom,transSum:trans,spendSum:sp,inbound:ctr[0],outbound:ctr[ctr.length-1],arrive,depart,total:accom+trans+sp,coord:cityCoord(node.name)};
    });
    const catMap={Accommodation:accommodationTotal,Transport:transportTotal};
    spend.forEach(s=>{ const k=(s.category||'Other'); catMap[k]=(catMap[k]||0)+spendBase(s,trip); });
    if(miscTotal>0) catMap['Trip-wide']=miscTotal;
    const categoryBreakdown=Object.entries(catMap).map(([label,value])=>({label,value:Math.round(value)})).filter(d=>d.value>0);
    const transportByType={}; transports.forEach(t=>{ const k=(TRANSPORT_TYPES[t.type]||{label:t.type}).label; transportByType[k]=(transportByType[k]||0)+transportBase(t,trip); });
    const flights=transports.filter(t=>t.type==='flight').length; const trains=transports.filter(t=>t.type==='train').length;
    return {days,nights,accommodationTotal,transportTotal,spendTotal,cityBudgetTotal:spendTotal,miscTotal,grand,cityInfo,categoryBreakdown,transportByType,flights,trains,avgDaily:days>0?grand/days:0,persons:defaultPax,win};
  },[JSON.stringify(trip)]);
}

/* ============================ INTERACTIVE MAP ============================ */
const MW=1000,MH=500;
const proj=(lon,lat)=>[(lon+180)/360*MW,(90-lat)/180*MH];
function qPoint(p0,p1,p2,t){ const mt=1-t; return [mt*mt*p0[0]+2*mt*t*p1[0]+t*t*p2[0], mt*mt*p0[1]+2*mt*t*p1[1]+t*t*p2[1]]; }
function qTangent(p0,p1,p2,t){ const dx=2*(1-t)*(p1[0]-p0[0])+2*t*(p2[0]-p1[0]); const dy=2*(1-t)*(p1[1]-p0[1])+2*t*(p2[1]-p1[1]); return Math.atan2(dy,dx)*180/Math.PI; }
function lineStyle(type){ switch(type){
  case 'flight': return {w:1.8,dash:'7 7',curve:0.30,anim:true};
  case 'train': return {w:2.0,dash:null,curve:0.06,anim:false};
  case 'bus': return {w:1.8,dash:'1.5 6',curve:0.06,anim:true};
  case 'ferry': return {w:1.8,dash:'10 5 2 5',curve:0.16,anim:true};
  case 'car': return {w:1.3,dash:null,curve:0.04,anim:false};
  default: return {w:1.6,dash:'6 7',curve:0.2,anim:true}; } }

function InteractiveMap({trip,cityInfo,dark,onFocusCity,focusKey,simplified}){
  const nodes=tripNodes(trip).filter(n=>n.name);
  const pmap={};
  nodes.forEach(n=>{ const co=cityCoord(n.name); if(co){ const [x,y]=proj(co.lon,co.lat); const k=cityKey(n.name); const ci=cityInfo.find(c=>c.city.id===n.id);
    if(!pmap[k]) pmap[k]={x,y,name:n.name,ci}; } });
  const segs=[];
  for(let i=0;i<nodes.length-1;i++){ const a=cityCoord(nodes[i].name),b=cityCoord(nodes[i+1].name); if(!a||!b)continue;
    const tl=(trip.transports||[]).filter(x=>x.cityId===nodes[i+1].id); const t=tl.find(x=>x.type==='flight'||x.type==='train'||x.type==='ferry'||x.type==='bus')||tl[0];
    const [x1,y1]=proj(a.lon,a.lat),[x2,y2]=proj(b.lon,b.lat); const st=lineStyle(t?t.type:'flight');
    const mx=(x1+x2)/2, my=(y1+y2)/2 - Math.abs(x2-x1)*st.curve - 18;
    segs.push({x1,y1,x2,y2,mx,my,type:t?t.type:'flight',st}); }
  const xs=[...segs.flatMap(s=>[s.x1,s.x2,s.mx]),...Object.values(pmap).map(p=>p.x)];
  const ys=[...segs.flatMap(s=>[s.y1,s.y2,s.my]),...Object.values(pmap).map(p=>p.y)];
  const fit=()=>{ if(!xs.length) return {x:0,y:0,w:MW,h:MH}; const pad=80; let minX=Math.min(...xs)-pad,maxX=Math.max(...xs)+pad,minY=Math.min(...ys)-pad,maxY=Math.max(...ys)+pad; let w=maxX-minX,h=maxY-minY; const ar=MW/MH; if(w/h<ar){const nw=h*ar;minX-=(nw-w)/2;w=nw;}else{const nh=w/ar;minY-=(nh-h)/2;h=nh;} return {x:minX,y:minY,w,h}; };
  const [vb,setVb]=useState(fit);
  const dragRef=useRef(null);
  const sig=nodes.map(n=>n.name).join('>');
  useEffect(()=>{ setVb(fit()); },[sig]);
  useEffect(()=>{ if(focusKey&&pmap[focusKey]){ const p=pmap[focusKey]; const w=Math.max(120,vb.w*0.5),h=w*(MH/MW); setVb({x:p.x-w/2,y:p.y-h/2,w,h}); } },[focusKey]);
  const svgRef=useRef();
  const toSvg=(cx,cy)=>{ const r=svgRef.current.getBoundingClientRect(); return [vb.x+((cx-r.left)/r.width)*vb.w, vb.y+((cy-r.top)/r.height)*vb.h ]; };
  const onWheel=(e)=>{ e.preventDefault(); const [cx,cy]=toSvg(e.clientX,e.clientY); const f=e.deltaY>0?1.12:0.89; const nw=Math.min(MW*1.4,Math.max(60,vb.w*f)),nh=nw*(vb.h/vb.w); setVb({w:nw,h:nh,x:cx-(cx-vb.x)*(nw/vb.w),y:cy-(cy-vb.y)*(nh/vb.h)}); };
  const onDown=(e)=>{ const pt=e.touches?e.touches[0]:e; dragRef.current={px:pt.clientX,py:pt.clientY,vx:vb.x,vy:vb.y}; };
  const onMove=(e)=>{ if(!dragRef.current)return; const pt=e.touches?e.touches[0]:e; const r=svgRef.current.getBoundingClientRect(); const dx=(pt.clientX-dragRef.current.px)/r.width*vb.w; const dy=(pt.clientY-dragRef.current.py)/r.height*vb.h; setVb(v=>({...v,x:dragRef.current.vx-dx,y:dragRef.current.vy-dy})); };
  const onUp=()=>{ dragRef.current=null; };
  const hasGeo=Object.keys(pmap).length>0;
  return (
    <div className="relative w-full rounded-xl overflow-hidden select-none" style={{background:dark?'linear-gradient(180deg,#0b0820,#140d33)':'linear-gradient(180deg,#ece4fb,#f6f1ff)'}}>
      <svg ref={svgRef} viewBox={`${vb.x} ${vb.y} ${vb.w} ${vb.h}`} className="w-full touch-none" style={{display:'block',cursor:dragRef.current?'grabbing':'grab',aspectRatio:'2/1'}}
        onWheel={simplified?undefined:onWheel} onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp} onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}>
        <defs>
          <linearGradient id="arcg" x1="0" x2="1"><stop offset="0" stopColor="#bba4e4"/><stop offset="1" stopColor="#f3b98e"/></linearGradient>
          <radialGradient id="dotg"><stop offset="0" stopColor="#f3b98e"/><stop offset="1" stopColor="#8a64c8"/></radialGradient>
        </defs>
        <path d={WORLD_PATH} fill={dark?'rgba(160,129,214,0.10)':'rgba(123,80,180,0.13)'} stroke={dark?'rgba(187,164,228,0.16)':'rgba(123,80,180,0.22)'} strokeWidth="0.6"/>
        {segs.map((s,i)=>{ const d=`M${s.x1},${s.y1} Q${s.mx},${s.my} ${s.x2},${s.y2}`; const ap=qPoint([s.x1,s.y1],[s.mx,s.my],[s.x2,s.y2],0.62); const ang=qTangent([s.x1,s.y1],[s.mx,s.my],[s.x2,s.y2],0.62);
          return (<g key={i} className="seg-draw" style={{animationDelay:(i*0.12)+'s'}}>
            <path id={`seg${i}`} d={d} fill="none" stroke="url(#arcg)" strokeWidth={s.st.w} strokeLinecap="round" opacity="0.9" strokeDasharray={s.st.dash||undefined} className={s.st.anim&&!simplified?'flow-line':''}/>
            {!simplified&&<circle r={Math.max(1.6,vb.w/300)} fill="#fff" opacity="0.95"><animateMotion dur="3s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear"><mpath href={`#seg${i}`}/></animateMotion></circle>}
            <g transform={`translate(${ap[0]},${ap[1]}) rotate(${ang})`}><path d="M-3,-3 L4,0 L-3,3 Z" fill="#f3b98e"/></g>
            {!simplified&&<text x={s.mx} y={s.my-3} textAnchor="middle" fontSize={Math.max(7,vb.w/90)}>{TRANSPORT_TYPES[s.type].icon}</text>}
          </g>); })}
        {Object.entries(pmap).map(([k,p],i)=>{ const fs=Math.max(6,vb.w/95); const isStop=!!p.ci;
          return (<g key={i} style={{cursor:'pointer'}} onClick={()=>onFocusCity&&onFocusCity(k)}>
            <circle cx={p.x} cy={p.y} r={vb.w/120} fill="rgba(243,185,142,.25)" style={{animation:'pulse2 2.4s ease-in-out infinite'}}/>
            <circle cx={p.x} cy={p.y} r={vb.w/240} fill="url(#dotg)" stroke="#fff" strokeWidth={vb.w/700}/>
            <text x={p.x} y={p.y-vb.w/90} textAnchor="middle" fontSize={fs} fontWeight="700" fill={dark?'#f4f1fb':'#2a1d44'}>{p.name}</text>
            {!simplified&&isStop&&p.ci.arrive&&<text x={p.x} y={p.y+vb.w/70} textAnchor="middle" fontSize={fs*0.78} fill={dark?'#bba4e4':'#7650b3'}>{prettyDate(p.ci.arrive)}</text>}
            {!simplified&&isStop&&p.ci.total>0&&<text x={p.x} y={p.y+vb.w/42} textAnchor="middle" fontSize={fs*0.78} fill="#f3b98e" fontWeight="700">{fmt(p.ci.total,trip.baseCurrency)}</text>}
          </g>); })}
      </svg>
      {!hasGeo&&<div className="absolute inset-0 flex items-center justify-center text-sm text-lavender-300/60 px-4 text-center">Add cities to chart your journey</div>}
      {!simplified&&hasGeo&&<div className="absolute bottom-3 right-3 flex gap-1.5">
        <button onClick={()=>setVb(v=>({...v,w:Math.max(60,v.w*0.8),h:Math.max(30,v.h*0.8),x:v.x+v.w*0.1,y:v.y+v.h*0.1}))} className="w-8 h-8 rounded-lg glass-dark text-lavender-100 text-lg leading-none">+</button>
        <button onClick={()=>setVb(v=>({...v,w:v.w*1.25,h:v.h*1.25,x:v.x-v.w*0.125,y:v.y-v.h*0.125}))} className="w-8 h-8 rounded-lg glass-dark text-lavender-100 text-lg leading-none">−</button>
        <button onClick={()=>setVb(fit())} className="h-8 px-2.5 rounded-lg glass-dark text-lavender-100 text-xs">Fit</button>
      </div>}
      {!simplified&&hasGeo&&<div className="absolute top-3 left-3 flex flex-wrap gap-2 text-[10px] text-lavender-200/80">
        <LegendItem dash="7 7" label="Flight"/><LegendItem label="Train"/><LegendItem dash="1.5 5" label="Bus"/><LegendItem dash="9 4 2 4" label="Ferry"/>
      </div>}
    </div>); }
function LegendItem({dash,label}){ return (<span className="flex items-center gap-1 px-1.5 py-0.5 rounded-md bg-black/20"><svg width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="#f3b98e" strokeWidth="2" strokeDasharray={dash||undefined}/></svg>{label}</span>); }

/* ============================ DATE PICKER ============================ */
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function isoOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseISO(s){ if(!s) return null; const d=new Date(s+'T00:00:00'); return isNaN(d)?null:d; }
function Portal({children}){ return (typeof document!=='undefined'&&ReactDOM&&ReactDOM.createPortal)?ReactDOM.createPortal(children,document.body):children; }
function Calendar({selected,rangeStart,rangeEnd,onPick,min,max}){
  const {dark}=useContext(Theme);
  const base=parseISO(selected||rangeStart||rangeEnd)||new Date();
  const [ym,setYm]=useState({y:base.getFullYear(),m:base.getMonth()});
  const startDow=new Date(ym.y,ym.m,1).getDay(); const dim=new Date(ym.y,ym.m+1,0).getDate();
  const cells=[]; for(let i=0;i<startDow;i++)cells.push(null); for(let d=1;d<=dim;d++)cells.push(d);
  const today=isoOf(new Date()); const mk=d=>isoOf(new Date(ym.y,ym.m,d)); const dis=iso=>(min&&iso<min)||(max&&iso>max);
  return (<div className={`p-3 rounded-2xl w-[256px] ${dark?'ac-menu-dark':'ac-menu-light'}`} onMouseDown={e=>e.preventDefault()}>
    <div className="flex items-center justify-between mb-2">

    <div className="grid grid-cols-7 gap-0.5">{cells.map((d,i)=>{ if(!d) return <div key={i}/>; const iso=mk(d); const sel=iso===selected; const isS=rangeStart&&iso===rangeStart; const isE=rangeEnd&&iso===rangeEnd; const inR=rangeStart&&rangeEnd&&iso>rangeStart&&iso<rangeEnd; const disabled=dis(iso);

  </div>); }
function DateField({value,onChange,min,max,placeholder}){

  const place=()=>{ if(!btn.current)return; const r=btn.current.getBoundingClientRect(); const W=256; const ph=(pop.current&&pop.current.offsetHeight)||312; const left=Math.max(8,Math.min(r.left,window.innerWidth-W-8)); const below=window.innerHeight-r.bottom>=ph+8; const top=below?r.bottom+4:Math.max(8,r.top-ph-4); setPos({left,top}); };

function RangeField({start,end,onStart,onEnd,min,max,labels}){

  const {dark}=useContext(Theme); const [open,setOpen]=useState(false); const [pos,setPos]=useState(null); const btn=useRef(); const pop=useRef();
  const place=()=>{ if(!btn.current)return; const r=btn.current.getBoundingClientRect(); const W=232; const ph=(pop.current&&pop.current.offsetHeight)||300; const left=Math.max(8,Math.min(r.left,window.innerWidth-W-8)); const below=window.innerHeight-r.bottom>=ph+8; const top=below?r.bottom+4:Math.max(8,r.top-ph-4); setPos({left,top}); };
  useEffect(()=>{ if(!open)return; place(); const raf=requestAnimationFrame(place); const f=()=>place(); window.addEventListener('scroll',f,true); window.addEventListener('resize',f); const h=e=>{ if((btn.current&&btn.current.contains(e.target))||(pop.current&&pop.current.contains(e.target)))return; setOpen(false); }; document.addEventListener('mousedown',h); return ()=>{ window.removeEventListener('scroll',f,true); window.removeEventListener('resize',f); document.removeEventListener('mousedown',h); cancelAnimationFrame(raf); }; },[open]);
  const slots=useMemo(()=>{ const a=[]; for(let h=0;h<24;h++)for(let m=0;m<60;m+=30){ a.push((h<10?'0':'')+h+':'+(m<10?'0':'')+m); } return a; },[]);
  return (<>
    <button ref={btn} type="button" onClick={()=>setOpen(o=>!o)} className={`w-full rounded-xl px-3.5 py-2.5 text-sm text-left flex items-center justify-between gap-2 ${dark?'bg-white/5 border border-white/10 text-lavender-50':'bg-white border border-lavender-200 text-lavender-950'}`}><span className={value?'':'opacity-40'}>{value?fmtTime(value):(placeholder||'Select time')}</span><span className="opacity-50">🕐</span></button>
    {open&&pos&&<Portal><div ref={pop} style={{position:'fixed',left:pos.left,top:pos.top,zIndex:80,width:232}} className={`rounded-2xl p-2 ${dark?'ac-menu-dark':'ac-menu-light'}`}>
      <div className="max-h-[256px] overflow-auto hide-scrollbar grid grid-cols-2 gap-1">{slots.map(s=>(<button key={s} type="button" onClick={()=>{onChange(s);setOpen(false);}} className={`rounded-lg px-2 py-1.5 text-sm text-center transition ${value===s?'iridescent text-indigo2-950 font-semibold':(dark?'text-lavender-100 hover:bg-white/10':'text-lavender-900 hover:bg-lavender-100')}`}>{fmtTime(s)}</button>))}</div>
      {value&&<div className="text-center mt-1.5 pt-1.5 border-t border-white/10"><button type="button" onClick={()=>{onChange('');setOpen(false);}} className="text-[11px] text-lavender-300/70 hover:text-peach-400">Clear time</button></div>}
    </div></Portal>}
  </>); }

/* ============================ CITY AUTOCOMPLETE ============================ */
function CityAutocomplete({value,onChange,placeholder,suggestNext}){
  const {dark}=useContext(Theme);
  const [open,setOpen]=useState(false); const [hi,setHi]=useState(0); const [q,setQ]=useState(value||'');
  const wrapRef=useRef();
  useEffect(()=>{ setQ(value||''); },[value]);
  const results=useMemo(()=>{ const r=searchCities(q);
    if((!q||!q.trim())&&suggestNext&&suggestNext.length){ return suggestNext.map(n=>{ const e=CITY_INFO.find(c=>cityKey(c[0])===cityKey(n)); return e?{name:e[0],country:COUNTRY[e[1]][0],code:e[2],flag:COUNTRY[e[1]][1],popular:true}:{name:n,country:'',code:'',flag:'📍',popular:true}; }); }
    return r; },[q,JSON.stringify(suggestNext)]);
  useEffect(()=>{ const h=(e)=>{ if(wrapRef.current&&!wrapRef.current.contains(e.target)) setOpen(false); }; document.addEventListener('mousedown',h); return ()=>document.removeEventListener('mousedown',h); },[]);
  const pick=(name)=>{ onChange(name); setQ(name); setOpen(false); };
  const onKey=(e)=>{ if(!open||!results.length)return; if(e.key==='ArrowDown'){e.preventDefault();setHi(h=>Math.min(results.length-1,h+1));} else if(e.key==='ArrowUp'){e.preventDefault();setHi(h=>Math.max(0,h-1));} else if(e.key==='Enter'){ if(results[hi]){e.preventDefault();pick(results[hi].name);} } else if(e.key==='Escape'){setOpen(false);} };
  return (<div className="relative" ref={wrapRef}>
    <Input value={q} placeholder={placeholder||'City'} onChange={e=>{setQ(e.target.value);onChange(e.target.value);setOpen(true);setHi(0);}} onFocus={()=>setOpen(true)} onKeyDown={onKey}/>
    {open&&results.length>0&&<div className={`absolute z-50 mt-1 w-64 max-w-[78vw] rounded-xl overflow-hidden shadow-glow ${dark?'ac-menu-dark':'ac-menu-light'}`}>
      {results.map((r,i)=>(<button key={i} type="button" onMouseDown={e=>{e.preventDefault();pick(r.name);}} onMouseEnter={()=>setHi(i)}
        className={`w-full flex items-center gap-2 px-3 py-2 text-left text-sm ${i===hi?'bg-lavender-500/25':''} ${dark?'text-lavender-100':'text-lavender-900'}`}>
        <span className="text-base">{r.flag}</span>
        <span className="flex-1 min-w-0 truncate"><span className="font-medium">{r.name}</span> <span className="text-lavender-300/60 text-xs">{r.country}</span></span>
        {r.code&&<span className="text-[10px] font-mono text-lavender-300/70 bg-white/10 rounded px-1">{r.code}</span>}
        {r.popular&&<span className="text-[9px] text-peach-400 whitespace-nowrap">★ next</span>}
      </button>))}
    </div>}
  </div>); }

/* ============================ PLAN / BUILDER ============================ */
function PlanView({trip,setTrip,cur,onSave}){
  const {dark}=useContext(Theme);
  const c=useComputed(trip);
  const setT=(patch)=>setTrip(t=>({...t,...patch}));
  const nodes=tripNodes(trip);
  const infoById={}; c.cityInfo.forEach(ci=>{infoById[ci.city.id]=ci;});
  const win=c.win||{};
  const checks=tripChecks(trip); const errs=checks.filter(x=>x.level==='error').length, warns=checks.filter(x=>x.level==='warn').length;
  const [dragIdx,setDragIdx]=useState(null); const [overIdx,setOverIdx]=useState(null);
  const norm=(arr)=>{ const start=arr.filter(n=>n.anchor==='start'); const end=arr.filter(n=>n.anchor==='end'); const mid=arr.filter(n=>!n.anchor); return [...start,...mid,...end]; };
  const setNode=(id,patch)=>setTrip(t=>({...t,nodes:t.nodes.map(n=>n.id===id?{...n,...patch}:n)}));
  const addStop=()=>setTrip(t=>{ const a=[...t.nodes]; const ei=a.findIndex(n=>n.anchor==='end'); a.splice(ei>=0?ei:a.length,0,{id:uid(),name:''}); return {...t,nodes:a}; });
  const insertAt=(idx)=>setTrip(t=>{ const a=[...t.nodes]; a.splice(idx,0,{id:uid(),name:''}); return {...t,nodes:norm(a)}; });
  const removeNode=(id)=>setTrip(t=>({...t,nodes:t.nodes.filter(n=>n.id!==id),hotels:(t.hotels||[]).filter(h=>h.cityId!==id),transports:(t.transports||[]).filter(x=>x.cityId!==id),spend:(t.spend||[]).filter(x=>x.cityId!==id)}));
  const reorder=(from,to)=>setTrip(t=>{ const a=[...t.nodes]; const [m]=a.splice(from,1); a.splice(to,0,m); return {...t,nodes:norm(a)}; });
  const addTr=(cityId)=>setTrip(t=>{ const wd=win[cityId]||{}; const nm=(t.nodes.find(n=>n.id===cityId)||{}).name||''; return {...t,transports:[...(t.transports||[]),{id:uid(),cityId,type:'flight',provider:'',from:'',to:nm,startDate:wd.arrive||t.departDate||'',startTime:'',endDate:'',endTime:'',ref:'',cost:'',perDay:'',currency:t.baseCurrency||'SAR',persons:t.persons||'',notes:'',attachments:[]}]}; });
  const updTr=(id,patch)=>setTrip(t=>({...t,transports:(t.transports||[]).map(x=>x.id===id?{...x,...patch}:x)}));
  const rmTr=(id)=>setTrip(t=>({...t,transports:(t.transports||[]).filter(x=>x.id!==id)}));
  const moveTr=(id,dir)=>setTrip(t=>{ const arr=[...(t.transports||[])]; const idx=arr.findIndex(x=>x.id===id); if(idx<0)return t; const cid=arr[idx].cityId; let j=-1; if(dir<0){for(let k=idx-1;k>=0;k--){if(arr[k].cityId===cid){j=k;break;}}}else{for(let k=idx+1;k<arr.length;k++){if(arr[k].cityId===cid){j=k;break;}}} if(j<0)return t; const tmp=arr[idx];arr[idx]=arr[j];arr[j]=tmp; return {...t,transports:arr}; });
  const addH=(cityId)=>setTrip(t=>{ const wd=win[cityId]||{}; return {...t,hotels:[...(t.hotels||[]),{id:uid(),cityId,name:'',mapLink:'',checkIn:wd.arrive||'',checkOut:wd.depart||'',perNight:'',rooms:'1',taxes:'',currency:t.baseCurrency||'SAR',persons:t.persons||'',attachments:[]}]}; });
  const updH=(id,patch)=>setTrip(t=>({...t,hotels:(t.hotels||[]).map(x=>x.id===id?{...x,...patch}:x)}));
  const rmH=(id)=>setTrip(t=>({...t,hotels:(t.hotels||[]).filter(x=>x.id!==id)}));
  const addSp=(cityId)=>setTrip(t=>{ const wd=win[cityId]||{}; return {...t,spend:[...(t.spend||[]),{id:uid(),cityId,name:'',category:'Activity',desc:'',location:'',date:wd.arrive||t.departDate||'',time:'',persons:t.persons||'',perPerson:'',currency:t.baseCurrency||'SAR',ref:'',notes:'',attachments:[]}]}; });
  const updSp=(id,patch)=>setTrip(t=>({...t,spend:(t.spend||[]).map(x=>x.id===id?{...x,...patch}:x)}));
  const rmSp=(id)=>setTrip(t=>({...t,spend:(t.spend||[]).filter(x=>x.id!==id)}));
  const updTE=(k,patch)=>setTrip(t=>({...t,tripExpenses:{...t.tripExpenses,[k]:{...(t.tripExpenses[k]||{amount:'',attachments:[]}),...patch}}}));
  const TE=[['visa','Visa fees'],['insurance','Travel insurance'],['sim','eSIM / SIM'],['transfers','Airport transfers'],['luggage','Luggage fees'],['emergency','Emergency buffer']];
  const startNode=nodes.find(n=>n.anchor==='start')||nodes[0]; const endNode=nodes.find(n=>n.anchor==='end')||nodes[nodes.length-1];
  const nodeLabel=(n,i)=>n.anchor==='start'?'Start':n.anchor==='end'?'Return':'Stop '+i;
  const named=nodes.filter(n=>n.name);
  const cardBg=dark?'bg-white/[0.025] border border-white/8':'bg-lavender-50/50 border border-lavender-200';
  const itemBg=dark?'rounded-lg p-3 bg-white/[0.03] border border-white/8':'rounded-lg p-3 bg-white border border-white/8';
  const dwin=(id)=>win[id]||{};

  return (
    <div className="space-y-4 pb-24">
      {(checks.length>0)?(<Card className={`p-4 slide-up border-l-4 ${errs?'border-l-peach-500':warns?'border-l-peach-400':'border-l-teal2-500'}`} style={{borderLeftWidth:4}}>
        <div className="text-[11px] uppercase tracking-wide font-semibold text-lavender-300/70 mb-2">Date checks · {errs?`${errs} issue${errs>1?'s':''}`:`${warns} to review`}</div>
        <ul className="space-y-1.5">{checks.map((w,i)=>(<li key={i} className="flex items-start gap-2 text-sm"><span className="shrink-0">{w.level==='error'?'⛔':w.level==='warn'?'⚠️':'ℹ️'}</span><span className={w.level==='error'?'text-peach-400':w.level==='warn'?'text-peach-300':'text-lavender-200/80'}>{w.msg}</span></li>))}</ul>
      </Card>):((trip.departDate&&trip.returnDate&&(trip.hotels||[]).length>0)?(<Card className="p-3 slide-up border-l-4 border-l-teal2-500" style={{borderLeftWidth:4}}><div className="text-sm text-teal2-400 flex items-center gap-2">✓ Dates look consistent across legs and stays.</div></Card>):null)}

      <Collapse step="1" kicker="Trip backbone" title="Start & return" right={<span className="text-xs text-lavender-300/70 hidden sm:block">{c.days>0?`${c.days} days · ${c.nights} nights`:''}</span>}>
        <div className="grid sm:grid-cols-2 gap-4">
          <Field label="Trip name"><Input placeholder="e.g. Europe Summer" value={trip.name} onChange={e=>setT({name:e.target.value})}/></Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Start point">{startNode&&<CityAutocomplete value={startNode.name} onChange={v=>setNode(startNode.id,{name:v})} placeholder="Jeddah"/>}</Field>
            <Field label="Final return">{endNode&&<CityAutocomplete value={endNode.name} onChange={v=>setNode(endNode.id,{name:v})} placeholder="Jeddah"/>}</Field>
          </div>
          <div className="sm:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4 items-end">
            <Field label="Trip dates" error={c.days<0?'Return must be after departure':null}><RangeField start={trip.departDate} end={trip.returnDate} onStart={d=>setT({departDate:d})} onEnd={d=>setT({returnDate:d})} labels={['Departure','Return']}/></Field>
            <Field label="Default travellers" hint="per-item default"><div className="flex items-center gap-2"><button type="button" onClick={()=>setT({persons:Math.max(1,(Math.round(num(trip.persons))||1)-1)})} className="w-11 h-[42px] rounded-xl bg-white/5 border border-white/10 text-lavender-100 text-lg leading-none shrink-0">−</button><Input className="no-spin text-center h-[42px]" type="number" min="1" value={trip.persons||1} onChange={e=>setT({persons:Math.max(1,Math.round(num(e.target.value))||1)})}/><button type="button" onClick={()=>setT({persons:(Math.round(num(trip.persons))||1)+1})} className="w-11 h-[42px] rounded-xl bg-white/5 border border-white/10 text-lavender-100 text-lg leading-none shrink-0">＋</button></div></Field>
          </div>
        </div>
        <div className="mt-5 pt-4 border-t border-lavender-400/20">
          <div className="text-[11px] uppercase tracking-[0.2em] text-lavender-300/70 font-semibold mb-3 flex items-center gap-2">📋 Trip summary<span className="text-[9px] normal-case tracking-normal text-lavender-300/45 font-normal">· auto-calculated</span></div>
          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
            {[['📅','Trip days',c.days>0?c.days:'—'],['📍','Cities / stops',named.length],['👥','Travellers',c.persons],['✈️','Transport',fmt(c.transportTotal,cur)],['🏨','Hotels',fmt(c.accommodationTotal,cur)],['🎟️','Activities / spend',fmt(c.spendTotal,cur)],['💰','Total est. cost',fmt(c.grand,cur)]].map((b,i)=>(
              <div key={i} className={`rounded-2xl p-3 ${dark?'bg-white/5 border border-white/10':'bg-white border border-lavender-200'}`}>
                <div className="flex items-center gap-1.5 text-[10px] uppercase tracking-wide font-semibold text-lavender-300/70"><span className="text-sm">{b[0]}</span><span className="truncate">{b[1]}</span></div>
                <div className="mt-1 font-display text-base sm:text-lg iridescent-text leading-tight break-words">{b[2]}</div>
              </div>))}
          </div>
        </div>
      </Collapse>

      <Collapse step="2" kicker="Itinerary graph" title="Cities & order" right={<Btn onClick={addStop}>＋ Add stop</Btn>}>
        <div className="text-[11px] text-lavender-300/50 mb-3">Drag <span className="text-lavender-200">⠿</span> to reorder · cities can repeat (multi-visit) · dates auto-fill from your trip dates</div>
        <div className="space-y-2">
          {nodes.map((n,i)=>{ const info=infoById[n.id]; const prev=nodes[i-1]; const suggest=prev&&prev.name?POPULAR_NEXT[cityKey(prev.name)]:null; const movable=!n.anchor;
            return (<div key={n.id}>
              <div onDragOver={e=>{if(!movable)return;e.preventDefault();if(overIdx!==i)setOverIdx(i);}} onDrop={()=>{ if(dragIdx!=null&&dragIdx!==i)reorder(dragIdx,i); setDragIdx(null);setOverIdx(null); }}
                className={`flex items-center gap-2 rounded-xl p-2 transition ${overIdx===i&&dragIdx!=null&&dragIdx!==i?'ring-2 ring-lavender-400':''} ${dragIdx===i?'opacity-40':''} ${dark?'bg-white/[0.04] border border-white/10':'bg-white border border-lavender-200'}`}>
                {movable? <span draggable onDragStart={e=>{setDragIdx(i);e.dataTransfer.effectAllowed='move';}} onDragEnd={()=>{setDragIdx(null);setOverIdx(null);}} title="Drag to reorder" className="cursor-grab active:cursor-grabbing text-lavender-300/50 select-none px-1">⠿</span> : <span className="px-1">🏠</span>}
                <span className="text-[10px] uppercase tracking-wide font-semibold text-lavender-300/60 w-12 shrink-0">{nodeLabel(n,i)}</span>
                <div className="flex-1 min-w-0"><CityAutocomplete value={n.name} onChange={v=>setNode(n.id,{name:v})} placeholder="City" suggestNext={suggest}/></div>
                {info&&info.nights>0&&<span className="text-xs text-lavender-300/70 whitespace-nowrap hidden sm:block">{info.nights}n</span>}
                {info&&info.total>0&&<span className="text-xs iridescent-text font-display whitespace-nowrap">{fmt(info.total,cur)}</span>}
                {movable&&<button onClick={()=>removeNode(n.id)} className="text-peach-400 hover:text-peach-300 px-1">✕</button>}

              {i<nodes.length-1&&<div className="flex justify-center"><button onClick={()=>insertAt(i+1)} className="text-lavender-300/30 hover:text-lavender-200 text-[11px] py-0.5">＋ insert</button></div>}
            </div>); })}
        </div>
      </Collapse>

      <Collapse step="3" kicker="How you move" title="Transport per city" defaultOpen={false} right={<span className="text-sm iridescent-text font-display">{fmt(c.transportTotal,cur)}</span>}>
        <div className="text-[11px] text-lavender-300/50 mb-3">Add as many as you like per city — flight in, car rental, taxis, trains, private driver…</div>

        <div className="space-y-5">
          {named.map(nd=>{ const wd=win[nd.id]||{}; const items=(trip.transports||[]).filter(x=>x.cityId===nd.id); const ctot=items.reduce((s,x)=>s+transportBase(x,trip),0);
            return (<div key={nd.id} className={`rounded-xl p-4 ${cardBg}`}>
              <div className="flex items-center justify-between mb-3"><div className="font-display text-lg text-lavender-100">{cityFlag(nd.name)} {nd.name}</div>

              {items.length===0? <div className="text-xs text-lavender-300/50">No transport added for {nd.name} yet.</div> :
              <div className="space-y-3">{items.map((tr,ix)=>(<div key={tr.id} className={itemBg}>
                <div className="flex items-center gap-2 mb-2 text-sm font-semibold text-lavender-100">{(TRANSPORT_TYPES[tr.type]||{icon:'🧭'}).icon} {(TRANSPORT_TYPES[tr.type]||{label:'Transport'}).label}<span className="text-[11px] font-normal text-lavender-300/50 ml-auto">#{ix+1}</span></div>
                <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-3">
                  <Field label="Type"><Select value={tr.type} onChange={e=>{const v=e.target.value; const p={type:v}; if(v==='car'){ if(!tr.startDate)p.startDate=wd.arrive||trip.departDate||''; if(!tr.endDate)p.endDate=wd.depart||trip.returnDate||''; } updTr(tr.id,p);}}>{Object.entries(TRANSPORT_TYPES).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}</Select></Field>
                  <Field label="Provider / company"><Input value={tr.provider} placeholder="e.g. Emirates, Hertz" onChange={e=>updTr(tr.id,{provider:e.target.value})}/></Field>
                  <Field label="From"><Input value={tr.from} placeholder="From" onChange={e=>updTr(tr.id,{from:e.target.value})}/></Field>
                  <Field label="To"><Input value={tr.to} placeholder="To" onChange={e=>updTr(tr.id,{to:e.target.value})}/></Field>
                  {tr.type==='car'? <div className="sm:col-span-2 lg:col-span-2"><Field label="Rental period"><RangeField start={tr.startDate} end={tr.endDate} onStart={d=>updTr(tr.id,{startDate:d})} onEnd={d=>updTr(tr.id,{endDate:d})} min={trip.departDate} max={trip.returnDate} labels={['Pick-up','Drop-off']}/></Field></div> : <><Field label="Date"><DateField value={tr.startDate} onChange={d=>updTr(tr.id,{startDate:d})} min={trip.departDate} max={trip.returnDate}/></Field><Field label="End date" hint="opt"><DateField value={tr.endDate} onChange={d=>updTr(tr.id,{endDate:d})} min={tr.startDate||trip.departDate} max={trip.returnDate}/></Field></>}
                  <Field label="Start time" hint="opt"><TimeField value={tr.startTime} onChange={v=>updTr(tr.id,{startTime:v})}/></Field>
                  <Field label="End time" hint="opt"><TimeField value={tr.endTime} onChange={v=>updTr(tr.id,{endTime:v})}/></Field>
                  {tr.type==='car'? (()=>{ const ud=usageDays(tr); return (

                  ); })() : <div className="sm:col-span-2 lg:col-span-2"><Field label="Cost / person" hint={'× '+pax(tr.persons,trip)+' pax · total '+fmt(num(tr.cost)*pax(tr.persons,trip),itemCur(tr,trip))}><div className="flex gap-2"><Input className="no-spin" type="number" min="0" value={tr.cost} placeholder="0" onChange={e=>updTr(tr.id,{cost:e.target.value})}/><CurSel value={tr.currency} onChange={v=>updTr(tr.id,{currency:v})}/></div></Field></div>}
                  <Field label="Passengers"><Input className="no-spin" type="number" min="1" value={tr.persons||''} placeholder={String(trip.persons||1)} onChange={e=>updTr(tr.id,{persons:e.target.value})}/></Field>
                  <Field label="Booking ref" hint="opt"><Input value={tr.ref} placeholder="ABC123" onChange={e=>updTr(tr.id,{ref:e.target.value})}/></Field>
                  <Field label="Notes" hint="opt"><Input value={tr.notes} placeholder="Seat, terminal…" onChange={e=>updTr(tr.id,{notes:e.target.value})}/></Field>
                </div>
                <AttachmentStrip attachments={tr.attachments} onChange={a=>updTr(tr.id,{attachments:a})}/>
                <div className="flex items-center justify-between mt-2 pt-2 border-t border-white/8">
                  <div className="flex items-center gap-1"><button onClick={()=>moveTr(tr.id,-1)} className="text-lavender-300/60 hover:text-lavender-100 px-1.5">↑</button><button onClick={()=>moveTr(tr.id,1)} className="text-lavender-300/60 hover:text-lavender-100 px-1.5">↓</button></div>
                  <div className="flex items-center gap-4"><span className="font-display text-base iridescent-text">{fmt(transportBase(tr,trip),cur)}</span><button onClick={()=>rmTr(tr.id)} className="text-peach-400 hover:text-peach-300">✕</button></div>
                </div>

function HeatMap({cityInfo,cur}){ const data=cityInfo.filter(ci=>ci.total>0); if(data.length===0)return <Empty text="Add city budgets to see the spending heat map."/>;
  const max=Math.max(...data.map(d=>d.total));
  return (<div className="space-y-2">{data.map((ci)=>{ const pct=max?ci.total/max:0; return (
    <div key={ci.city.id} className="flex items-center gap-3"><div className="w-24 truncate text-sm text-lavender-200/90">{ci.city.name||'—'}</div>
      <div className="flex-1 h-7 rounded-lg overflow-hidden bg-white/5"><div className="h-full rounded-lg flex items-center justify-end pr-2" style={{width:`${Math.max(8,pct*100)}%`,background:`linear-gradient(90deg, rgba(138,100,200,.5), ${pct>0.66?'#f3b98e':pct>0.33?'#bba4e4':'#8a64c8'})`}}><span className="text-[10px] font-semibold text-white">{fmt(ci.total,cur)}</span></div></div>
    </div>); })}</div>); }
function Insight({label,value}){ return (<div className="flex justify-between items-center py-2 border-b border-white/8 last:border-0"><span className="text-xs text-lavender-300/70">{label}</span><span className="text-sm font-semibold text-lavender-100 text-right">{value}</span></div>); }

function buildTimeline(trip,cur){ const nodes=trip.nodes||[];
  const ev=[]; let seq=0; const push=(o)=>ev.push({seq:seq++,...o});
  push({date:trip.departDate,icon:'🛫',title:trip.name||'Trip begins',sub:'Departure'+(nodes[0]&&nodes[0].name?' · '+nodes[0].name:''),tag:'Start'});
  const trOf=id=>(trip.transports||[]).filter(t=>t.cityId===id).sort((a,b)=>((a.startDate||'')+(a.startTime||'')).localeCompare((b.startDate||'')+(b.startTime||'')));
  const hOf=id=>(trip.hotels||[]).filter(h=>h.cityId===id).sort((a,b)=>(a.checkIn||'').localeCompare(b.checkIn||''));
  const spOf=id=>(trip.spend||[]).filter(s=>s.cityId===id&&s.date).sort((a,b)=>((a.date||'')+(a.time||'')).localeCompare((b.date||'')+(b.time||'')));
  nodes.forEach(n=>{ trOf(n.id).forEach(t=>{ const tm=t.startTime?' · '+t.startTime:''; const rt=(t.from&&t.to)?(t.from+' → '+t.to):(n.name||''); push({date:t.startDate,icon:(TRANSPORT_TYPES[t.type]||{icon:'🧭'}).icon,title:(TRANSPORT_TYPES[t.type]||{label:'Transport'}).label+(rt?' · '+rt:''),sub:(t.provider?t.provider+' · ':'')+(n.name||'')+tm+(num(t.cost)?' · '+fmt(transportBase(t,trip),cur):''),tag:'Travel'}); });
    hOf(n.id).forEach(h=>{ const nn=daysBetween(h.checkIn,h.checkOut); if(h.checkIn) push({date:h.checkIn,icon:'🏨',title:'Check in · '+(h.name||'Hotel'),sub:(n.name||'')+' · '+(nn>0?nn:0)+' nights · '+fmt(hotelBase(h,trip),cur),tag:'Stay'}); if(h.checkOut) push({date:h.checkOut,icon:'🧳',title:'Check out · '+(h.name||'Hotel'),sub:n.name||'',tag:'Stay'}); });
    spOf(n.id).forEach(s=>{ push({date:s.date,icon:'🎟️',title:(s.name||'Activity'),sub:(s.category||'')+(s.time?' · '+s.time:'')+(spendNative(s)?' · '+fmt(spendBase(s,trip),cur):''),tag:'Plan'}); }); });
  push({date:trip.returnDate,icon:'🛬',title:'Trip ends',sub:'Return'+(nodes.length&&nodes[nodes.length-1].name?' · '+nodes[nodes.length-1].name:''),tag:'End'});
  return ev; }

function TimelineList({trip,cur,compact}){ const {dark}=useContext(Theme); const ev=buildTimeline(trip,cur);
  if(ev.length===0) return <Empty text="Your timeline appears as you add dates."/>;
  return (<div className="relative pl-6"><div className="tl-line absolute left-[7px] top-2 bottom-2 w-px bg-gradient-to-b from-lavender-400/60 via-lavender-400/30 to-peach-400/50"></div>
    {ev.map((e,i)=>(<div key={i} className="relative mb-4 tl-item" style={{animationDelay:(i*0.08)+'s'}}><div className="absolute -left-[22px] top-1 w-4 h-4 rounded-full iridescent shadow-glow"></div>
      <div className="text-[11px] uppercase tracking-wide text-lavender-300/70 font-semibold">{compact?prettyDate(e.date):prettyDateFull(e.date)} · {e.tag}</div>
      <div className={`mt-0.5 text-sm font-semibold ${dark?'text-lavender-50':'text-lavender-950'}`}>{e.icon} {e.title}</div>
      {e.sub&&<div className="text-xs text-lavender-300/70">{e.sub}</div>}</div>))}</div>); }

function BudgetView({trip,cur}){ const {dark}=useContext(Theme); const c=useComputed(trip);
  const mostExp=[...c.cityInfo].sort((a,b)=>b.total-a.total)[0];
  const topCat=[...c.categoryBreakdown].sort((a,b)=>b.value-a.value)[0];
  const forecast=useMemo(()=>{ if(c.days<=0)return {labels:[],values:[]}; const start=trip.departDate; const arr=new Array(c.days).fill(0);
    c.cityInfo.forEach(ci=>{ const s=ci.arrive||start; const idx=Math.max(0,daysBetween(start,s)); const span=Math.max(1,ci.nights||1); const per=ci.total/span; for(let k=0;k<span&&idx+k<c.days;k++){arr[idx+k]+=per;} });
    (trip.transports||[]).forEach(t=>{ if(t.startDate){const idx=daysBetween(start,t.startDate); if(idx>=0&&idx<c.days)arr[idx]+=transportBase(t,trip);} });
    return {labels:arr.map((_,i)=>prettyDate(addDays(start,i))),values:arr.map(v=>Math.round(v))}; },[JSON.stringify(trip)]);
  if(c.grand===0&&tripNodes(trip).filter(n=>n.name).length===0) return <Empty text="Build a trip first — budget analytics will populate here."/>;
  return (<div className="space-y-6">
    <div className="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-8 gap-3">
      <KPI label="Total cost" icon="💰" value={fmt(c.grand,cur)}/><KPI label="Days" icon="📅" value={c.days>0?c.days:'—'}/>
      <KPI label="Cities" icon="📍" value={tripNodes(trip).filter(n=>n.name).length}/><KPI label="Hotels" icon="🏨" value={trip.hotels.length}/>
      <KPI label="Flights" icon="✈️" value={c.flights}/><KPI label="Trains" icon="🚆" value={c.trains}/><KPI label="Avg / day" icon="📈" value={fmt(c.avgDaily,cur)}/><KPI label="Default pax" icon="👥" value={c.persons}/>
    </div>
    <div className="grid lg:grid-cols-3 gap-6">
      <Card className="p-6 lg:col-span-2 slide-up"><SectionTitle kicker="Heat map" title="Cost by city"/><HeatMap cityInfo={c.cityInfo} cur={cur}/></Card>
      <Card className="p-6 slide-up"><div className="text-[11px] uppercase tracking-wide font-semibold text-lavender-300/70 mb-3">At a glance</div>
        <Insight label="Most expensive city" value={mostExp&&mostExp.total>0?`${mostExp.city.name||'—'} · ${fmt(mostExp.total,cur)}`:'—'}/>
        <Insight label="Largest category" value={topCat?`${topCat.label} · ${fmt(topCat.value,cur)}`:'—'}/>
        <Insight label="Average daily spend" value={fmt(c.avgDaily,cur)}/>
        <Insight label="Accommodation share" value={c.grand?`${((c.accommodationTotal/c.grand)*100).toFixed(0)}%`:'—'}/>
        <Insight label="Transport share" value={c.grand?`${((c.transportTotal/c.grand)*100).toFixed(0)}%`:'—'}/>
      </Card>
    </div>
    <div className="grid lg:grid-cols-2 gap-6">
      <Card className="p-6 slide-up"><div className="text-[11px] uppercase tracking-wide font-semibold text-lavender-300/70 mb-3">By category</div><Doughnut data={c.categoryBreakdown} dark={dark}/>
        <div className="mt-4 space-y-1.5">{c.categoryBreakdown.map((d,i)=>(<div key={d.label} className="flex justify-between text-sm"><span className="flex items-center gap-2 text-lavender-200/90"><span className="w-3 h-3 rounded-sm" style={{background:BRAND[i%BRAND.length]}}></span>{d.label}</span><span className="text-lavender-100">{fmt(d.value,cur)} <span className="text-lavender-300/60">{((d.value/c.grand)*100).toFixed(1)}%</span></span></div>))}</div></Card>
      <Card className="p-6 slide-up"><div className="text-[11px] uppercase tracking-wide font-semibold text-lavender-300/70 mb-3">By city</div><Bars data={c.cityInfo.filter(x=>x.total>0).map(x=>({label:x.city.name||'—',value:Math.round(x.total)}))} dark={dark} horizontal/></Card>
      <Card className="p-6 slide-up"><div className="text-[11px] uppercase tracking-wide font-semibold text-lavender-300/70 mb-3">Transport breakdown</div>{Object.keys(c.transportByType).length? <Doughnut data={Object.entries(c.transportByType).map(([k,v])=>({label:k,value:Math.round(v)}))} dark={dark}/> : <Empty text="No transport costs yet."/>}</Card>
      <Card className="p-6 slide-up"><div className="text-[11px] uppercase tracking-wide font-semibold text-lavender-300/70 mb-3">Daily forecast</div>{forecast.values.length? <Line labels={forecast.labels} values={forecast.values} dark={dark}/> : <Empty text="Set dates to forecast."/>}</Card>
    </div>
  </div>); }

/* ============================ PDF EXPORT ============================ */
async function loadJsPDF(){ if(window.jspdf&&window.jspdf.jsPDF) return window.jspdf.jsPDF; await new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); return window.jspdf.jsPDF; }
function logoForPDF(){ return new Promise(res=>{ try{
    const saved=(()=>{try{return localStorage.getItem('tp_logo');}catch(e){return null;}})();
    const def="data:image/svg+xml,"+encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='#15103a'/><g transform='translate(-92.6 -31.1) scale(0.3003)' fill='#ffffff'><path d='m381.6378 217.79134l10.228363 -40.913376l171.15747 0l-10.2283325 40.913376z'/><path d='m381.6378 322.20865l10.228363 40.91339l171.15747 0l-10.2283325 -40.91339z'/><path d='m381.6378 290.4567l10.228363 -40.91339l186.49603 0l-10.2283325 40.91339z'/></g></svg>");
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{ try{ const cv=document.createElement('canvas'); cv.width=140; cv.height=140; const ctx=cv.getContext('2d'); ctx.drawImage(img,0,0,140,140); res(cv.toDataURL('image/png')); }catch(e){ res(null); } };
    img.onerror=()=>{ if(img.src!==def){ img.src=def; } else { res(null); } };
    img.src=saved||def;
  }catch(e){ res(null); } }); }
async function exportTripPDF(trip,cur){
  let jsPDF; try{ jsPDF=await loadJsPDF(); }catch(e){ alert('Could not load the PDF library (needs an internet connection). Please try again online.'); return; }
  trip=migrateTrip(trip); const png=await logoForPDF();
  const doc=new jsPDF({unit:'pt',format:'a4'}); const W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight(), M=40; let y=0; const P=v=>fmt(v,cur);
  const named=tripNodes(trip).filter(n=>n.name);

function tripTotals(t0){ const trip=migrateTrip(t0);
  const accommodation=(trip.hotels||[]).reduce((s,h)=>s+hotelBase(h,trip),0); const transport=(trip.transports||[]).reduce((s,t)=>s+transportBase(t,trip),0); const sp=(trip.spend||[]).reduce((s,x)=>s+spendBase(x,trip),0); const misc=Object.values(trip.tripExpenses||{}).reduce((s,e)=>s+num(e.amount)*pax(e.persons,trip),0);
  return {grand:accommodation+transport+sp+misc,days:daysBetween(trip.departDate,trip.returnDate),cities:tripNodes(trip).filter(n=>n.name).length}; }

/* ============================ CLOUD SYNC (Supabase) ============================ */
function useCloud(trips,setTrips){
  const [cfgLS,setCfg]=usePersist('tp_sb',{url:'',key:''}); const cfg={url:cfgLS.url||SUPABASE_URL,key:cfgLS.key||SUPABASE_KEY};
  const [session,setSession]=useState(null);
  const [status,setStatus]=useState('');
  const sb=useRef(null); const synced=useRef({}); const tref=useRef(trips); tref.current=trips;
  useEffect(()=>{ if(cfg.url&&cfg.key&&window.supabase){ try{ sb.current=window.supabase.createClient(cfg.url,cfg.key);
    sb.current.auth.getSession().then(({data})=>setSession((data&&data.session)||null));
    const {data:sub}=sb.current.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>{ try{ sub.subscription.unsubscribe(); }catch(e){} };
  }catch(e){ setStatus('Invalid Supabase config'); } } else { sb.current=null; setSession(null); } },[cfg.url,cfg.key]);
  const upsert=async(t)=>{ if(!sb.current||!session)return; const uid=session.user.id; const {error}=await sb.current.from('trips').upsert({id:t.id,user_id:uid,data:t,updated_at:new Date(t.updatedAt||Date.now()).toISOString()}); if(!error) synced.current[t.id]=t.updatedAt||Date.now(); return error; };
  const del=async(id)=>{ if(!sb.current||!session)return; await sb.current.from('trips').delete().eq('id',id); delete synced.current[id]; };
  useEffect(()=>{ if(!sb.current||!session)return; let cancel=false; (async()=>{ setStatus('Syncing…'); try{
    const {data:rows,error}=await sb.current.from('trips').select('id,data,updated_at'); if(error)throw error; if(cancel)return;
    const remote={}; (rows||[]).forEach(r=>remote[r.id]=r); const local=tref.current; const updates={}; const toPush=[];
    Object.keys(remote).forEach(id=>{ const r=remote[id]; const l=local[id]; const ru=new Date(r.updated_at).getTime(); if(!l||(l.updatedAt||0)<ru){ updates[id]=r.data; } synced.current[id]=ru; });
    Object.values(local).forEach(l=>{ const r=remote[l.id]; const ru=r?new Date(r.updated_at).getTime():0; if(!r||(l.updatedAt||0)>ru){ toPush.push(l); } });
    if(Object.keys(updates).length) setTrips(ts=>({...ts,...updates}));
    for(const t of toPush){ await upsert(t); }
    if(!cancel){ setStatus('Synced ✓'); setTimeout(()=>setStatus(s=>s==='Synced ✓'?'':s),1800); }
  }catch(e){ if(!cancel) setStatus('Sync error: '+(e.message||e)); } })(); return ()=>{cancel=true;}; },[session]);
  useEffect(()=>{ if(!sb.current||!session)return; const h=setTimeout(async()=>{ try{ const local=tref.current;
    for(const id in local){ if(synced.current[id]!==(local[id].updatedAt||0)){ await upsert(local[id]); } }
    for(const id in synced.current){ if(!local[id]){ await del(id); } }
  }catch(e){} },1200); return ()=>clearTimeout(h); },[JSON.stringify(trips),session]);
  const signUp=async(email,pw)=>{ if(!sb.current)return; setStatus('Creating account…'); const {error}=await sb.current.auth.signUp({email,password:pw}); setStatus(error?('Error: '+error.message):'Account created. If email confirmation is on, confirm then sign in.'); };
  const signIn=async(email,pw)=>{ if(!sb.current)return; setStatus('Signing in…'); const {error}=await sb.current.auth.signInWithPassword({email,password:pw}); setStatus(error?('Error: '+error.message):''); };
  const signOut=async()=>{ if(!sb.current)return; await sb.current.auth.signOut(); synced.current={}; setStatus(''); };
  return {cfg,setCfg,session,status,ready:!!sb.current,signUp,signIn,signOut};
}

  const SQL="create table if not exists trips (\n  id text primary key,\n  user_id uuid not null default auth.uid() references auth.users on delete cascade,\n  data jsonb not null,\n  updated_at timestamptz not null default now()\n);\nalter table trips enable row level security;\ncreate policy \"own trips\" on trips for all\n  using (auth.uid() = user_id) with check (auth.uid() = user_id);";
  return (<Card className="p-6">

    </div>) : !session? (<div className="space-y-3">
      <div className="text-[11px] text-teal2-400">Project connected.</div>

      <div className="flex gap-2"><Btn variant="ghost" onClick={signOut}>Sign out</Btn><button onClick={()=>setCfg({url:'',key:''})} className="text-[11px] text-lavender-300/60 hover:text-lavender-100 self-center">Disconnect</button></div>
    </div>)}
  </Card>); }

        <div className="flex gap-2"><Btn variant="soft" onClick={()=>fileRef.current.click()}>Upload logo</Btn>{logo&&<Btn variant="ghost" onClick={()=>setLogo(null)}>Use default</Btn>}</div>
        <input ref={fileRef} type="file" accept="image/*,.svg" className="hidden" onChange={e=>onLogo(e.target.files[0])}/></div>
      <p className="text-[11px] text-lavender-300/50 mt-3">Applied to the header, splash screen and browser tab icon.</p>
    </Card>
    <Card className="p-6"><div className="font-display text-lg text-lavender-100 mb-3">Data</div>
      <p className="text-sm text-lavender-300/70 mb-3">Everything is stored locally on this device. Clearing removes all trips and receipts.</p>
      <Btn variant="danger" onClick={onResetAll}>Delete all data</Btn></Card>
  </div>); }

/* ============================ APP ============================ */
function blankTrip(){ return { id:uid(), name:'', status:'draft', baseCurrency:'SAR', __v5:true, createdAt:Date.now(), updatedAt:Date.now(),
  departDate:'', returnDate:'', persons:1, nodes:[{id:uid(),name:'',anchor:'start'},{id:uid(),name:'',anchor:'end'}], transports:[], hotels:[], spend:[],
  tripExpenses:{visa:{amount:'',attachments:[]},insurance:{amount:'',attachments:[]},sim:{amount:'',attachments:[]},transfers:{amount:'',attachments:[]},luggage:{amount:'',attachments:[]},emergency:{amount:'',attachments:[]}} }; }


function App(){
  const [dark,setDark]=usePersist('tp_dark',true);
  const [logo,setLogo]=usePersist('tp_logo',null);
  const [trips,setTrips]=usePersist('tp_trips_v1',{});
  const [currentId,setCurrentId]=usePersist('tp_current_v1',null);
  const [view,setView]=usePersist('tp_view','trips');
  const [toast,setToast]=useState(null); const [authOpen,setAuthOpen]=useState(false);
  const prevCur=useRef(null);
  const cloud=useCloud(trips,setTrips);

  useEffect(()=>{ document.documentElement.classList.toggle('dark',dark); },[dark]);
  useEffect(()=>{ const s=document.getElementById('splash'); if(s){ setTimeout(()=>s.classList.add('hide'),650); setTimeout(()=>s.remove(),1400);} },[]);
  useEffect(()=>{ const f=document.getElementById('favicon'); if(f&&logo) f.href=logo; },[logo]);
  // migrate legacy trips to node graph
  useEffect(()=>{ setTrips(ts=>{ let changed=false; const out={}; for(const k in ts){ const m=migrateTrip(ts[k]); if(m!==ts[k])changed=true; out[k]=m; } return changed?out:ts; }); },[]);

  const currentTrip=currentId&&trips[currentId]?migrateTrip(trips[currentId]):null;
  const cur=currentTrip?currentTrip.baseCurrency||'SAR':'SAR';
  useEffect(()=>{ prevCur.current=cur; },[currentId]);

  const setTrip=useCallback((updater)=>{ setTrips(ts=>{ const cur=ts[currentId]; if(!cur)return ts; const base=migrateTrip(cur); const next=typeof updater==='function'?updater(base):updater; return {...ts,[currentId]:{...next,updatedAt:Date.now()}}; }); },[currentId,setTrips]);

  const showToast=(m)=>{ setToast(m); setTimeout(()=>setToast(null),2200); };
  const newTrip=()=>{ const t=blankTrip(); setTrips(ts=>({...ts,[t.id]:t})); setCurrentId(t.id); prevCur.current=t.baseCurrency; setView('plan'); };
  const editTrip=(id)=>{ setCurrentId(id); prevCur.current=(trips[id]&&trips[id].baseCurrency)||'SAR'; setView('plan'); };
  const saveTrip=()=>{ setTrips(ts=>{ const t=ts[currentId]; if(!t)return ts; return {...ts,[currentId]:{...t,status:t.status==='draft'?'active':t.status,updatedAt:Date.now()}}; }); showToast('Trip saved ✓'); setView('trips'); };
  const action=(kind,id)=>{ if(kind==='delete'){ if(!confirm('Delete this trip permanently?'))return; setTrips(ts=>{ const n={...ts}; delete n[id]; return n; }); if(currentId===id)setCurrentId(null); return; }
    if(kind==='duplicate'){ const src=trips[id]; const copy={...JSON.parse(JSON.stringify(src)),id:uid(),name:(src.name||'Trip')+' (copy)',status:'draft',createdAt:Date.now(),updatedAt:Date.now()}; setTrips(ts=>({...ts,[copy.id]:copy})); showToast('Duplicated'); return; }
    setTrips(ts=>{ const t=ts[id]; if(!t)return ts; const status=kind==='complete'?'completed':kind==='archive'?'archived':kind==='activate'?'active':t.status; return {...ts,[id]:{...t,status,updatedAt:Date.now()}}; }); };

  function changeCurrency(next){ const from=prevCur.current||cur; if(from===next||!currentTrip)return;
    const cv=v=>v===''||v==null?v:String(+convertAmount(num(v),from,next).toFixed(2));
    setTrip(t=>({...t,baseCurrency:next,
      transports:t.transports.map(x=>({...x,cost:cv(x.cost)})),
      hotels:t.hotels.map(h=>({...h,perNight:cv(h.perNight),taxes:cv(h.taxes)})),
      cityBudgets:Object.fromEntries(Object.entries(t.cityBudgets).map(([k,b])=>[k,Object.fromEntries(Object.entries(b||{}).map(([x,v])=>[x,cv(v)]))])),
      tripExpenses:Object.fromEntries(Object.entries(t.tripExpenses).map(([k,e])=>[k,{...e,amount:cv(e.amount)}])),
    })); prevCur.current=next; }

  const needsTrip=['plan','map','budget','timeline'].includes(view)&&!currentTrip;
  const NAV=[{id:'trips',label:'Trips',icon:'🧳'},{id:'map',label:'Map',icon:'🗺️'},{id:'budget',label:'Budget',icon:'📊'},{id:'timeline',label:'Timeline',icon:'🧭'},{id:'settings',label:'Settings',icon:'⚙️'}];
  const TOPNAV=[{id:'trips',label:'Trips'},...(currentTrip?[{id:'plan',label:'Plan'}]:[]),{id:'map',label:'Map'},{id:'budget',label:'Budget'},{id:'timeline',label:'Timeline'},{id:'settings',label:'Settings'}];
  const showBottomNav=view!=='plan';

  return (
    <Theme.Provider value={{dark}}>
      <div className={`min-h-screen ${dark?'app-bg-dark text-lavender-50':'app-bg-light text-lavender-950'} font-sans transition-colors`} style={{paddingBottom:showBottomNav?'90px':'0'}}>
        <header className={`sticky top-0 z-40 frost ${dark?'glass-dark':'glass-light'} border-b`}>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-3">
            <button onClick={()=>setView('trips')}><Logo logo={logo}/></button>
            <nav className="hidden md:flex items-center gap-1">{TOPNAV.map(t=><button key={t.id} onClick={()=>setView(t.id)} className={`px-3.5 py-2 rounded-xl text-sm font-semibold transition ${view===t.id?'iridescent text-indigo2-950 shadow-glow':(dark?'text-lavender-200 hover:bg-white/5':'text-lavender-700 hover:bg-lavender-100')}`}>{t.label}</button>)}</nav>
            <div className="flex items-center gap-2">
              {currentTrip&&<select value={cur} onChange={e=>changeCurrency(e.target.value)} className="tp-soft rounded-full h-10 pl-3 pr-2 text-sm">{Object.entries(CURRENCIES).map(([k,v])=><option key={k} value={k}>{v.flag} {k}</option>)}</select>}
              <button onClick={()=>setAuthOpen(true)} title={cloud.session?('Cloud synced · '+cloud.session.user.email):'Cloud sync — sign in'} className={`tp-soft rounded-full h-10 px-3.5 flex items-center gap-1.5 text-xs ${cloud.session?'!text-teal2-500':''}`}>☁️<span className="hidden sm:inline">{cloud.session?'Synced':'Sign in'}</span></button>
              <button onClick={()=>setDark(!dark)} aria-label="Toggle theme" title="Toggle theme" className="tp-soft tp-round text-base">{dark?'☀️':'🌙'}</button>
            </div>
          </div>
        </header>

        {currentTrip&&view!=='trips'&&view!=='settings'&&<div className="max-w-7xl mx-auto px-4 sm:px-6 pt-5">
          <div className="text-[11px] uppercase tracking-[0.25em] text-lavender-300/70 font-semibold">{(currentTrip.status||'draft').toUpperCase()}</div>
          <h1 className="font-display text-2xl sm:text-4xl iridescent-text">{currentTrip.name||'Untitled trip'}</h1>
        </div>}

        <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6"><div key={view} className="view-anim">
          {needsTrip? <Card className="p-10 text-center"><div className="font-display text-2xl iridescent-text mb-2">Pick a trip first</div><p className="text-sm text-lavender-300/70 mb-4">Open or create a trip to view its {view}.</p><div className="flex justify-center gap-2"><Btn onClick={()=>setView('trips')}>Go to Trips</Btn><Btn variant="soft" onClick={newTrip}>＋ New trip</Btn></div></Card> :
            view==='trips'? <div className="space-y-4"><CloudBanner cloud={cloud} onOpen={()=>setAuthOpen(true)}/><TripsView trips={trips} onNew={newTrip} onEdit={editTrip} onAction={action}/></div> :
            view==='plan'&&currentTrip? <PlanView trip={currentTrip} setTrip={setTrip} cur={cur} onSave={saveTrip}/> :
            view==='map'&&currentTrip? <MapView trip={currentTrip} cur={cur}/> :
            view==='budget'&&currentTrip? <BudgetView trip={currentTrip} cur={cur}/> :
            view==='timeline'&&currentTrip? <TimelineView trip={currentTrip} cur={cur}/> :
            view==='settings'? <SettingsView dark={dark} setDark={setDark} logo={logo} setLogo={setLogo} cloud={cloud} onResetAll={()=>{ if(confirm('Delete ALL trips and data?')){ setTrips({}); setCurrentId(null); showToast('All data cleared'); } }}/> : null}
        </div></main>

        {showBottomNav&&<nav className="md:hidden fixed left-3 right-3 z-40 rounded-[22px] tp-bottombar" style={{bottom:'calc(10px + env(safe-area-inset-bottom))'}}>
          <div className="flex justify-around px-1.5 py-1.5">{NAV.map(t=>{ const on=view===t.id; return (<button key={t.id} onClick={()=>setView(t.id)} className={`flex flex-col items-center gap-1 px-3 py-1.5 rounded-2xl text-[10px] font-bold tracking-wide transition ${on?'text-white':'text-white/55 hover:text-white/80'}`}><NavIcon id={t.id} className={`w-[19px] h-[19px] transition ${on?'text-peach-400':''}`}/>{t.label}</button>); })}</div>
        </nav>}

        {toast&&<div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-xl iridescent text-indigo2-950 text-sm font-semibold shadow-glow fade-in">{toast}</div>}
        {authOpen&&<AuthModal cloud={cloud} onClose={()=>setAuthOpen(false)} onSettings={()=>{setAuthOpen(false);setView('settings');}}/>}
      </div>
    </Theme.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
